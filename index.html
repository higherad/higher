<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIGHER AD | ADMIN</title>
  <link rel="icon" href="/favicon.png?v=2">
  <meta property="og:title" content="HIGHER AD | ADMIN">
  <meta property="og:description" content="HigherAD 통합 파트너스 관리자 페이지">
  <meta property="og:image" content="https://higherad.kro.kr/admin_logo.png?v=2">
  <meta property="og:url" content="https://higherad.kro.kr/">
  <meta property="og:type" content="website">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* ── 광고분류 페이지 CSS ── */
    #ac-wrap *{box-sizing:border-box}
    #ac-wrap{font-family:'Pretendard',sans-serif;color:var(--text)}
    .ac-search-bar{display:flex;gap:10px;margin-bottom:20px}
    .ac-search-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;transition:.2s;background:#fff}
    .ac-search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
    .ac-search-clear{padding:10px 16px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:.2s;white-space:nowrap}
    .ac-search-clear:hover{background:var(--bg)}
    .ac-result-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .ac-result-title{font-size:16px;font-weight:800}
    .ac-result-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .ac-export-btn,.ac-capture-btn{padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:.2s;font-family:inherit}
    .ac-export-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
    .ac-capture-btn:hover{background:var(--sidebar);color:#fff;border-color:var(--sidebar)}
    .ac-capture-btn:disabled{opacity:.5;cursor:not-allowed}
    .ac-tbl-scroll{overflow-x:auto;border-radius:14px;border:1px solid var(--border);margin-bottom:6px}
    .ac-tbl-wrap{background:#fff;border-radius:14px}
    .ac-tbl{width:100%;border-collapse:collapse;font-size:13px}
    .ac-tbl thead th{background:#f8fafc;padding:11px 13px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap}
    .ac-tbl thead th:nth-child(2){text-align:center}
    .ac-tbl tbody td{padding:9px 13px;border-bottom:1px solid #f1f5f9;text-align:center;color:var(--text);transition:background .12s;vertical-align:middle}
    .ac-tbl tbody tr:last-child td{border-bottom:none}
    .ac-total-row td{background:#e2e8f0!important;font-weight:800;border-top:2px solid #94a3b8;color:var(--text)}
    .ac-bg-agency{background:rgba(34,197,94,.05)}.ac-bg-direct{background:rgba(245,158,11,.05)}.ac-bg-solo{background:rgba(59,130,246,.05)}
    .ac-bg-agency:hover td{background:rgba(34,197,94,.1)!important}.ac-bg-direct:hover td{background:rgba(245,158,11,.1)!important}.ac-bg-solo:hover td{background:rgba(59,130,246,.1)!important}
    .ac-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px}
    .ac-badge-agency{background:rgba(34,197,94,.15);color:#16a34a}.ac-badge-direct{background:rgba(245,158,11,.15);color:#d97706}.ac-badge-youpfl{background:rgba(168,85,247,.15);color:#9333ea}.ac-badge-solo{background:rgba(59,130,246,.15);color:#2563eb}
    .ac-highlight{background:#fef08a;border-radius:3px;padding:0 1px}
    .ac-no-result{padding:48px;text-align:center;color:var(--muted);font-size:13px;background:#fff;border-radius:14px;border:1px solid var(--border)}
    .ac-save-status{font-size:11px;color:var(--muted);text-align:right;min-height:16px;margin-bottom:16px}
    .ac-divider{border:none;border-top:2px dashed var(--border);margin:32px 0}
    .ac-sec{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin:0 0 10px}
    .ac-editor{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
    .ac-editor-row{display:flex;align-items:flex-start;border-bottom:1px solid var(--border)}
    .ac-editor-row:last-child{border-bottom:none}
    .ac-editor-label{width:86px;padding:14px;font-size:13px;font-weight:700;background:#f8fafc;border-right:1px solid var(--border);display:flex;align-items:flex-start;flex-shrink:0;padding-top:16px}
    .ac-editor-label.agency{color:#22c55e}.ac-editor-label.direct{color:var(--warn)}.ac-editor-label.solo{color:var(--info)}
    .ac-editor-body{flex:1;padding:12px 14px}
    .ac-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;min-height:10px}
    .ac-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:500}
    .ac-tag .ac-x{cursor:pointer;color:var(--muted);font-size:14px;line-height:1;margin-left:2px;transition:.15s}
    .ac-tag .ac-x:hover{color:var(--danger)}
    .ac-hint{font-size:11px;color:var(--muted);margin-bottom:6px}
    .ac-add-row{display:flex;gap:6px}
    .ac-inp{flex:1;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;font-family:inherit;outline:none;transition:.2s;color:var(--text)}
    .ac-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
    .ac-add-btn{padding:8px 14px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
    .ac-add-btn:hover{background:var(--accent2)}
    .ac-upload-zone{border:2px dashed var(--border);border-radius:14px;padding:28px 20px;text-align:center;background:#f8fafc;cursor:pointer;transition:.2s;position:relative;margin-bottom:18px}
    .ac-upload-zone:hover,.ac-upload-zone.drag-over{border-color:var(--accent);background:rgba(16,185,129,.04)}
    .ac-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .ac-upload-fname{font-size:13px;font-weight:600;color:var(--accent);display:none;margin-top:8px}
    .ac-run-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;font-family:inherit}
    .ac-run-btn:hover:not(:disabled){background:var(--accent2);box-shadow:0 6px 20px rgba(16,185,129,.3);transform:translateY(-1px)}
    .ac-run-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;transform:none;box-shadow:none}
    #ac-toast{position:fixed;bottom:24px;right:24px;z-index:9999;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;opacity:0;transform:translateY(6px);transition:all .3s;pointer-events:none}
    #ac-toast.show{opacity:1;transform:translateY(0)}
    #ac-toast.ok{background:var(--accent)}#ac-toast.err{background:var(--danger)}
    /* 탭 */
    .ac-tabs{display:flex;gap:8px;margin-bottom:20px}
    .ac-tab{padding:8px 20px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:.2s}
    .ac-tab:hover{background:var(--bg)}
    .ac-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(16,185,129,.25)}
    /* 월별 선택 */
    .ac-month-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
    .ac-month-btn{padding:8px 16px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:.2s;display:flex;align-items:center;gap:6px}
    .ac-month-btn:hover{background:var(--bg)}
    .ac-month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(16,185,129,.2)}
    .ac-month-cnt{font-size:11px;font-weight:700;padding:1px 7px;border-radius:8px;background:rgba(255,255,255,.25)}
    .ac-month-btn:not(.active) .ac-month-cnt{background:var(--bg);color:var(--text2)}
    /* 순위 조회 */
    #rk-wrap{padding:8px 0}
    .rk-sec{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:0 0 16px}
    .rk-form{display:flex;flex-direction:column;gap:12px;max-width:480px}
    .rk-field{display:flex;flex-direction:column;gap:6px}
    .rk-label{font-size:12px;font-weight:600;color:var(--text2)}
    .rk-input{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:.2s}
    .rk-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
    .rk-btn{margin-top:4px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
    .rk-btn:hover{background:var(--accent2)}
    .rk-btn:disabled{opacity:.6;cursor:not-allowed}
    .rk-msg{margin-top:20px;padding:14px 16px;border-radius:10px;font-size:13px;background:var(--bg);color:var(--text2)}
    .rk-msg.warn{background:#fef9c3;color:#854d0e}
    .rk-msg.err{background:#fee2e2;color:#991b1b}
    .rk-card{margin-top:20px;max-width:480px;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:20px 24px}
    .rk-card-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
    .rk-card-row:last-of-type{border-bottom:none}
    .rk-card-label{font-size:12px;font-weight:600;color:var(--text2)}
    .rk-card-val{font-size:14px;font-weight:600;color:var(--text)}
    .rk-card-val.muted{color:var(--text2);font-weight:400}
    .rk-rank-display{display:flex;align-items:baseline;justify-content:center;gap:6px;padding:24px 0 8px}
    .rk-rank-num{font-size:64px;font-weight:900;line-height:1}
    .rk-rank-unit{font-size:24px;font-weight:700;color:var(--text2)}
    .rank-top3{color:#10b981}
    .rank-top10{color:#3b82f6}
    .rank-top20{color:#f59e0b}
    .rank-low{color:var(--text2)}
    /* 날짜별 리스트 */
    .ac-date-row td{padding:10px 13px}
    .ac-date-row:nth-child(even) td{background:var(--bg)}
    .ac-date-label{font-weight:700;color:var(--text2);letter-spacing:.5px;white-space:nowrap}
    .ac-date-total{font-weight:800;color:var(--text)}
  </style>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <style>
    :root {
      --bg:#f0f4f8; --sidebar:#0f172a; --accent:#10b981; --accent2:#059669;
      --muted:#94a3b8; --card:#ffffff; --border:#e2e8f0;
      --text:#1e293b; --text2:#64748b; --danger:#ef4444; --warn:#f59e0b; --info:#3b82f6;
    }
    *, *::before, *::after { box-sizing:border-box; }
    body { margin:0; font-family:'Pretendard',sans-serif; background:var(--bg); display:none; min-height:100vh; color:var(--text); }

    aside { width:240px; background:var(--sidebar); color:#fff; display:flex; flex-direction:column; position:fixed; height:100vh; z-index:100; }
    .brand { padding:32px 24px 24px; cursor:pointer; }
    .brand-name { font-size:20px; font-weight:900; letter-spacing:-0.5px; }
    .brand-name span { color:var(--accent); }
    .brand-sub { font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:2px; text-transform:uppercase; }
    .nav-section { padding:0 12px; }
    .nav-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; padding:16px 10px 6px; }
    .nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:13px; font-weight:500; transition:all .2s; margin-bottom:2px; user-select:none; }
    .nav-item i[data-lucide] { width:16px; height:16px; flex-shrink:0; }
    .nav-item:hover { color:#fff; background:rgba(255,255,255,.06); }
    .nav-item.active { color:#fff; background:var(--accent); box-shadow:0 4px 12px rgba(16,185,129,.25); }
    .nav-item .badge { margin-left:auto; background:var(--warn); color:#fff; font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
    .nav-item.active .badge { background:rgba(255,255,255,.3); }
    .sidebar-bottom { margin-top:auto; padding:16px 12px; border-top:1px solid rgba(255,255,255,.06); }
    .admin-info { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; }
    .admin-avatar { width:34px; height:34px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff; flex-shrink:0; }
    .admin-name { font-size:13px; font-weight:600; }
    .admin-role { font-size:11px; color:var(--muted); }
    .btn-logout { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:8px; cursor:pointer; color:var(--muted); font-size:13px; transition:.2s; margin-top:4px; }
    .btn-logout:hover { color:#fff; background:rgba(255,255,255,.06); }

    main { flex-grow:1; margin-left:240px; padding:32px 36px; }
    #content-area { animation:fadeIn .3s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; }
    .page-heading { font-size:22px; font-weight:800; color:var(--text); }
    .top-right { display:flex; align-items:center; gap:12px; }

    /* 상태 pill */
    .status-pill { padding:5px 14px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:.5px; border:1px solid; transition:.3s; }
    .status-pill.ok      { background:rgba(16,185,129,.08); color:var(--accent); border-color:rgba(16,185,129,.3); }
    .status-pill.loading { background:rgba(245,158,11,.08); color:var(--warn); border-color:rgba(245,158,11,.3); }
    .status-pill.error   { background:rgba(239,68,68,.08); color:var(--danger); border-color:rgba(239,68,68,.3); }

    /* 알림 버튼 */
    .icon-btn {
      width:34px; height:34px; border-radius:8px; background:var(--card);
      border:1px solid var(--border); display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:.2s; color:var(--text2); position:relative;
    }
    .icon-btn:hover { background:var(--bg); color:var(--text); }
    .notif-dot {
      position:absolute; top:-3px; right:-3px;
      width:16px; height:16px; border-radius:50%;
      background:var(--danger); color:#fff;
      font-size:9px; font-weight:700;
      display:none; align-items:center; justify-content:center;
      border:2px solid var(--bg);
    }
    .notif-dot.show { display:flex; }

    /* 알림 드롭다운 */
    .notif-panel {
      position:absolute; top:calc(100% + 8px); right:0;
      width:320px; background:#fff; border:1px solid var(--border);
      border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.12);
      z-index:200; display:none;
    }
    .notif-panel.show { display:block; }
    .notif-header { padding:14px 16px; border-bottom:1px solid var(--border); font-size:13px; font-weight:700; display:flex; justify-content:space-between; align-items:center; }
    .notif-clear { font-size:11px; color:var(--accent); cursor:pointer; font-weight:600; }
    .notif-list { max-height:280px; overflow-y:auto; }
    .notif-item { padding:12px 16px; border-bottom:1px solid #f8fafc; cursor:pointer; transition:.15s; }
    .notif-item:hover { background:#f8fafc; }
    .notif-item:last-child { border-bottom:none; }
    .notif-item-title { font-size:12px; font-weight:600; color:var(--text); margin-bottom:3px; }
    .notif-item-desc  { font-size:11px; color:var(--text2); }
    .notif-empty { padding:28px 16px; text-align:center; color:var(--muted); font-size:12px; }
    .notif-wrap { position:relative; }

    .stat-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:24px; }
    .stat-card { background:var(--card); border-radius:14px; padding:20px; border:1px solid var(--border); position:relative; overflow:hidden; transition:.2s; }
    .stat-card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.06); }
    .stat-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
    .stat-card.c-green::after { background:var(--accent); }
    .stat-card.c-warn::after  { background:var(--warn); }
    .stat-card.c-danger::after{ background:var(--danger); }
    .stat-card.c-info::after  { background:var(--info); }
    .stat-label { font-size:11px; color:var(--text2); font-weight:600; margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
    .stat-value { font-size:28px; font-weight:800; color:var(--text); line-height:1; }
    .stat-unit  { font-size:13px; color:var(--muted); font-weight:400; margin-left:2px; }
    .stat-card.c-warn  .stat-value { color:var(--warn); }
    .stat-card.c-danger .stat-value{ color:var(--danger); }

    .bottom-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; }
    .ha-box { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px; }
    .box-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
    .box-title { font-size:15px; font-weight:700; }
    .notice-list { list-style:none; margin:0; padding:0; }
    .notice-item { display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px dashed var(--border); }
    .notice-item:last-child { border:none; padding-bottom:0; }
    .notice-tag { flex-shrink:0; font-size:10px; padding:2px 7px; border-radius:4px; font-weight:700; }
    .tag-urgent  { background:rgba(239,68,68,.1); color:var(--danger); }
    .tag-general { background:var(--bg); color:var(--text2); }
    .notice-title { flex:1; font-size:13px; color:var(--text); cursor:pointer; }
    .notice-title:hover { color:var(--accent); }
    .notice-date { font-size:11px; color:var(--muted); flex-shrink:0; }
    .quick-box { background:var(--sidebar); border-radius:16px; padding:24px; }
    .quick-title { font-size:15px; font-weight:700; color:#fff; margin-bottom:18px; }
    .quick-btn { display:block; width:100%; text-align:left; padding:14px 16px; border-radius:10px; border:none; cursor:pointer; font-size:13px; font-weight:500; margin-bottom:10px; transition:.2s; }
    .quick-btn:last-child { margin-bottom:0; }
    .quick-btn.ghost   { background:rgba(255,255,255,.07); color:#fff; }
    .quick-btn.ghost:hover { background:rgba(255,255,255,.12); }
    .quick-btn.primary { background:var(--accent); color:#fff; }
    .quick-btn.primary:hover { background:var(--accent2); }

    /* 현재 순위 분포 카드 */
    .rd-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 24px; height:100%; }
    .rd-header { display:flex; align-items:center; gap:8px; margin-bottom:16px; }
    .rd-header i { width:18px; height:18px; }
    .rd-title { font-size:15px; font-weight:700; }
    .rd-header-arrow { margin-left:auto; width:16px; height:16px; color:var(--muted); cursor:pointer; transition:.2s; }
    .rd-header-arrow:hover { color:var(--accent); }
    .rd-body { display:flex; align-items:center; gap:24px; }
    .rd-rows { flex:1; display:flex; flex-direction:column; gap:1px; min-width:0; }
    .rd-row { display:flex; align-items:center; gap:10px; padding:7px 6px; border-radius:10px; }
    .rd-icon { width:16px; height:16px; flex-shrink:0; }
    .rd-label { flex:1; font-size:13px; font-weight:600; color:var(--text2); }
    .rd-count { font-size:14px; font-weight:800; color:var(--text); white-space:nowrap; }
    .rd-count small { font-size:11px; font-weight:500; color:var(--muted); margin-left:1px; }
    .rd-donut { position:relative; width:120px; height:120px; flex-shrink:0; }
    .rd-donut svg { transform:rotate(-90deg); }
    .rd-total { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .rd-total-label { font-size:11px; color:var(--muted); font-weight:600; }
    .rd-total-val { font-size:19px; font-weight:800; color:var(--text); }
    .rd-footer { margin-top:16px; padding-top:14px; border-top:1px dashed var(--border); }
    .rd-basis { font-size:11px; color:var(--muted); }
    .rd-empty { padding:40px 0; text-align:center; color:var(--muted); font-size:13px; }

    .loading-wrap { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:14px; gap:10px; }
    .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    /* ── 공통 모달 오버레이 ── */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9000; display:flex; align-items:center; justify-content:center; }

    /* ── 햄버거 버튼 ── */
    .hamburger {
      display:none; flex-direction:column; justify-content:center; gap:5px;
      width:36px; height:36px; cursor:pointer; padding:6px;
      border-radius:8px; border:1px solid var(--border); background:var(--card);
    }
    .hamburger span { display:block; height:2px; background:var(--text); border-radius:2px; transition:.3s; }

    /* ── 사이드바 오버레이 (모바일) ── */
    .sidebar-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:99;
    }
    .sidebar-overlay.show { display:block; }

    /* ── 반응형 ── */
    @media (max-width:768px) {
      aside {
        transform:translateX(-100%);
        transition:transform .3s ease;
        z-index:200;
      }
      aside.open { transform:translateX(0); }

      main { margin-left:0; padding:16px; }

      .top-bar { margin-bottom:16px; }
      .page-heading { font-size:17px; }
      .status-pill { display:none; }

      .hamburger { display:flex; }

      /* 카드 그리드 — 2열 */
      .stat-grid { grid-template-columns:repeat(2,1fr) !important; gap:10px; }
      .stat-card { padding:14px; }
      .stat-value { font-size:22px; }

      /* 하단 그리드 — 1열 */
      .bottom-grid { grid-template-columns:1fr; }

      /* 현재 순위 분포 카드 — 세로 배치 */
      .rd-card { max-width:100%; }
      .rd-body { flex-direction:column; gap:16px; }

      /* 테이블 — 가로 스크롤 */
      .tbl-wrap, #receipt-page .tbl-wrap, #slots-page .tbl-wrap,
      #settle-page .tbl-wrap, #expire-page .tbl-wrap {
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
      }

      /* 필터바 — 줄바꿈 */
      .filter-bar, #receipt-page .filter-bar, #slots-page .filter-bar,
      #settle-page .filter-bar, #expire-page .filter-bar {
        flex-wrap:wrap;
        gap:6px;
      }

      /* 현황 카드 (접수관리, 전체캠페인) */
      .stat-bar { grid-template-columns:1fr 1fr !important; gap:8px; }
      .sb-val { font-size:18px !important; }

      /* 알림 패널 */
      .notif-panel { width:280px; right:-60px; }
    }
  </style>
</head>
<body>

  </div>
  <div class="nav-section">

    <div class="nav-item" id="nav-slots"   onclick="loadPage('진행현황.html',this)"><i data-lucide="layers" size="16"></i> 진행 현황</div>
    <div class="nav-item" id="nav-pending" onclick="loadPage('접수관리.html',this)"><i data-lucide="inbox" size="16"></i> 접수 관리<span class="badge" id="pending-badge" style="display:none">0</span></div>
    <div class="nav-item" id="nav-expire"  onclick="loadPage('종료예정.html',this)"><i data-lucide="clock-alert" size="16"></i> 종료 예정</div>

<script type="module">
  import HA from './ha-store.js';

  window.HA = HA;

  // #content-area에 무엇을 그릴지 결정하는 요청마다 증가하는 세대 번호.
  // 대시보드/페이지 렌더가 await로 대기하는 사이 사용자가 다른 메뉴로 넘어가면
  // 뒤늦게 도착한 이전 렌더가 최신 화면을 덮어쓰지 않도록 막는다.
  let navGen = 0;

  // URL에서 파일명 숨기기 — 항상 / 로만 표시
  history.replaceState(null, '', '/');

  // ── 로그아웃 ──────────────────────────────────────────────
  window.doLogout = () => {
    HA.logout();
    sessionStorage.removeItem('ha_admin_auth');
    location.href = 'admin-login.html';
  };

  // ── 알림 관련 ─────────────────────────────────────────────
  let notifications = JSON.parse(sessionStorage.getItem('ha_notifs') || '[]');
  let notifOpen     = false;

  function saveNotifs() {
    sessionStorage.setItem('ha_notifs', JSON.stringify(notifications.slice(0, 20)));
  }
  function commitNotifs() { saveNotifs(); renderNotifPanel(); }

  function renderNotifPanel() {
    const dot  = document.getElementById('notif-dot');
    const list = document.getElementById('notif-list');
    if (!notifications.length) {
      dot.classList.remove('show');
      list.innerHTML = '<div class="notif-empty">새 알림이 없습니다.</div>';
      return;
    }
    dot.textContent = notifications.length > 9 ? '9+' : notifications.length;
    dot.classList.add('show');
    list.innerHTML = notifications.map((n, i) => `
      <div class="notif-item" onclick="handleNotif(${i})">
        <div class="notif-item-title">${n.title}</div>
        <div class="notif-item-desc">${n.desc}</div>
      </div>`).join('');
  }

  window.toggleNotif = function() {
    const panel = document.getElementById('notif-panel');
    notifOpen = !notifOpen;
    panel.classList.toggle('show', notifOpen);
  };

  window.clearNotifs = function() {
    notifications = [];
    commitNotifs();
  };

  window.handleNotif = function(i) {
    document.getElementById('notif-panel').classList.remove('show');
    notifOpen = false;
    const n = notifications[i];
    const page = n?.page || '접수관리.html';
    const navId = n?.navId || 'nav-pending';
    loadPage(page, document.getElementById(navId));
  };

  // 패널 외부 클릭 시 닫기
  document.addEventListener('click', e => {
    if (notifOpen && !e.target.closest('.notif-wrap')) {
      document.getElementById('notif-panel').classList.remove('show');
      notifOpen = false;
    }
  });

  // ── 대시보드 렌더 ─────────────────────────────────────────
  window.renderDashboard = async function() {
    const myGen = ++navGen;
    const area = document.getElementById('content-area');
    area.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div>';

    const [s, allNotices, allUsers, allSlots] = await Promise.all([
      HA.getDashboardStats(),
      HA.getNotices(),
      HA.getUsers(),
      HA.getSlots(),
    ]);
    if (myGen !== navGen) return; // 대기 중 다른 메뉴로 이동한 경우 렌더 중단
    const notices = allNotices.slice(0, 4);

    const agencies = allUsers.filter(u => u.approved !== false).length;
    const { activeAgencyIds, totalTarget, pendingCount, acceptedCount } = allSlots.reduce((acc, sl) => {
      if (sl.status === 'active') { acc.activeAgencyIds.add(sl.agencyId); acc.totalTarget += (sl.dailyTarget||0); }
      else if (sl.status === 'pending')  acc.pendingCount++;
      else if (sl.status === 'accepted') acc.acceptedCount++;
      return acc;
    }, { activeAgencyIds:new Set(), totalTarget:0, pendingCount:0, acceptedCount:0 });
    const activeAgencies = activeAgencyIds.size;

    area.innerHTML = `
      <div class="stat-grid" style="grid-template-columns:repeat(7,1fr)">
        <div class="stat-card c-info"><div class="stat-label">영업점</div><div class="stat-value">${agencies}<span class="stat-unit">곳</span></div></div>
        <div class="stat-card c-green"><div class="stat-label">진행중 영업점</div><div class="stat-value">${activeAgencies}<span class="stat-unit">곳</span></div></div>
        <div class="stat-card c-green"><div class="stat-label">진행중 캠페인</div><div class="stat-value">${s.activeSlots}<span class="stat-unit">개</span></div></div>
        <div class="stat-card c-green"><div class="stat-label">진행중 일 목표</div><div class="stat-value">${totalTarget.toLocaleString()}<span class="stat-unit">개</span></div></div>
        <div class="stat-card c-warn"><div class="stat-label">종료 예정(3일)</div><div class="stat-value">${s.expiringSoon}<span class="stat-unit">건</span></div></div>
        <div class="stat-card c-info"><div class="stat-label">대기</div><div class="stat-value">${pendingCount}<span class="stat-unit">건</span></div></div>
        <div class="stat-card c-info"><div class="stat-label">접수</div><div class="stat-value">${acceptedCount}<span class="stat-unit">건</span></div></div>
      </div>
      <div class="bottom-grid">
        <div id="rd-slot">
          <div class="rd-card"><div class="loading-wrap" style="height:160px"><div class="spinner"></div> 순위 데이터 불러오는 중...</div></div>
        </div>
        <div class="ha-box">
          <div class="box-header">
            <span class="box-title">공지사항</span>
            <i data-lucide="arrow-right" class="rd-header-arrow" onclick="loadPage('공지사항.html',document.getElementById('nav-notice'))" title="공지사항으로 이동"></i>
          </div>
          <ul class="notice-list">
            ${notices.length ? notices.map(n => `
              <li class="notice-item">
                <span class="notice-tag ${n.pinned?'tag-urgent':'tag-general'}">${n.pinned?'필독':'일반'}</span>
                <span class="notice-title" onclick="loadPage('공지사항.html',document.getElementById('nav-notice'))">${n.title}</span>
                <span class="notice-date">${(n.date||'').slice(5,10)}</span>
              </li>`).join('') : '<li style="color:var(--muted);font-size:13px;padding:12px 0">공지사항이 없습니다.</li>'}
          </ul>
        </div>
        <div class="quick-box">
          <div class="quick-title">Quick Action</div>
          <button class="quick-btn ghost"   onclick="loadQuickNewReceipts()">📥 &nbsp;신규 접수 확인하기</button>
          <button class="quick-btn primary" onclick="loadQuickUnpaid()">💰 &nbsp;미정산 내역 확인</button>
          <button class="quick-btn ghost"   onclick="loadQuickExpireSoon()">⏰ &nbsp;종료 예정 캠페인 보기</button>
          <button class="quick-btn ghost"   onclick="loadQuickPendingUsers()">👤 &nbsp;신규 회원 승인하기</button>
        </div>
      </div>`;
    lucide.createIcons();

    fetchRankDistribution(allSlots).then(d => {
      if (myGen !== navGen) return; // 대기 중 다른 메뉴로 이동한 경우 렌더 중단
      const slot = document.getElementById('rd-slot');
      if (slot) { slot.innerHTML = renderRankDistCard(d); lucide.createIcons(); }
    }).catch(err => {
      console.error('rank distribution error:', err);
      const slot = document.getElementById('rd-slot');
      if (slot) slot.innerHTML = `<div class="rd-card"><div class="rd-empty" style="color:var(--danger)">순위 분포 로드 실패: ${err.message}</div></div>`;
    });
  };

  // ── 현재 순위 분포 (진행중 캠페인의 최신 순위 집계) ─────────
  window.rdGoRank = function() {
    loadPage('순위조회.html', document.getElementById('nav-rank'), () => {
      // 순위조회.html의 스크립트는 afterLoad 이후 비동기(blob script)로 실행되므로
      // window.rkTab이 정의될 때까지 잠깐 재시도한다.
      const tryClick = (attempts = 0) => {
        const btn = document.getElementById('rk-tab-change');
        if (btn && typeof window.rkTab === 'function') {
          window.rkTab('change', btn);
        } else if (attempts < 20) {
          setTimeout(() => tryClick(attempts + 1), 50);
        }
      };
      tryClick();
    });
  };

  // 순위조회.html '5일' 탭과 동일한 GAS 소스 — 어드민(ha/slots)에 없는 상품도 포함된 전체 순위 집계
  const RANK_CHANGE_GAS_URL = 'https://script.google.com/macros/s/AKfycbxyFuM-npYQ_Rkgezgl6LqfhUCCdc3mff07ESh88VxE2nTqYeR5j1JriyY8mTRdSH_a/exec';
  const RANK_FLOOR = 301; // 5일 데이터에서 '-'(300위 밖/미확인)는 권외로 취급

  async function fetchRankDistribution(allSlots) {
    const todayStr = new Date().toISOString().slice(0, 10);
    const running = allSlots.filter(s =>
      s.status === 'active' && s.mid && s.rankKeyword &&
      s.startDate <= todayStr && s.endDate >= todayStr
    );
    const adminMids = new Set(running.map(s => s.mid));

    const result = {
      top10:0, top30:0, top100:0, top200:0, top300:0, outside:0,
      unrecorded:0, basisDate:'', total:0,
    };

    const classify = rank => {
      if (!Number.isFinite(rank) || rank <= 0)   { result.outside++; return; }
      if (rank <= 10)  result.top10++;
      else if (rank <= 30)  result.top30++;
      else if (rank <= 100) result.top100++;
      else if (rank <= 200) result.top200++;
      else if (rank <= 300) result.top300++;
      else result.outside++;
    };

    const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
    const db = getDatabase();

    const [dataArr, allDoneSnap, changeJson] = await Promise.all([
      Promise.all(running.map(async s => {
        const safeMid = s.mid.replace(/[.#$[\]/]/g, '_');
        try {
          const snap = await get(ref(db, `ha/ranks/${safeMid}`));
          return snap.exists() ? snap.val() : null;
        } catch { return null; }
      })),
      get(ref(db, 'ha/pipeline/allDone')).catch(() => null),
      fetch(`${RANK_CHANGE_GAS_URL}?action=getRankData&t=${Date.now()}`).then(r => r.json()).catch(() => null),
    ]);

    let maxDate = '';
    dataArr.forEach(rd => {
      const dates = rd ? Object.keys(rd).sort((a, b) => b.localeCompare(a)) : [];
      if (!dates.length) { result.unrecorded++; return; }
      const latestDate = dates[0];
      if (latestDate > maxDate) maxDate = latestDate;
      classify(Number(rd[latestDate]?.rank));
    });

    // 어드민(ha/slots)에 등록되지 않은 상품 — '5일' 데이터의 최신값으로 집계, 어드민 mid는 중복 제외
    if (changeJson && Array.isArray(changeJson.results)) {
      changeJson.results.forEach(item => {
        if (!item.mid || adminMids.has(item.mid)) return;
        const ranks = item.ranks || [];
        if (!ranks.length) { result.unrecorded++; return; }
        const latestRaw = ranks[ranks.length - 1];
        const rank = (latestRaw === '' || latestRaw === null || latestRaw === undefined || latestRaw === '-')
          ? RANK_FLOOR
          : parseFloat(latestRaw);
        classify(Number.isFinite(rank) ? rank : RANK_FLOOR);
      });
    }

    // 기준일 = 파이프라인 완료 시점(ha/pipeline/allDone, YYMMDD). 없으면 실데이터 최신일로 대체.
    const allDoneVal = allDoneSnap && allDoneSnap.exists() ? String(allDoneSnap.val()) : '';
    result.basisDate = /^\d{6}$/.test(allDoneVal)
      ? `20${allDoneVal.slice(0,2)}-${allDoneVal.slice(2,4)}-${allDoneVal.slice(4,6)}`
      : (maxDate || '-');

    result.total = result.top10 + result.top30 + result.top100 + result.top200 + result.top300 + result.outside;
    return result;
  }

  function renderRankDistCard(d) {
    const headerHtml = `
      <div class="rd-header">
        <i data-lucide="trophy" style="color:var(--warn)"></i>
        <span class="rd-title">현재 순위 분포</span>
        <i data-lucide="arrow-right" class="rd-header-arrow" onclick="rdGoRank()" title="순위 조회로 이동"></i>
      </div>`;

    if (!d.total) {
      return `<div class="rd-card">${headerHtml}<div class="rd-empty">집계할 순위 데이터가 없습니다.</div></div>`;
    }

    const C = 2 * Math.PI * 50;
    const segs = [
      { val: d.top10,   color:'#3b82f6' },
      { val: d.top30,   color:'#10b981' },
      { val: d.top100,  color:'#0d9488' },
      { val: d.top200,  color:'#f59e0b' },
      { val: d.top300,  color:'#f97316' },
      { val: d.outside, color:'#ef4444' },
    ];
    let cum = 0;
    const circles = segs.map(s => {
      const len = (s.val / d.total) * C;
      const circle = `<circle cx="60" cy="60" r="50" fill="none" stroke="${s.color}" stroke-width="16" stroke-dasharray="${len} ${C - len}" stroke-dashoffset="${-cum}"></circle>`;
      cum += len;
      return circle;
    }).join('');

    const rows = [
      { icon:'trophy',      color:'#3b82f6', label:'1~10위',        val:d.top10   },
      { icon:'trending-up', color:'#10b981', label:'11~30위',       val:d.top30   },
      { icon:'award',       color:'#0d9488', label:'31~100위',      val:d.top100  },
      { icon:'bar-chart-2', color:'#f59e0b', label:'101~200위',     val:d.top200  },
      { icon:'bar-chart',   color:'#f97316', label:'201~300위',     val:d.top300  },
      { icon:'triangle-alert', color:'#ef4444', label:'권외 (301위~)', val:d.outside },
    ].map(r => `
      <div class="rd-row">
        <i data-lucide="${r.icon}" class="rd-icon" style="color:${r.color}"></i>
        <span class="rd-label">${r.label}</span>
        <span class="rd-count">${r.val.toLocaleString()}<small> 개</small></span>
      </div>`).join('');

    return `
      <div class="rd-card">
        ${headerHtml}
        <div class="rd-body">
          <div class="rd-rows">${rows}</div>
          <div class="rd-donut">
            <svg viewBox="0 0 120 120" width="120" height="120">
              <circle cx="60" cy="60" r="50" fill="none" stroke="#eef2f7" stroke-width="16"></circle>
              ${circles}
            </svg>
            <div class="rd-total"><span class="rd-total-label">합계</span><span class="rd-total-val">${d.total.toLocaleString()}</span></div>
          </div>
        </div>
        <div class="rd-footer">
          <span class="rd-basis">기준: ${d.basisDate || '-'}</span>
        </div>
      </div>`;
  }

  window.loadDashboard = function() {
    if (HA.getCurrentUser()?.role === 'guest') {
      loadPage('진행현황.html', document.getElementById('nav-slots'));
      return;
    }
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('page-heading').textContent = '운영 현황 대시보드';
    renderDashboard();
    window.scrollTo(0, 0);
  };

  // ── 게스트 계정: 사이드바를 진행 현황 / 접수 관리 / 종료 예정만 노출 ──
  function applyGuestRestrictions(role) {
    if (role !== 'guest') return;
    ['navlabel-finance', 'nav-settle', 'nav-users', 'nav-notice',
     'navlabel-tools', 'nav-adclassify', 'nav-rank', 'nav-receipt-test'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
  }

  window.loadQuickNewReceipts = function() {
    const today = new Date().toISOString().slice(0, 10);
    window.loadPage('접수관리.html', document.getElementById('nav-pending'), () => {
      const el = document.getElementById('filter-date-from');
      if (el) {
        el.value = today;
        const lbl = document.getElementById('date-label');
        const clr = document.getElementById('date-clear-btn');
        const btn = document.getElementById('date-pick-btn');
        if (lbl) lbl.textContent = today;
        if (clr) clr.style.display = 'inline';
        if (btn) btn.style.color = 'var(--text)';
      }
    });
  };
  window.loadQuickUnpaid = function() {
    window.loadPage('정산관리.html', document.getElementById('nav-settle'), () => {
      const el = document.getElementById('sf-paid');
      if (el) el.value = 'unpaid';
    });
  };
  window.loadQuickExpireSoon = function() {
    window.loadPage('종료예정.html', document.getElementById('nav-expire'), () => {
      const el = document.getElementById('ef-range');
      if (el) el.value = '3';
    });
  };
  window.loadQuickPendingUsers = function() {
    window.loadPage('회원관리.html', document.getElementById('nav-users'), () => {
      const el = document.getElementById('u-status');
      if (el) el.value = 'pending';
    });
  };

  const PAGE_TITLES = {
    '진행현황.html':'진행 현황', '접수관리.html':'접수 관리',
    '종료예정.html':'종료 예정 현황', '정산관리.html':'정산 관리',
    '회원관리.html':'회원 관리', '공지사항.html':'공지사항',
    '광고분류.html':'광고 분류', '순위조회.html':'순위 조회',
  };

  window.loadPage = async function(page, navEl, afterLoad) {
    const myGen = ++navGen;
    window.closeSidebar?.();
    if (navEl) {
      document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      navEl.classList.add('active');
    }
    document.getElementById('page-heading').textContent = PAGE_TITLES[page] || page;

    const area = document.getElementById('content-area');
    area.innerHTML = '<div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div>';

    try {
      const res = await fetch(page + '?v=' + Date.now());
      if (!res.ok) throw new Error();
      const html = await res.text();
      if (myGen !== navGen) return; // 대기 중 다른 메뉴로 이동한 경우 렌더 중단

      const doc = new DOMParser().parseFromString(html, 'text/html');
      area.innerHTML = '';

      doc.body.childNodes.forEach(node => {
        if (node.nodeName !== 'SCRIPT') {
          area.appendChild(document.importNode(node, true));
        }
      });

      if (afterLoad) afterLoad();

      doc.body.querySelectorAll('script').forEach(old => {
        const blob = new Blob([old.textContent], { type: 'application/javascript' });
        const url  = URL.createObjectURL(blob);
        const s    = document.createElement('script');
        s.src      = url;
        document.body.appendChild(s);
        s.onload  = () => URL.revokeObjectURL(url);
        s.onerror = () => URL.revokeObjectURL(url);
      });

      lucide.createIcons();
      window.scrollTo(0, 0);
    } catch(err) {
      console.error('loadPage error:', err);
      if (myGen !== navGen) return; // 대기 중 다른 메뉴로 이동한 경우 에러 화면도 표시하지 않음
      area.innerHTML = `<div style="padding:80px;text-align:center;background:#fff;border-radius:16px;border:1px solid var(--border)">
        <p style="color:var(--text2);font-size:14px">${page} 파일을 찾을 수 없습니다.</p></div>`;
    }
  };

  // ── Firebase 실시간 리스너 ────────────────────────────────
  // ※ 전체 캠페인 _key를 seenSlotKeys로 누적 관리.
  //   한 번도 본 적 없는 key가 생겼을 때만 알림 → 상태 변경은 key가 그대로라 무시됨.
  let notifTimer    = null;
  let seenSlotKeys  = null;  // null = 첫 스냅샷 수신 전
  let pendingDiff   = 0;

  HA.onSlotsChange(slots => {
    const pendingSlots = slots.filter(s => s.status === 'pending');
    const n = pendingSlots.length;

    // 배지 업데이트
    const el = document.getElementById('pending-badge');
    if (el) { el.textContent = n; el.style.display = n > 0 ? '' : 'none'; }

    // Firebase 연결 성공 표시
    const pill = document.getElementById('status-pill');
    if (pill) { pill.textContent = '● 연결됨'; pill.className = 'status-pill ok'; }

    // 전체 캠페인 key 집합 (status 무관)
    const allKeys = new Set(slots.map(s => s._key));

    if (seenSlotKeys === null) {
      // 첫 스냅샷: 현재 존재하는 모든 key를 기준으로 저장, 알림 없음
      seenSlotKeys = allKeys;
      renderNotifPanel();
      return;
    }

    // 지금까지 한 번도 본 적 없는 key = 진짜 신규 접수
    const brandNewKeys = [...allKeys].filter(k => !seenSlotKeys.has(k));

    // 새로 본 key는 누적 등록 (삭제하지 않음 — 승인해도 key 기억 유지)
    brandNewKeys.forEach(k => seenSlotKeys.add(k));

    // 신규 key 중 pending 상태인 것만 알림 대상
    const newPendingCount = brandNewKeys.filter(k => {
      const s = slots.find(sl => sl._key === k);
      return s && s.status === 'pending';
    }).length;

    if (newPendingCount > 0) {
      pendingDiff += newPendingCount;
      if (notifTimer) clearTimeout(notifTimer);
      notifTimer = setTimeout(() => {
        notifications.unshift({
          title: `📥 새 캠페인 접수 ${pendingDiff}건`,
          desc:  `승인 대기 총 ${n}건 · ${new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`,
          page:  '접수관리.html',
          navId: 'nav-pending',
        });
        pendingDiff = 0;
        notifTimer  = null;
        commitNotifs();
      }, 1500);
    }

    renderNotifPanel();
  });

  // ── 회원관리 배지 (신규 미승인 회원) ──────────────────────
  let newUserTimer  = null;
  let knownUserKeys = null;  // 초기화 전: null
  let pendingUserDiff = 0;

  HA.onUsersChange && HA.onUsersChange(users => {
    const pendingUsers = users.filter(u => u.approved === false || u.approved === undefined);
    const n = pendingUsers.length;

    const el = document.getElementById('users-badge');
    if (el) { el.textContent = n; el.style.display = n > 0 ? '' : 'none'; }

    const currentKeys = new Set(pendingUsers.map(u => u._key));

    if (knownUserKeys === null) {
      // 첫 스냅샷: 기준값만 저장
      knownUserKeys = currentKeys;
      return;
    }

    // 이전에 없던 _key 가 새로 생긴 경우만 → 진짜 신규 가입
    const addedCount = [...currentKeys].filter(k => !knownUserKeys.has(k)).length;
    knownUserKeys = currentKeys;

    if (addedCount > 0) {
      pendingUserDiff += addedCount;
      if (newUserTimer) clearTimeout(newUserTimer);
      newUserTimer = setTimeout(() => {
        notifications.unshift({
          title: `👤 신규 회원 가입 ${pendingUserDiff}건`,
          desc:  `승인 대기 총 ${n}건 · ${new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})}`,
          page:  '회원관리.html',
          navId: 'nav-users',
        });
        pendingUserDiff = 0;
        newUserTimer    = null;
        commitNotifs();
      }, 1500);
    }
  });

  // ── 정산관리 배지 (미정산 건) ──────────────────────────────
  HA.onSettlementsChange(n => {
    const el = document.getElementById('settle-badge');
    if (el) { el.textContent = n; el.style.display = n > 0 ? '' : 'none'; }
  });

  // ── 앱 시작 ───────────────────────────────────────────────
  async function init() {
    if (sessionStorage.getItem('ha_admin_auth') !== '1') {
      location.href = 'admin-login.html';
      return;
    }
    // 사이드바 유저 정보 표시
    const cur = HA.getCurrentUser();
    if (cur) {
      const nameEl   = document.getElementById('sidebar-name');
      const roleEl   = document.getElementById('sidebar-role');
      const avatarEl = document.getElementById('sidebar-avatar');
      if (nameEl)   nameEl.textContent   = cur.name || cur.username;
      if (roleEl)   roleEl.textContent   = cur.role === 'admin' ? 'Super Admin' : (cur.role === 'guest' ? '게스트' : '담당자');
      if (avatarEl) avatarEl.textContent = (cur.name || cur.username).charAt(0).toUpperCase();
    }
    applyGuestRestrictions(cur?.role);
    document.body.style.display = 'flex';
    lucide.createIcons();
    await HA.seedIfEmpty();
    // seedIfEmpty를 기다리는 사이 사용자가 이미 다른 메뉴를 클릭했다면(navGen 증가)
    // 기본 랜딩 화면(대시보드/진행현황) 렌더는 건너뛴다 — 클릭 결과를 덮어쓰지 않도록.
    if (navGen === 0) {
      if (cur?.role === 'guest') {
        await loadPage('진행현황.html', document.getElementById('nav-slots'));
      } else {
        await renderDashboard();
      }
    }
    lucide.createIcons();
  }

  // ── 사이드바 토글 (모바일) ──────────────────────────────────
  window.toggleSidebar = function() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  };
  window.closeSidebar = function() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  };

  init();
</script>
</body>
</html>
