<div id="settle-page">
<style>
  #settle-page .summary-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
  #settle-page .sum-card { background:#fff; border:1px solid var(--border); border-radius:12px; padding:20px 24px; position:relative; overflow:hidden; }
  #settle-page .sum-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
  #settle-page .sum-card.month::after { background:var(--accent); }
  #settle-page .sum-card.today::after { background:var(--info); }
  #settle-page .sum-card .sc-label { font-size:11px; color:var(--text2); font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
  #settle-page .sum-card.month .sc-value { font-size:28px; font-weight:800; color:var(--accent); line-height:1; }
  #settle-page .sum-card.today .sc-value { font-size:28px; font-weight:800; color:var(--info); line-height:1; }
  #settle-page .sum-card .sc-sub { font-size:12px; color:var(--muted); margin-top:6px; }
  #settle-page .sum-card.clickable { cursor:pointer; transition:box-shadow .15s, transform .15s; }
  #settle-page .sum-card.clickable:hover { box-shadow:0 4px 20px rgba(0,0,0,.1); transform:translateY(-2px); }
  #settle-page .sum-card.clickable .sc-label::after { content:' ↗'; font-size:10px; opacity:.5; }
  .total-popup-box { background:#fff;border-radius:16px;width:580px;max-height:85vh;overflow-y:auto;padding:24px 28px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  #settle-page .filter-bar { background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  #settle-page select, #settle-page input { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none; }
  #settle-page .tbl-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow-x:auto; }
  #settle-page table { width:100%; border-collapse:collapse; font-size:12px; }
  #settle-page thead th { background:#1e293b; color:#fff; padding:11px 7px; font-weight:500; border-right:1px solid #2d3f55; white-space:nowrap; text-align:center; font-size:11px; }
  #settle-page tbody td { padding:10px 7px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
  #settle-page tbody tr:last-child td { border-bottom:none; }
  #settle-page tbody tr:hover { background:#f8fafc; }
  .agency-link { color:var(--info); font-weight:700; cursor:pointer; text-decoration:underline; }
  .agency-link:hover { color:var(--accent); }
  .paid-badge   { background:rgba(16,185,129,.1); color:#059669; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
  .unpaid-badge { background:rgba(239,68,68,.1); color:var(--danger); padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
  .partial-badge{ background:rgba(245,158,11,.1); color:#b45309; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
  .btn-refund   { background:rgba(239,68,68,.1); color:var(--danger); padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; margin-right:4px; }
  .action-btn  { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-confirm { background:var(--accent); color:#fff; }
  .empty-row td { height:200px; text-align:center; color:var(--muted); font-size:13px; }
  .pagination { display:flex;justify-content:center;gap:5px;margin-top:16px; }
  .pg-btn { width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center; }
  .pg-btn.active { background:var(--info);color:#fff;border-color:var(--info); }
  .loading-wrap { display:flex;align-items:center;justify-content:center;height:120px;color:var(--muted);font-size:13px;gap:8px; }
  .spinner { width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .sp-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px; }
  .sp-box { background:#fff;border-radius:16px;width:640px;max-height:85vh;overflow-y:auto;padding:24px 28px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .sp-title { font-size:17px;font-weight:800;margin-bottom:2px; }
  .sp-sub { font-size:12px;color:var(--muted);margin-bottom:16px; }
  .sp-cards { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px; }
  .sp-card { background:#f8fafc;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden; }
  .sp-card::after { content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border); }
  .sp-card.c-green::after { background:var(--accent); }
  .sp-card.c-blue::after  { background:var(--info); }
  .sp-card.c-red::after   { background:var(--danger); }
  .sp-card-label { font-size:11px;color:var(--text2);font-weight:600;margin-bottom:8px; }
  .sp-card-value { font-size:20px;font-weight:800;line-height:1; }
  .sp-section { font-size:13px;font-weight:700;margin-bottom:8px;margin-top:16px;color:var(--text); }
  .sp-tbl { width:100%;border-collapse:collapse;font-size:12px; }
  .sp-tbl th { background:#1e293b;color:#fff;padding:8px 8px;font-weight:500;text-align:center;white-space:nowrap; }
  .sp-tbl td { padding:8px 8px;border-bottom:1px solid var(--border);text-align:center;color:var(--text2);white-space:nowrap; }
  .sp-tbl tr:last-child td { border-bottom:none; }
  .sp-footer { display:flex;justify-content:flex-end;margin-top:20px; }
  .btn-close-sp { padding:9px 24px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    #settle-page .summary-grid { grid-template-columns: 1fr 1fr !important; }
    #settle-page .filter-bar { flex-wrap: wrap; gap: 6px; }
    #settle-page .filter-bar > * { flex: 1 1 calc(50% - 6px); min-width: 120px; }
    #settle-page .filter-bar > div[style*="margin-left:auto"] { flex: 1 1 100%; margin-left: 0 !important; }
    #settle-page .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #settle-page table { min-width: 700px; }
    .sp-box { width: calc(100vw - 32px); padding: 20px; }
    .sp-cards { grid-template-columns: 1fr; }
  }
</style>

<div class="summary-grid" id="settle-summary">
  <div style="grid-column:1/-1"><div class="loading-wrap"><div class="spinner"></div> 로드 중...</div></div>
</div>

<div class="filter-bar">
  <select id="sf-paid" onchange="renderSettle(false)">
    <option value="">정산상태 전체</option>
    <option value="paid">정산완료</option>
    <option value="unpaid">미정산</option>
  </select>
  <div style="position:relative;display:flex;align-items:center;">
    <button id="sf-date-btn" onclick="document.getElementById('sf-from').showPicker?document.getElementById('sf-from').showPicker():document.getElementById('sf-from').focus()" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);white-space:nowrap;">
      📅 <span id="sf-date-label">접수일 선택</span>
    </button>
    <input type="date" id="sf-from" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" onchange="onSettleDateChange()">
    <button id="sf-date-clear" onclick="clearSettleDate()" style="display:none;margin-left:4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;" title="날짜 초기화">✕</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <input type="text" id="sf-kw" placeholder="대행사/아이디 검색" style="width:180px;">
    <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderSettle()">검색</button>
    <button class="action-btn" style="background:#fff;border:1px solid var(--border);padding:6px 12px;" onclick="exportSettleCSV()">엑셀 다운로드</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>접수일시</th><th>대행사</th><th>유저ID</th><th>캠페인 수</th>
        <th>일 목표 합산</th><th>단가(원)</th><th>정산 금액(VAT 별도)</th><th>입금액(VAT 포함)</th><th>환불금액</th><th>정산상태</th><th>처리 담당자</th><th>액션</th>
      </tr>
    </thead>
    <tbody id="settle-body">
      <tr><td colspan="11"><div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div></td></tr>
    </tbody>
  </table>
</div>
<div class="pagination" id="settle-pagination"></div>

<script>
(function(){
  let sPage=1; const PER=20;
  let allSlots=[],allUsers=[],paidSet=new Set(),refundMap={};
  let snapshotMap={};
  const todayStr=new Date().toISOString().slice(0,10);

  function refundKey(timeKey,agencyId,userId){const safe=s=>s.replace(/[.#$\[\]]/g,'_');return `${safe(timeKey)}__${safe(agencyId)}__${safe(userId)}`;}
  function getRefund(timeKey,agencyId,userId){return refundMap[refundKey(timeKey,agencyId,userId)]||0;}
  function getPrice(userId){const u=allUsers.find(u=>u.username===userId);return u?(u.unitPrice||0):0;}
  // 슬롯 저장 단가 우선, 없거나 0이면 현재 유저 단가 (기존 데이터 호환)
  function getSlotPrice(s){return (s.unitPrice!=null&&s.unitPrice!==''&&s.unitPrice>0)?s.unitPrice:getPrice(s.userId);}

  // 분 단위 키
  function getMinuteKey(isoStr){
    if(!isoStr) return 'unknown';
    const d=new Date(isoStr);
    const yyyy=d.getFullYear();
    const mo=String(d.getMonth()+1).padStart(2,'0');
    const dd=String(d.getDate()).padStart(2,'0');
    const hh=String(d.getHours()).padStart(2,'0');
    const mn=String(d.getMinutes()).padStart(2,'0');
    return `${yyyy}-${mo}-${dd} ${hh}:${mn}`;
  }

  function fmtDatetime(isoStr){
    if(!isoStr) return '-';
    const d=new Date(isoStr);
    const date=isoStr.slice(0,10);
    const hh=String(d.getHours()).padStart(2,'0');
    const mm=String(d.getMinutes()).padStart(2,'0');
    const ss=String(d.getSeconds()).padStart(2,'0');
    return `${date}<br><span style="color:var(--accent);font-size:11px">${hh}:${mm}:${ss}</span>`;
  }

  function calcGroup(g){
    const p   = getSlotPrice(g.slots[0]); // 표시용 단가 (첫 슬롯 기준)
    const tot = g.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
    const amt = g.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
    return {p, tot, amt};
  }

  // 분 단위 + 대행사 + 유저ID 그룹핑
  function groupByTimeAgency(slots){
    const map={};
    slots.forEach(s=>{
      const t=getMinuteKey(s.createdAt);
      const k=t+'||'+(s.agencyId||'-')+'||'+(s.userId||'-');
      if(!map[k])map[k]={timeKey:t, agencyId:s.agencyId||'-', userId:s.userId||'-', slots:[]};
      map[k].slots.push(s);
    });
    return Object.values(map).sort((a,b)=>b.timeKey.localeCompare(a.timeKey));
  }

  function getFiltered(){
    const paid=document.getElementById('sf-paid').value;
    const from=document.getElementById('sf-from').value;
    const kw=(document.getElementById('sf-kw').value||'').toLowerCase();
    return allSlots.filter(s=>s.status==='active'||s.status==='expired'||s.status==='pending').filter(s=>{
      if(paid==='paid'&&!paidSet.has(s._key))return false;
      if(paid==='unpaid'&&paidSet.has(s._key))return false;
      if(from&&(s.createdAt||'').slice(0,10)!==from)return false;
      if(kw&&![(s.agencyId||''),(s.userId||'')].some(v=>v.toLowerCase().includes(kw)))return false;
      return true;
    });
  }

  window.onSettleDateChange = function() {
    const val = document.getElementById('sf-from').value;
    if (val) {
      document.getElementById('sf-date-label').textContent = val;
      document.getElementById('sf-date-btn').style.color = 'var(--text)';
      document.getElementById('sf-date-clear').style.display = 'inline';
    }
    renderSettle();
  };

  window.clearSettleDate = function() {
    document.getElementById('sf-from').value = '';
    document.getElementById('sf-date-label').textContent = '접수일 선택';
    document.getElementById('sf-date-btn').style.color = 'var(--text2)';
    document.getElementById('sf-date-clear').style.display = 'none';
    renderSettle();
  };

  function renderSummary(){
    const base=allSlots.filter(s=>s.status==='active'||s.status==='expired'||s.status==='pending');
    const totalA=base.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
    const dS=base.filter(s=>(s.createdAt||'').slice(0,10)===todayStr);
    const dA=dS.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
    document.getElementById('settle-summary').innerHTML=`
      <div class="sum-card month clickable" onclick="openMonthPopup()">
        <div class="sc-label">총 매출액(VAT 별도)</div>
        <div class="sc-value">${totalA.toLocaleString()}<span style="font-size:14px;color:var(--muted);font-weight:400;margin-left:4px">원</span></div>
        <div class="sc-sub">${base.length}건 전체</div>
      </div>
      <div class="sum-card month clickable" onclick="openTotalPopup()">
        <div class="sc-label">총 입금액(VAT 포함)</div>
        <div class="sc-value">${Math.round(totalA*1.1).toLocaleString()}<span style="font-size:14px;color:var(--muted);font-weight:400;margin-left:4px">원</span></div>
        <div class="sc-sub">VAT 10% 포함</div>
      </div>
      <div class="sum-card today">
        <div class="sc-label">당일 매출액 (${todayStr})</div>
        <div class="sc-value">${dA.toLocaleString()}<span style="font-size:14px;color:var(--muted);font-weight:400;margin-left:4px">원</span></div>
        <div class="sc-sub">${dS.length}건 접수</div>
      </div>
      <div class="sum-card today">
        <div class="sc-label">당일 입금액</div>
        <div class="sc-value">${Math.round(dA*1.1).toLocaleString()}<span style="font-size:14px;color:var(--muted);font-weight:400;margin-left:4px">원</span></div>
        <div class="sc-sub">VAT 10% 포함</div>
      </div>`;
  }

  window.openMonthPopup = function() {
    const now = new Date();
    const curYear  = now.getFullYear();
    const curMonth = now.getMonth() + 1;
    const curYM    = `${curYear}-${String(curMonth).padStart(2,'0')}`;
    const monthLabel = `${curMonth}월`;

    const base = allSlots.filter(s => s.status==='active' || s.status==='expired' || s.status==='pending');
    const monthSlots = base.filter(s => (s.createdAt||'').slice(0,7) === curYM);

    const byDay = {};
    monthSlots.forEach(s => {
      const d = (s.createdAt||'').slice(0,10);
      if (!byDay[d]) byDay[d] = { slots:[] };
      byDay[d].slots.push(s);
    });

    const monthTotal = monthSlots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);

    const dRows = Object.keys(byDay).sort().reverse().map(d => {
      const grp = byDay[d];
      const amt = grp.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
      const tgt = grp.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
      return `<tr>
        <td style="font-weight:600">${d}</td>
        <td>${grp.slots.length}건</td>
        <td>${tgt.toLocaleString()}</td>
        <td style="font-weight:700;color:var(--accent)">${amt.toLocaleString()}원</td>
        <td style="font-weight:700;color:var(--info)">${Math.round(amt*1.1).toLocaleString()}원</td>
      </tr>`;
    }).join('');

    const ov = document.createElement('div');
    ov.className = 'sp-overlay';
    ov.innerHTML = `<div class="total-popup-box">
      <div class="sp-title">${curYear}년 ${monthLabel} 정산 현황</div>
      <div class="sp-sub">${curYM} · 일자별 합산</div>
      <div class="sp-cards">
        <div class="sp-card c-green"><div class="sp-card-label">${monthLabel} 매출액(VAT 별도)</div><div class="sp-card-value" style="color:var(--accent)">${monthTotal.toLocaleString()}원</div></div>
        <div class="sp-card c-blue"><div class="sp-card-label">${monthLabel} 입금액(VAT 포함)</div><div class="sp-card-value" style="color:var(--info)">${Math.round(monthTotal*1.1).toLocaleString()}원</div></div>
      </div>
      <div class="sp-section">일자별 합산</div>
      <table class="sp-tbl">
        <thead><tr><th>날짜</th><th>캠페인 수</th><th>일목표 합산</th><th>정산 금액(VAT 별도)</th><th>입금액(VAT 포함)</th></tr></thead>
        <tbody>${dRows||'<tr><td colspan="5" style="color:var(--muted);padding:16px;text-align:center">데이터 없음</td></tr>'}</tbody>
      </table>
      <div class="sp-footer"><button class="btn-close-sp" onclick="this.closest('.sp-overlay').remove()">닫기</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  };

  window.openTotalPopup = function() {
    const base = allSlots.filter(s=>s.status==='active'||s.status==='expired'||s.status==='pending');
    const byMonth = {};
    base.forEach(s => {
      const m = (s.createdAt||'').slice(0,7);
      if (!byMonth[m]) byMonth[m] = { slots:[] };
      byMonth[m].slots.push(s);
    });
    let grandTotal = 0;
    const mRows = Object.keys(byMonth).sort().reverse().map(m => {
      const mv  = byMonth[m];
      const amt = mv.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
      const tgt = mv.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
      grandTotal += amt;
      return `<tr>
        <td style="font-weight:600">${m}</td>
        <td>${mv.slots.length}건</td>
        <td>${tgt.toLocaleString()}</td>
        <td style="font-weight:700;color:var(--accent)">${amt.toLocaleString()}원</td>
        <td style="font-weight:700;color:var(--info)">${Math.round(amt*1.1).toLocaleString()}원</td>
      </tr>`;
    }).join('');
    const ov = document.createElement('div');
    ov.className = 'sp-overlay';
    ov.innerHTML = `<div class="total-popup-box">
      <div class="sp-title">전체 정산 합산</div>
      <div class="sp-sub">전체 기간 · 모든 대행사 합산</div>
      <div class="sp-cards">
        <div class="sp-card c-green"><div class="sp-card-label">총 매출액(VAT 별도)</div><div class="sp-card-value" style="color:var(--accent)">${grandTotal.toLocaleString()}원</div></div>
        <div class="sp-card c-blue"><div class="sp-card-label">총 입금액(VAT 포함)</div><div class="sp-card-value" style="color:var(--info)">${Math.round(grandTotal*1.1).toLocaleString()}원</div></div>
      </div>
      <div class="sp-section">월별 합산</div>
      <table class="sp-tbl">
        <thead><tr><th>월</th><th>캠페인 수</th><th>월별 목표 합산</th><th>정산 금액(VAT 별도)</th><th>입금액(VAT 포함)</th></tr></thead>
        <tbody>${mRows||'<tr><td colspan="5" style="color:var(--muted);padding:16px;text-align:center">데이터 없음</td></tr>'}</tbody>
      </table>
      <div class="sp-footer"><button class="btn-close-sp" onclick="this.closest('.sp-overlay').remove()">닫기</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.remove(); });
  };

  window.renderSettle=async function(resetPage = true){
    if (resetPage) sPage = 1;
    document.getElementById('settle-body').innerHTML='<tr><td colspan="12"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>';
    [allSlots,allUsers,paidSet]=await Promise.all([HA.getSlots(),HA.getUsers(),HA.getPaidSet()]);
    try { refundMap = (await HA.getRefunds()) || {}; } catch(e) { refundMap={}; }
    snapshotMap={};
    try { snapshotMap = await HA.getAllSettleSnapshots(); } catch(e) { snapshotMap={}; }

    renderSummary();
    const rows=groupByTimeAgency(getFiltered());
    const start=(sPage-1)*PER;
    const list=rows.slice(start,start+PER);
    const body=document.getElementById('settle-body');
    if(!list.length){body.innerHTML='<tr class="empty-row"><td colspan="12">데이터가 없습니다.</td></tr>';return;}
    body.innerHTML=list.map(g=>{
      const {p, tot, amt} = calcGroup(g);
      const refund = getRefund(g.timeKey,g.agencyId,g.userId);
      const netAmt = amt-refund;
      const netVat = Math.round(netAmt*1.1);
      const pc     = g.slots.filter(s=>paidSet.has(s._key)).length;
      const allP   = pc===g.slots.length;
      const badge  = allP?'<span class="paid-badge">정산완료</span>':pc>0?'<span class="partial-badge">일부완료</span>':'<span class="unpaid-badge">미정산</span>';
      const ea     = encodeURIComponent(g.agencyId);
      const eu     = encodeURIComponent(g.userId);
      const et     = encodeURIComponent(g.timeKey);
      const safe   = s=>s.replace(/[.#$[\]/]/g,'_');
      const snapKey= `${safe(g.timeKey)}__${safe(g.agencyId)}__${safe(g.userId)}`;
      const snap   = snapshotMap[snapKey];
      const confirmedByName = snap?.confirmedByName || snap?.confirmedBy || '';
      const confirmedAt = snap?.confirmedAt ? new Date(snap.confirmedAt).toLocaleString('ko-KR',{timeZone:'Asia/Seoul',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      const staffCell = allP && confirmedByName
        ? `<span style="font-size:11px;font-weight:700;color:var(--info)">${confirmedByName}</span>${confirmedAt?`<br><span style="font-size:10px;color:var(--muted)">${confirmedAt}</span>`:''}`
        : `<span style="color:var(--muted);font-size:11px">-</span>`;
      const repTime = g.slots.map(s=>s.createdAt||'').sort()[0];
      return `<tr>
        <td style="color:var(--text2);font-size:11px">${fmtDatetime(repTime)}</td>
        <td><span class="agency-link" onclick="openAgencyPopup(decodeURIComponent('${ea}'),decodeURIComponent('${eu}'))">${g.agencyId}</span></td>
        <td>${g.userId}</td>
        <td>${g.slots.length}건</td>
        <td><strong>${tot.toLocaleString()}</strong></td>
        <td style="color:var(--text2)">${p.toLocaleString()}원</td>
        <td style="font-weight:700;color:var(--accent)">${netAmt.toLocaleString()}원</td>
        <td style="font-weight:700;color:var(--info)">${netVat.toLocaleString()}원</td>
        <td style="color:var(--danger);font-weight:700">${refund>0?refund.toLocaleString()+'원':'-'}</td>
        <td>${badge}</td>
        <td>${staffCell}</td>
        <td style="white-space:nowrap;">
          <div style="display:flex;gap:4px;justify-content:center;align-items:center;">
          <button class="btn-refund" onclick="setRefund(decodeURIComponent('${et}'),decodeURIComponent('${ea}'),decodeURIComponent('${eu}'))">환불</button>
          <button class="action-btn" style="${allP?'background:#f1f5f9;color:var(--text2)':'background:var(--accent);color:#fff'}"
            onclick="bulkRow(decodeURIComponent('${et}'),decodeURIComponent('${ea}'),decodeURIComponent('${eu}'))">${allP?'취소':'입금확인'}</button>
          </div>
        </td>
      </tr>`;
    }).join('');
    const pages=Math.ceil(rows.length/PER)||1;
    const pg=document.getElementById('settle-pagination');
    let ph=`<button class="pg-btn" onclick="goSP(1)">&laquo;</button><button class="pg-btn" onclick="goSP(${Math.max(1,sPage-1)})">&lsaquo;</button>`;
    for(let i=1;i<=pages;i++)ph+=`<button class="pg-btn ${i===sPage?'active':''}" onclick="goSP(${i})">${i}</button>`;
    ph+=`<button class="pg-btn" onclick="goSP(${Math.min(pages,sPage+1)})">&rsaquo;</button><button class="pg-btn" onclick="goSP(${pages})">&raquo;</button>`;
    pg.innerHTML=ph;
  };

  window.goSP=n=>{sPage=n;renderSettle(false);};

  window.setRefund=async function(timeKey,agencyId,userId){
    const current=getRefund(timeKey,agencyId,userId);
    const existing=document.getElementById('refund-modal');
    if(existing) existing.remove();
    const modal=document.createElement('div');
    modal.id='refund-modal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;';
    modal.innerHTML=`
      <div style="background:#fff;border-radius:16px;padding:28px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.2);">
        <div style="font-size:15px;font-weight:700;margin-bottom:6px;">환불 금액 입력</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:20px;">${agencyId} · ${timeKey}</div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
          <span style="font-size:12px;color:var(--text2);">현재 환불금액</span>
          <span style="font-weight:700;color:var(--danger);">${current.toLocaleString()}원</span>
        </div>
        <div style="margin-bottom:20px;">
          <label style="display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:6px;">환불금액 (0 입력 시 삭제)</label>
          <input id="refund-input" type="number" value="${current||''}" placeholder=""
            style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button onclick="document.getElementById('refund-modal').remove()"
            style="padding:9px 20px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit;">취소</button>
          <button id="refund-confirm-btn"
            style="padding:9px 20px;border:none;border-radius:8px;background:var(--danger);color:#fff;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;">저장</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    document.getElementById('refund-input').focus();
    document.getElementById('refund-confirm-btn').onclick=async()=>{
      const val=Number(document.getElementById('refund-input').value)||0;
      const key=refundKey(timeKey,agencyId,userId);
      await HA.setRefundAmount(key,val);
      refundMap[key]=val;
      modal.remove();
      renderSettle(false);
    };
    modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
  };

  window.bulkRow=async function(timeKey,agencyId,userId){
    const keys=allSlots.filter(s=>getMinuteKey(s.createdAt)===timeKey&&s.agencyId===agencyId&&s.userId===userId).map(s=>s._key);
    const allP=keys.every(k=>paidSet.has(k));
    const nowPaid=!allP;
    const currentUser=HA.getCurrentUser?HA.getCurrentUser():null;
    const staffName=currentUser?(currentUser.name||currentUser.username):'알 수 없음';
    const staffId=currentUser?currentUser.username:'-';
    if(nowPaid){
      const slots=allSlots.filter(s=>getMinuteKey(s.createdAt)===timeKey&&s.agencyId===agencyId&&s.userId===userId);
      const p=getPrice(userId);
      const tot=slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
      const amt=slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
      const refund=getRefund(timeKey,agencyId,userId);
      const safe=s=>s.replace(/[.#$[\]/]/g,'_');
      const snapKey=`${safe(timeKey)}__${safe(agencyId)}__${safe(userId)}`;
      const snap={slotCount:slots.length,totalTarget:tot,amount:amt,unitPrice:p,refund,agencyId,userId,timeKey,
        confirmedAt:new Date().toISOString(),confirmedBy:staffId,confirmedByName:staffName};
      await HA.saveSettleSnapshot(snapKey,snap,true);
    } else {
      const safe=s=>s.replace(/[.#$[\]/]/g,'_');
      const snapKey=`${safe(timeKey)}__${safe(agencyId)}__${safe(userId)}`;
      try{await HA.deleteSettleSnapshot(snapKey);}catch(e){}
    }
    await Promise.all(keys.map(k=>HA.setPaid(k,nowPaid)));
    renderSettle(false);
  };

  window.openAgencyPopup=function(agencyId,userId){
    const ag=allSlots.filter(s=>(s.status==='active'||s.status==='expired'||s.status==='pending')&&s.agencyId===agencyId&&s.userId===userId);
    const bm={},bd={};
    ag.forEach(s=>{
      const m=(s.createdAt||'').slice(0,7); if(!bm[m])bm[m]=[]; bm[m].push(s);
      const d=(s.createdAt||'').slice(0,10); if(!bd[d])bd[d]=[]; bd[d].push(s);
    });
    const totA=ag.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
    const totTgt=ag.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
    const paidA=ag.filter(s=>paidSet.has(s._key)).reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
    const p=getPrice(userId); // 현재 단가 표시용
    const safe=s=>s.replace(/[.#$[\]/]/g,'_');
    const totalRefund=Object.keys(refundMap).filter(k=>k.includes(`__${safe(agencyId)}__${safe(userId)}`)).reduce((a,k)=>a+(refundMap[k]||0),0);
    const netTotA=totA-totalRefund;
    const mRows=Object.keys(bm).sort().reverse().map(m=>{
      const ms=bm[m];
      const mt=ms.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
      const ma=ms.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
      const mr=Object.keys(refundMap).filter(k=>k.includes(m+`__${safe(agencyId)}__${safe(userId)}`)).reduce((a,k)=>a+(refundMap[k]||0),0);
      const net=ma-mr;
      return `<tr><td style="font-weight:600">${m}</td><td>${ms.length}건</td><td>${mt.toLocaleString()}</td><td style="font-weight:700;color:var(--accent)">${net.toLocaleString()}원</td><td style="font-weight:700;color:var(--info)">${Math.round(net*1.1).toLocaleString()}원</td></tr>`;
    }).join('');
    const dRows=Object.keys(bd).sort().reverse().map(d=>{
      const ds=bd[d];
      const dt=ds.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
      const da=ds.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
      const dr=Object.keys(refundMap).filter(k=>k.startsWith(d+`__${safe(agencyId)}__${safe(userId)}`)).reduce((a,k)=>a+(refundMap[k]||0),0);
      const net=da-dr;
      return `<tr><td>${d}</td><td>${ds.length}건</td><td>${dt.toLocaleString()}</td><td style="font-weight:700;color:var(--accent)">${net.toLocaleString()}원</td><td style="font-weight:700;color:var(--info)">${Math.round(net*1.1).toLocaleString()}원</td></tr>`;
    }).join('');
    const ov=document.createElement('div');
    ov.className='sp-overlay';
    ov.innerHTML=`<div class="sp-box">
      <div class="sp-title">${agencyId}</div>
      <div class="sp-sub">유저ID: ${userId} · 단가: ${p.toLocaleString()}원/개</div>
      <div class="sp-cards">
        <div class="sp-card c-green"><div class="sp-card-label">총 정산 금액(VAT 별도)</div><div class="sp-card-value" style="color:var(--accent)">${netTotA.toLocaleString()}원</div></div>
        <div class="sp-card c-blue"><div class="sp-card-label">총 입금액(VAT 포함)</div><div class="sp-card-value" style="color:var(--info)">${Math.round(netTotA*1.1).toLocaleString()}원</div></div>
        <div class="sp-card c-green"><div class="sp-card-label">총 목표 합산</div><div class="sp-card-value" style="color:var(--accent)">${totTgt.toLocaleString()}<small style="font-size:13px;font-weight:400;color:var(--muted)"> 개</small></div></div>
        <div class="sp-card c-red"><div class="sp-card-label">환불금액</div><div class="sp-card-value" style="color:var(--danger)">${totalRefund.toLocaleString()}원</div></div>
      </div>
      <div class="sp-section">월별 합산</div>
      <table class="sp-tbl"><thead><tr><th>월</th><th>캠페인 수</th><th>월별 목표 합산</th><th>정산 금액(VAT 별도)</th><th>입금액(VAT 포함)</th></tr></thead>
        <tbody>${mRows||'<tr><td colspan="5" style="color:var(--muted);padding:16px;text-align:center">데이터 없음</td></tr>'}</tbody></table>
      <div class="sp-section">일별 합산</div>
      <table class="sp-tbl"><thead><tr><th>날짜</th><th>캠페인 수</th><th>일목표합산</th><th>정산 금액(VAT 별도)</th><th>입금액(VAT 포함)</th></tr></thead>
        <tbody>${dRows||'<tr><td colspan="5" style="color:var(--muted);padding:16px;text-align:center">데이터 없음</td></tr>'}</tbody></table>
      <div class="sp-footer"><button class="btn-close-sp" onclick="this.closest('.sp-overlay').remove()">닫기</button></div>
    </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click',e=>{if(e.target===ov)ov.remove();});
  };

  window.exportSettleCSV=function(){
    const rows=groupByTimeAgency(getFiltered());
    const lines=[['접수일시','대행사','유저ID','캠페인 수','일목표합산','단가','정산 금액(VAT 별도)','정산상태']];
    rows.forEach(g=>{
      const tot=g.slots.reduce((a,s)=>a+(s.dailyTarget||0)*(s.days||0),0);
      const amt=g.slots.reduce((ac,s)=>ac+(s.dailyTarget||0)*(s.days||0)*getSlotPrice(s),0);
      const p=getSlotPrice(g.slots[0]); // 표시용 단가
      lines.push([g.timeKey,g.agencyId,g.userId,g.slots.length,tot,p,amt,g.slots.every(s=>paidSet.has(s._key))?'완료':'미완료']);
    });
    const csv=lines.map(r=>r.join(',')).join('\n');
    const a=document.createElement('a');
    a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download=`정산내역_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  renderSettle(false);
})();
</script>
</div>
