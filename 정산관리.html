<div id="settle-page">
<style>
  #settle-page .type-grid {
    display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px;
  }
  #settle-page .type-card {
    background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px;
  }
  #settle-page .type-card .tc-title {
    font-size:13px; font-weight:700; color:var(--text); border-bottom:1px solid var(--border);
    padding-bottom:8px; margin-bottom:10px;
  }
  #settle-page .tc-row {
    display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;
  }
  #settle-page .tc-row .lbl { color:var(--text2); }
  #settle-page .tc-row .val { font-weight:600; color:var(--text); }
  #settle-page .tc-row .val.money { color:var(--accent); }

  #settle-page .filter-bar {
    background:#fff; border:1px solid var(--border); border-radius:10px;
    padding:12px 16px; display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;
  }
  #settle-page select, #settle-page input {
    padding:6px 10px; border:1px solid var(--border); border-radius:6px;
    font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none;
  }
  #settle-page .tbl-wrap {
    background:#fff; border:1px solid var(--border); border-radius:10px; overflow-x:auto;
  }
  #settle-page table { width:100%; min-width:1100px; border-collapse:collapse; font-size:12px; }
  #settle-page thead th {
    background:#1e293b; color:#fff; padding:11px 8px; font-weight:500;
    border-right:1px solid #2d3f55; white-space:nowrap; text-align:center;
  }
  #settle-page tbody td {
    padding:10px 8px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle;
  }
  #settle-page tbody tr:last-child td { border-bottom:none; }
  #settle-page tbody tr:hover { background:#f8fafc; }

  .paid-badge   { background:rgba(16,185,129,.1); color:#059669; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
  .unpaid-badge { background:rgba(239,68,68,.1);  color:var(--danger); padding:2px 8px; border-radius:10px; font-size:10px; font-weight:700; }
  .action-btn   { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-confirm  { background:var(--accent); color:#fff; }
  .btn-confirm:hover { background:var(--accent2); }
  .empty-row td { height:200px; text-align:center; color:var(--muted); font-size:13px; }
  .pagination { display:flex;justify-content:center;gap:5px;margin-top:16px; }
  .pg-btn { width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center; }
  .pg-btn.active { background:var(--info);color:#fff;border-color:var(--info); }
</style>

<!-- 타입별 요약 카드 -->
<div class="type-grid" id="settle-type-cards"></div>

<!-- 필터 -->
<div class="filter-bar">
  <select id="sf-type" onchange="renderSettle()">
    <option value="">슬롯타입 전체</option>
    ${HA.SLOT_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('')}
  </select>
  <select id="sf-paid" onchange="renderSettle()">
    <option value="">정산상태 전체</option>
    <option value="paid">정산완료</option>
    <option value="unpaid">미정산</option>
  </select>
  <div style="display:flex;align-items:center;background:#fff;border:1px solid var(--border);border-radius:6px;padding:4px 10px;gap:4px;">
    <input type="date" id="sf-from" style="border:none;outline:none;font-size:12px;width:110px;">
    <span style="color:var(--muted)">~</span>
    <input type="date" id="sf-to"   style="border:none;outline:none;font-size:12px;width:110px;">
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <input type="text" id="sf-kw" placeholder="대행사/아이디 검색" style="width:180px;">
    <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderSettle()">검색</button>
    <button class="action-btn" style="background:#fff;border:1px solid var(--border);padding:6px 12px;" onclick="exportCSV()">엑셀 다운로드</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="sf-all" onchange="toggleAll(this)"></th>
        <th>번호</th>
        <th>슬롯번호</th>
        <th>대행사</th>
        <th>유저ID</th>
        <th>슬롯타입</th>
        <th>스토어명</th>
        <th>시작일</th>
        <th>종료일</th>
        <th>유입수</th>
        <th>단가(원)</th>
        <th>정산금액</th>
        <th>정산상태</th>
        <th>확인</th>
      </tr>
    </thead>
    <tbody id="settle-body"></tbody>
  </table>
</div>
<div class="pagination" id="settle-pagination"></div>

<script>
(function(){
  let page = 1; const PER = 20;

  // 정산 상태는 별도 스토리지로 관리
  function getPaidSet() {
    return new Set(JSON.parse(localStorage.getItem('ha_paid_slots')||'[]'));
  }
  function setPaid(id, val) {
    const s = getPaidSet();
    val ? s.add(id) : s.delete(id);
    localStorage.setItem('ha_paid_slots', JSON.stringify([...s]));
  }

  function getUserPrice(userId) {
    const user = HA.getUsers().find(u=>u.username===userId);
    return user ? (user.unitPrice||0) : 0;
  }

  function renderTypeCards() {
    const slots   = HA.getSlots().filter(s=>s.status==='active'||s.status==='expired');
    const paidSet = getPaidSet();
    const cards   = document.getElementById('settle-type-cards');
    if(!cards) return;
    cards.innerHTML = HA.SLOT_TYPES.map(type => {
      const list = slots.filter(s=>s.slotType===type);
      const total = list.reduce((a,s)=>a+getUserPrice(s.userId),0);
      const paid  = list.filter(s=>paidSet.has(s.id)).reduce((a,s)=>a+getUserPrice(s.userId),0);
      const unpaid= total - paid;
      return `<div class="type-card">
        <div class="tc-title">${type}</div>
        <div class="tc-row"><span class="lbl">슬롯수</span><span class="val">${list.length}개</span></div>
        <div class="tc-row"><span class="lbl">총 정산</span><span class="val money">${total.toLocaleString()}원</span></div>
        <div class="tc-row"><span class="lbl">완료</span><span class="val" style="color:var(--accent)">${paid.toLocaleString()}원</span></div>
        <div class="tc-row"><span class="lbl">미완료</span><span class="val" style="color:var(--danger)">${unpaid.toLocaleString()}원</span></div>
      </div>`;
    }).join('');
  }

  function getFiltered() {
    const type  = document.getElementById('sf-type').value;
    const paid  = document.getElementById('sf-paid').value;
    const from  = document.getElementById('sf-from').value;
    const to    = document.getElementById('sf-to').value;
    const kw    = (document.getElementById('sf-kw').value||'').toLowerCase();
    const paidSet = getPaidSet();

    return HA.getSlots().filter(s=>s.status==='active'||s.status==='expired').filter(s=>{
      if(type && s.slotType!==type) return false;
      if(paid==='paid'   && !paidSet.has(s.id)) return false;
      if(paid==='unpaid' &&  paidSet.has(s.id)) return false;
      if(from && s.startDate < from) return false;
      if(to   && s.endDate   > to)   return false;
      if(kw && ![(s.agencyId||''),(s.userId||'')].some(v=>v.toLowerCase().includes(kw))) return false;
      return true;
    });
  }

  window.renderSettle = function() {
    renderTypeCards();
    const all = getFiltered();
    const paidSet = getPaidSet();
    const start = (page-1)*PER;
    const list  = all.slice(start, start+PER);

    const body = document.getElementById('settle-body');
    if(!list.length) {
      body.innerHTML='<tr class="empty-row"><td colspan="14">데이터가 없습니다.</td></tr>';
    } else {
      body.innerHTML = list.map((s,i)=>{
        const price = getUserPrice(s.userId);
        const isPaid = paidSet.has(s.id);
        return `<tr>
          <td><input type="checkbox" class="sf-check" data-id="${s.id}"></td>
          <td style="color:var(--text2)">${start+i+1}</td>
          <td style="color:var(--text2)">${s.id}</td>
          <td style="font-weight:600">${s.agencyId||'-'}</td>
          <td>${s.userId||'-'}</td>
          <td><span style="background:#f1f5f9;padding:2px 7px;border-radius:4px;font-size:11px">${s.slotType}</span></td>
          <td style="font-weight:500">${s.storeName||'-'}</td>
          <td style="color:var(--text2)">${s.startDate||'-'}</td>
          <td style="color:var(--text2)">${s.endDate||'-'}</td>
          <td><strong>${(s.inflow||0).toLocaleString()}</strong></td>
          <td>${price.toLocaleString()}</td>
          <td style="font-weight:700;color:var(--accent)">${price.toLocaleString()}원</td>
          <td>${isPaid?'<span class="paid-badge">정산완료</span>':'<span class="unpaid-badge">미정산</span>'}</td>
          <td>
            <button class="action-btn ${isPaid?'':'btn-confirm'}" style="${isPaid?'background:#f1f5f9;color:var(--text2)':''}"
              onclick="togglePaid(${s.id}, ${!isPaid})">${isPaid?'취소':'입금확인'}</button>
          </td>
        </tr>`;
      }).join('');
    }

    // pagination
    const pages = Math.ceil(all.length/PER)||1;
    const pg = document.getElementById('settle-pagination');
    let ph = `<button class="pg-btn" onclick="goSP(1)">&laquo;</button><button class="pg-btn" onclick="goSP(${Math.max(1,page-1)})">&lsaquo;</button>`;
    for(let i=1;i<=pages;i++) ph+=`<button class="pg-btn ${i===page?'active':''}" onclick="goSP(${i})">${i}</button>`;
    ph+=`<button class="pg-btn" onclick="goSP(${Math.min(pages,page+1)})">&rsaquo;</button><button class="pg-btn" onclick="goSP(${pages})">&raquo;</button>`;
    pg.innerHTML = ph;
  };

  window.goSP = n => { page=n; renderSettle(); };
  window.toggleAll = cb => document.querySelectorAll('.sf-check').forEach(c=>c.checked=cb.checked);

  window.togglePaid = function(id, val) {
    setPaid(id, val); renderSettle();
  };

  window.exportCSV = function() {
    const all = getFiltered();
    const paidSet = getPaidSet();
    const rows = [['슬롯번호','대행사','유저ID','슬롯타입','스토어명','시작일','종료일','유입수','정산금액','정산상태']];
    all.forEach(s=>{
      const price = getUserPrice(s.userId);
      rows.push([s.id, s.agencyId, s.userId, s.slotType, s.storeName, s.startDate, s.endDate, s.inflow||0, price, paidSet.has(s.id)?'완료':'미완료']);
    });
    const csv = rows.map(r=>r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = 'data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
    a.download = `정산내역_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  };

  renderSettle();
})();
</script>
</div>
