<div id="expire-page">
<style>
  #expire-page .summary-bar { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px 20px; display:flex; gap:40px; align-items:center; margin-bottom:14px; }
  #expire-page .sum-item .sum-label { font-size:11px; color:var(--text2); margin-bottom:4px; }
  #expire-page .sum-item .sum-val { font-size:20px; font-weight:800; }
  #expire-page .filter-bar { background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  #expire-page select, #expire-page input { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none; }
  #expire-page .tbl-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow-x:auto; }
  #expire-page table { width:100%; min-width:1200px; border-collapse:collapse; font-size:12px; }
  #expire-page thead th { background:#1e293b; color:#fff; padding:11px 8px; font-weight:500; border-right:1px solid #2d3f55; white-space:nowrap; text-align:center; }
  #expire-page tbody td { padding:10px 8px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
  #expire-page tbody tr:last-child td { border-bottom:none; }
  #expire-page tbody tr:hover { background:#f8fafc; }
  .dday-today  { background:#fef2f2; color:var(--danger); font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
  .dday-urgent { background:#fff7ed; color:#c2410c; font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
  .dday-soon   { background:#fefce8; color:#a16207; font-weight:700; padding:2px 8px; border-radius:4px; font-size:11px; }
  .dday-normal { background:#f0fdf4; color:#15803d; font-weight:600; padding:2px 8px; border-radius:4px; font-size:11px; }
  .action-btn  { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-extend  { background:#f0fdf4; color:#15803d; }
  .btn-cancel  { padding:8px 20px; border:1px solid var(--border); border-radius:7px; background:#fff; cursor:pointer; font-size:13px; }
  .empty-row td { height:200px; text-align:center; color:var(--muted); font-size:13px; }
  .loading-wrap { display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px;gap:8px; }
  .spinner { width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    #expire-page .summary-bar { flex-wrap: wrap; gap: 16px; padding: 14px; }
    #expire-page .sum-item { min-width: calc(50% - 8px); }
    #expire-page .filter-bar { flex-wrap: wrap; gap: 6px; }
    #expire-page .filter-bar > * { flex: 1 1 calc(50% - 6px); min-width: 120px; }
    #expire-page .filter-bar > div[style] { flex: 1 1 100%; margin-left: 0 !important; }
    #expire-page .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #expire-page table { min-width: 700px; }
  }
</style>

<div class="summary-bar" id="expire-summary">
  <div class="loading-wrap"><div class="spinner"></div> 로드 중...</div>
</div>

<div class="filter-bar">
  <select id="ef-range" onchange="renderExpire()">
    <option value="all" selected>전체 진행중</option>
    <option value="3">3일 이내</option>
    <option value="7">7일 이내</option>
    <option value="14">14일 이내</option>
  </select>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <input type="text" id="ef-kw" placeholder="스토어명 검색" style="width:180px;">
    <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderExpire()">검색</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>번호</th><th>대행사</th><th>유저ID</th><th>캠페인타입</th>
        <th>스토어명</th><th>MID</th><th>순위키워드</th><th>시작일</th><th>종료일</th>
        <th>일 목표</th><th>D-Day</th><th>액션</th><th>순위</th>
      </tr>
    </thead>
    <tbody id="expire-body">
      <tr><td colspan="13"><div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div></td></tr>
    </tbody>
  </table>
</div>

<script>
(function(){
  let allSlots = [];

  function getDday(endDate) {
    const today = new Date(); today.setHours(0,0,0,0);
    const end   = new Date(endDate); end.setHours(0,0,0,0);
    return Math.ceil((end - today) / 86400000);
  }

  function ddayBadge(d) {
    if(d === 0) return `<span class="dday-today">D-Day</span>`;
    if(d < 0)   return `<span class="dday-today">D+${Math.abs(d)}</span>`;
    if(d <= 1)  return `<span class="dday-today">D-${d}</span>`;
    if(d <= 3)  return `<span class="dday-urgent">D-${d}</span>`;
    if(d <= 7)  return `<span class="dday-soon">D-${d}</span>`;
    return `<span class="dday-normal">D-${d}</span>`;
  }

  function renderSummary(slots, range) {
    const allSlotsCnt = slots.length;
    const t3  = slots.filter(s => { const d=getDday(s.endDate); return d <= 3; }).length;
    const t7  = slots.filter(s => { const d=getDday(s.endDate); return d >= 4  && d <= 7; }).length;
    const t14 = slots.filter(s => { const d=getDday(s.endDate); return d >= 8  && d <= 14; }).length;
    const t30 = slots.filter(s => { const d=getDday(s.endDate); return d >= 15 && d <= 30; }).length;
    const totalTarget = slots.reduce((a,s) => a+(s.dailyTarget||0), 0);
    const el = document.getElementById('expire-summary');
    if(!el) return;

    let countItems = '';
    if(range === '3' || range === '7' || range === '14' || range === 'all') {
      countItems += `<div class="sum-item"><div class="sum-label">3일 이내 만료</div><div class="sum-val" style="color:var(--danger)">${t3} <small style="font-size:12px;color:var(--muted);font-weight:400">건</small></div></div>`;
    }
    if(range === '7' || range === '14' || range === 'all') {
      countItems += `<div class="sum-item"><div class="sum-label">7일 이내 만료</div><div class="sum-val" style="color:var(--warn)">${t7} <small style="font-size:12px;color:var(--muted);font-weight:400">건</small></div></div>`;
    }
    if(range === '14' || range === 'all') {
      countItems += `<div class="sum-item"><div class="sum-label">14일 이내 만료</div><div class="sum-val" style="color:var(--info)">${t14} <small style="font-size:12px;color:var(--muted);font-weight:400">건</small></div></div>`;
    }
    if(range === 'all') {
      countItems += `<div class="sum-item"><div class="sum-label">30일 이내 만료</div><div class="sum-val" style="color:var(--text2)">${t30} <small style="font-size:12px;color:var(--muted);font-weight:400">건</small></div></div>`;
    }

    el.innerHTML = `
      <div class="sum-item"><div class="sum-label">만료 예정</div><div class="sum-val" style="color:var(--info)">${allSlotsCnt} <small style="font-size:12px;color:var(--muted);font-weight:400">개</small></div></div>
      ${countItems}`;
  }

  window.renderExpire = async function() {
    document.getElementById('expire-body').innerHTML =
      '<tr><td colspan="13"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>';

    allSlots = await HA.getSlots();

    const range = document.getElementById('ef-range').value;
    const kw    = (document.getElementById('ef-kw').value||'').toLowerCase();

    const today = new Date(); today.setHours(0,0,0,0);

    let slots = allSlots.filter(s => s.status === 'active').filter(s => {
      const d = new Date(s.endDate); d.setHours(0,0,0,0);
      return d >= today;
    });

    if(range !== 'all') {
      const limit = new Date(today);
      limit.setDate(today.getDate()+Number(range));
      limit.setHours(23,59,59,999);
      slots = slots.filter(s => {
        const d = new Date(s.endDate);
        return d <= limit;
      });
    }
    if(kw)   slots = slots.filter(s => (s.storeName||'').toLowerCase().includes(kw));
    slots.sort((a,b) => new Date(a.endDate) - new Date(b.endDate));

    renderSummary(slots, range);

    const body = document.getElementById('expire-body');
    if(!slots.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="13">만료 예정 캠페인이 없습니다.</td></tr>';
      return;
    }
    body.innerHTML = slots.map((s,i) => `
      <tr>
        <td style="color:var(--text2)">${i+1}</td>
        <td style="font-weight:600">${s.agencyId||'-'}</td>
        <td>${s.userId||'-'}</td>
        <td><span style="background:#f1f5f9;padding:2px 7px;border-radius:4px;font-size:11px">${s.slotType}</span></td>
        <td style="font-weight:500">${s.storeName||'-'}</td>
        <td style="color:var(--text2);font-size:11px">${s.mid||'-'}</td>
        <td style="color:var(--text2)">${s.rankKeyword||'-'}</td>
        <td style="color:var(--text2)">${s.startDate}</td>
        <td style="color:var(--text2);font-weight:600">${s.endDate}</td>
        <td><strong>${(s.dailyTarget||0).toLocaleString()}</strong></td>
        <td>${ddayBadge(getDday(s.endDate))}</td>
        <td><button class="action-btn btn-extend" onclick="extendFromExpire('${s._key}')">연장</button></td>
        <td><button class="action-btn" style="background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;" onclick="openRankPopup_e('${s._key}')">순위</button></td>
      </tr>`).join('');
    if(window.lucide) lucide.createIcons();
  };

  window.extendFromExpire = async function(key) {
    const s = allSlots.find(x => x._key === key);
    if(!s) return;
    const days = prompt('연장할 일수를 입력하세요 (예: 30)', '30');
    if(!days || isNaN(days)) return;
    const newEnd = new Date(s.endDate);
    newEnd.setDate(newEnd.getDate()+Number(days));
    await HA.updateSlot(key, { endDate: newEnd.toISOString().slice(0,10) });
    renderExpire();
    alert(`${days}일 연장되었습니다.`);
  };

  // ── 순위 팝업 공통 스타일 (최초 1회 삽입) ─────────────────
  if (!document.getElementById('rank-popup-style')) {
    const st = document.createElement('style');
    st.id = 'rank-popup-style';
    st.textContent = `
      .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9000; display:flex; align-items:center; justify-content:center; }
      .rank-modal-box { background:#fff; border-radius:16px; width:480px; max-height:80vh; overflow-y:auto; padding:24px; box-shadow:0 20px 60px rgba(0,0,0,.25); }
      .rank-modal-title { font-size:16px; font-weight:700; margin-bottom:6px; }
      .rank-modal-sub { font-size:12px; color:var(--text2); margin-bottom:16px; }
      .rank-tbl { width:100%; border-collapse:collapse; font-size:12px; }
      .rank-tbl thead th { background:#1e293b; color:#fff; padding:9px 10px; text-align:center; font-weight:500; }
      .rank-tbl tbody td { padding:9px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
      .rank-tbl tbody tr:last-child td { border-bottom:none; }
      .rank-tbl tbody tr:hover { background:#f8fafc; }
      .rank-num { display:inline-block; font-weight:700; font-size:13px; padding:2px 10px; border-radius:5px; }
      .rank-1 { background:#fef9c3; color:#92400e; }
      .rank-top3 { background:#eff6ff; color:#1d4ed8; }
      .rank-top10 { background:#f0fdf4; color:#15803d; }
      .rank-other { background:#f1f5f9; color:#475569; }

      .rank-empty { text-align:center; padding:40px 0; color:var(--muted); font-size:13px; }
    `;
    document.head.appendChild(st);
  }

  // ── 순위 팝업 (만료예정) ─────────────────────────────────
  window.openRankPopup_e = async function(slotKey) {
    const s = allSlots.find(x => x._key === slotKey);
    if (!s || !s.mid) return alert('MID 정보가 없습니다.');
    const RANK_PATH = 'ha/ranks/' + s.mid.replace(/[.#$[\]/]/g, '_');

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = function(e) {
      if (e.target === overlay) {
        overlay.remove();
      }
    };
    overlay.innerHTML = `
      <div class="rank-modal-box">
        <div style="margin-bottom:4px;">
          <div class="rank-modal-title">📊 일자별 순위</div>
          <div class="rank-modal-sub">${s.storeName} &nbsp;·&nbsp; MID: ${s.mid} &nbsp;·&nbsp; 순위키워드: <strong>${s.rankKeyword||'-'}</strong></div>
        </div>
        <div id="rank-table-area-e">
          <div class="loading-wrap"><div class="spinner"></div> 순위 데이터 불러오는 중...</div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:16px;">
          <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">닫기</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    await _renderRankTable_e(s.mid, RANK_PATH);
  };

  async function _renderRankTable_e(mid, rankPath) {
    const area = document.getElementById('rank-table-area-e');
    if (!area) return;
    try {
      const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
      const dbInst = getDatabase();
      const snap = await get(ref(dbInst, rankPath));
      if (!snap.exists()) {
        area.innerHTML = '<div class="rank-empty">저장된 순위 데이터가 없습니다.<br><small style="color:var(--muted)">매일 오후 자동으로 업데이트됩니다.</small></div>';
        return;
      }
      const data = snap.val();
      const seen = new Set();
      const rows = Object.entries(data)
        .map(([date, v]) => ({ date, keyword: v.keyword||'-', rank: v.rank }))
        .sort((a, b) => b.date.localeCompare(a.date))
        .filter(r => {
          const k = r.date + '_' + r.keyword;
          if (seen.has(k)) return false;
          seen.add(k); return true;
        });
      area.innerHTML = `
        <table class="rank-tbl">
          <thead><tr><th>날짜</th><th>순위 키워드</th><th>순위</th></tr></thead>
          <tbody>
            ${rows.map(r => {
              const rn = Number(r.rank);
              const cls = rn===1 ? 'rank-1' : rn<=3 ? 'rank-top3' : rn<=10 ? 'rank-top10' : 'rank-other';
              const disp = (!r.rank || r.rank==='-')
                ? '<span style="color:var(--muted)">-</span>'
                : `<span class="rank-num ${cls}">${rn}위</span>`;
              return `<tr>
                <td style="color:var(--text2)">${r.date}</td>
                <td style="font-weight:500">${r.keyword}</td>
                <td>${disp}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    } catch(e) {
      area.innerHTML = `<div class="rank-empty" style="color:var(--danger)">데이터 로드 실패: ${e.message}</div>`;
    }
  }

  renderExpire();

})();
</script>
</div>
