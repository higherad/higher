<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HIGHER AD | 관리자 로그인</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #0f172a;
      --accent: #10b981;
      --accent2:#059669;
      --muted:  #94a3b8;
      --border: #e2e8f0;
      --text:   #1e293b;
      --text2:  #64748b;
      --bg:     #0f172a;
      --danger: #ef4444;
    }
    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }

    /* 배경 장식 */
    .bg-deco {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-deco::before {
      content: '';
      position: absolute; top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(16,185,129,.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .bg-deco::after {
      content: '';
      position: absolute; bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(16,185,129,.05) 0%, transparent 70%);
      border-radius: 50%;
    }

    .login-wrap {
      position: relative; z-index: 1; width: 420px;
      animation: slideUp .5s cubic-bezier(.22,.68,0,1.2) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .login-header { text-align: center; margin-bottom: 32px; }
    .login-logo {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 26px; font-weight: 900; letter-spacing: -1px; color: #fff;
    }
    .login-logo span { color: var(--accent); }
    .admin-badge {
      display: block;
      width: fit-content;
      margin: 10px auto 0;
      font-size: 10px;
      font-weight: 700;
      background: rgba(16, 185, 129, .15);
      color: var(--accent);
      border: 1px solid rgba(16, 185, 129, .3);
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .login-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px; padding: 40px;
      backdrop-filter: blur(10px);
    }

    .field-group { margin-bottom: 18px; }
    .field-label {
      display: block; font-size: 12px; font-weight: 700;
      color: var(--muted); margin-bottom: 7px;
      letter-spacing: .3px; text-transform: uppercase;
    }
    .field-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,.06);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px; font-size: 14px;
      font-family: inherit; color: #fff; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .field-input::placeholder { color: rgba(255,255,255,.25); }
    .field-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(16,185,129,.15);
    }
    .field-input.error { border-color: var(--danger); }

    .error-msg {
      display: none; font-size: 12px; color: var(--danger);
      margin-top: 8px; padding: 10px 14px;
      background: rgba(239,68,68,.08); border-radius: 8px;
      border-left: 3px solid var(--danger);
    }
    .error-msg.show { display: block; }

    .login-btn {
      width: 100%; padding: 14px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 10px; cursor: pointer;
      font-size: 15px; font-weight: 700; font-family: inherit;
      transition: background .2s, transform .1s, box-shadow .2s;
      margin-top: 8px;
      box-shadow: 0 4px 20px rgba(16,185,129,.3);
    }
    .login-btn:hover { background: var(--accent2); box-shadow: 0 6px 24px rgba(16,185,129,.4); }
    .login-btn:active { transform: scale(.98); }
    .login-btn:disabled { background: #2d3f55; box-shadow: none; cursor: not-allowed; color: var(--muted); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0 20px; color: rgba(255,255,255,.2); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.08);
    }

    .user-link { text-align: center; font-size: 12px; color: var(--muted); }
    .user-link a { color: var(--accent); font-weight: 600; text-decoration: none; }
    .user-link a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 잠금 아이콘 */
    .lock-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: rgba(16,185,129,.1); border: 1px solid rgba(16,185,129,.2);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px; font-size: 24px;
    }

    /* ── 반응형 ── */
    @media (max-width: 480px) {
      .login-wrap { width: 100%; padding: 0 16px; }
      .login-card { padding: 28px 20px 32px; border-radius: 16px; }
      .login-logo { font-size: 22px; }
      .field-input { padding: 11px 14px; font-size: 13px; }
      .login-btn { padding: 13px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="bg-deco"></div>

<div class="login-wrap">
  <div class="login-header">
    <div class="lock-icon">🔐</div>
    <div class="login-logo">HIGHER <span>AD</span></div>
    <div class="admin-badge">Admin Portal</div>
  </div>

  <div class="login-card">
    <div class="field-group">
      <label class="field-label">관리자 아이디</label>
      <input class="field-input" id="inp-id" type="text"
        placeholder="아이디를 입력하세요" autocomplete="username">
    </div>
    <div class="field-group">
      <label class="field-label">비밀번호</label>
      <input class="field-input" id="inp-pw" type="password"
        placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    </div>

    <div class="error-msg" id="login-error">아이디 또는 비밀번호가 올바르지 않습니다.</div>

    <button class="login-btn" id="login-btn" onclick="doLogin()">로그인</button>

    <div class="divider">또는</div>

    <div class="user-link">
      <a href="https://hireward.co.kr/">업체 접수 페이지로 이동</a>
    </div>
  </div>
</div>

<script type="module">
  import HA from './ha-store.js';

  // URL에서 파일명 숨기기 — 항상 / 로만 표시
  history.replaceState(null, '', '/');

  // 이미 인증된 경우 바로 이동
  if (sessionStorage.getItem('ha_admin_auth') === '1') {
    location.href = 'index.html';
  }

  // Enter 키 처리
  document.getElementById('inp-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('inp-id').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('inp-pw').focus();
  });

  // 입력 시 에러 초기화
  ['inp-id','inp-pw'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      document.getElementById('login-error').classList.remove('show');
      document.getElementById(id).classList.remove('error');
    });
  });

  window.doLogin = async function() {
    const username = document.getElementById('inp-id').value.trim();
    const password = document.getElementById('inp-pw').value;
    const btn      = document.getElementById('login-btn');

    if (!username || !password) {
      document.getElementById('login-error').textContent = '아이디와 비밀번호를 모두 입력해주세요.';
      document.getElementById('login-error').classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>로그인 중...';

    const result = await HA.login(username, password);

    if (result.ok && (result.user.role === 'admin' || result.user.role === 'staff')) {
      sessionStorage.setItem('ha_admin_auth', '1');
      location.href = 'index.html';
    } else {
      document.getElementById('login-error').textContent =
        result.ok ? '관리자 계정이 아닙니다.' : '아이디 또는 비밀번호가 올바르지 않습니다.';
      document.getElementById('login-error').classList.add('show');
      ['inp-id','inp-pw'].forEach(id => document.getElementById(id).classList.add('error'));
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  };
</script>
</body>
</html>
