<div id="user-page">
<style>
  #user-page .action-bar {
    background:#fff; border:1px solid var(--border); border-radius:10px;
    padding:12px 16px; display:flex; align-items:center; gap:10px; margin-bottom:14px;
  }
  #user-page select, #user-page input[type=text] {
    padding:6px 10px; border:1px solid var(--border); border-radius:6px;
    font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none;
  }
  #user-page .tbl-wrap {
    background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px;
  }
  #user-page table { width:100%; border-collapse:collapse; font-size:12px; }
  #user-page thead th {
    background:#1e293b; color:#fff; padding:12px 10px; font-weight:500;
    border-right:1px solid #2d3f55; text-align:center; white-space:nowrap;
  }
  #user-page tbody td {
    padding:12px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle;
  }
  #user-page tbody tr:last-child td { border-bottom:none; }
  #user-page tbody tr:hover { background:#f8fafc; }

  .pw-wrap { display:flex; align-items:center; justify-content:center; gap:6px; }
  .pw-toggle { font-size:10px; color:var(--info); cursor:pointer; border-bottom:1px solid var(--info); }

  .action-btn { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-edit { background:#eff6ff; color:#1d4ed8; }
  .btn-del  { background:#fef2f2; color:var(--danger); }
  .btn-add  { background:var(--info); color:#fff; padding:7px 16px; font-size:12px; }
  .btn-del2 { background:var(--danger); color:#fff; padding:7px 16px; font-size:12px; }

  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center; }
  .modal-box { background:#fff;border-radius:16px;width:460px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-title { font-size:17px;font-weight:700;margin-bottom:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:5px; }
  .modal-field input,.modal-field textarea,.modal-field select { width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;color:var(--text); }
  .modal-field input:focus { border-color:var(--accent); }
  .modal-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
  .modal-footer { display:flex;justify-content:flex-end;gap:10px;margin-top:20px; }
  .btn-cancel { padding:8px 20px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:13px; }
  .btn-save   { padding:8px 20px;border:none;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600; }
  .btn-save:hover { background:var(--accent2); }
  .empty-row td { height:200px;text-align:center;color:var(--muted);font-size:13px; }
  .pagination { display:flex;justify-content:center;gap:5px;margin-top:16px; }
  .pg-btn { width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center; }
  .pg-btn.active { background:var(--info);color:#fff;border-color:var(--info); }

  .hint-text { font-size:11px; color:var(--text2); margin-top:4px; }
</style>

<div class="action-bar">
  <input type="text" id="u-kw" placeholder="아이디/대행사 검색" style="width:200px;">
  <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderUsers()">검색</button>
  <button class="action-btn" style="background:#fff;border:1px solid var(--border);padding:6px 12px;" onclick="document.getElementById('u-kw').value='';renderUsers()">초기화</button>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="action-btn btn-add" onclick="openUserModal(null)">회원 추가</button>
    <button class="action-btn btn-del2" onclick="bulkDeleteUsers()">선택 삭제</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="u-all" onchange="toggleAll(this)"></th>
        <th>번호</th>
        <th>아이디</th>
        <th>비밀번호</th>
        <th>대행사</th>
        <th>단가(원)</th>
        <th>슬롯수</th>
        <th>유입수</th>
        <th>메모</th>
        <th>가입일</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody id="user-body"></tbody>
  </table>
</div>
<div class="pagination" id="user-pagination"></div>

<script>
(function(){
  let page = 1; const PER = 20;

  function getFiltered() {
    const kw = (document.getElementById('u-kw').value||'').toLowerCase();
    return HA.getUsers().filter(u=>
      !kw || [(u.username||''),(u.agency||'')].some(v=>v.toLowerCase().includes(kw))
    );
  }

  function getUserSlotStats(username) {
    const slots = HA.getSlots().filter(s=>s.userId===username && s.status==='active');
    const inflow = slots.reduce((a,s)=>a+(s.inflow||0),0);
    return { count: slots.length, inflow };
  }

  window.renderUsers = function() {
    const all = getFiltered();
    const start = (page-1)*PER;
    const list  = all.slice(start, start+PER);

    const body = document.getElementById('user-body');
    if(!list.length) {
      body.innerHTML='<tr class="empty-row"><td colspan="11">데이터가 없습니다.</td></tr>';
    } else {
      body.innerHTML = list.map((u,i)=>{
        const st = getUserSlotStats(u.username);
        return `<tr>
          <td><input type="checkbox" class="u-check" data-id="${u.id}"></td>
          <td style="color:var(--text2)">${start+i+1}</td>
          <td style="font-weight:700">${u.username}</td>
          <td>
            <div class="pw-wrap">
              <span class="pw-mask" data-pw="${u.password}">••••••</span>
              <span class="pw-toggle" onclick="togglePw(this)">보기</span>
            </div>
          </td>
          <td>${u.agency||'-'}</td>
          <td style="font-weight:700;color:var(--accent)">${(u.unitPrice||0).toLocaleString()}원</td>
          <td>${st.count}</td>
          <td>${st.inflow.toLocaleString()}</td>
          <td style="color:var(--text2);font-size:11px">${u.memo||'-'}</td>
          <td style="color:var(--text2)">${(u.createdAt||'').slice(0,10)}</td>
          <td>
            <div style="display:flex;gap:5px;justify-content:center;">
              <button class="action-btn btn-edit" onclick="openUserModal(${u.id})">수정</button>
              <button class="action-btn btn-del"  onclick="deleteUser(${u.id})">삭제</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    const pages = Math.ceil(all.length/PER)||1;
    const pg = document.getElementById('user-pagination');
    let ph = `<button class="pg-btn" onclick="goUP(1)">&laquo;</button><button class="pg-btn" onclick="goUP(${Math.max(1,page-1)})">&lsaquo;</button>`;
    for(let i=1;i<=pages;i++) ph+=`<button class="pg-btn ${i===page?'active':''}" onclick="goUP(${i})">${i}</button>`;
    ph+=`<button class="pg-btn" onclick="goUP(${Math.min(pages,page+1)})">&rsaquo;</button><button class="pg-btn" onclick="goUP(${pages})">&raquo;</button>`;
    pg.innerHTML = ph;
  };

  window.goUP = n => { page=n; renderUsers(); };
  window.toggleAll = cb => document.querySelectorAll('.u-check').forEach(c=>c.checked=cb.checked);

  window.togglePw = function(el) {
    const span = el.previousElementSibling;
    if(el.textContent==='보기') { span.textContent=span.dataset.pw; el.textContent='숨기기'; }
    else { span.textContent='••••••'; el.textContent='보기'; }
  };

  window.deleteUser = function(id) {
    if(!confirm('회원을 삭제하시겠습니까?')) return;
    HA.deleteUser(id); renderUsers();
  };
  window.bulkDeleteUsers = function() {
    const ids=[...document.querySelectorAll('.u-check:checked')].map(c=>Number(c.dataset.id));
    if(!ids.length) return alert('선택된 항목이 없습니다.');
    if(!confirm(`${ids.length}명을 삭제하시겠습니까?`)) return;
    ids.forEach(id=>HA.deleteUser(id)); renderUsers();
  };

  window.openUserModal = function(id) {
    const u = id ? HA.getUsers().find(x=>x.id===id) : {};
    const isEdit = !!id;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-title">${isEdit?'회원 정보 수정':'회원 추가'}</div>
        <div class="modal-row">
          <div class="modal-field"><label>아이디 *</label><input id="um-username" value="${u.username||''}" ${isEdit?'readonly':''}></div>
          <div class="modal-field"><label>비밀번호 *</label><input id="um-password" type="password" value="${u.password||''}" placeholder="${isEdit?'변경 시 입력':''}"></div>
        </div>
        <div class="modal-row">
          <div class="modal-field"><label>대행사 ID</label><input id="um-agency" value="${u.agency||''}"></div>
          <div class="modal-field">
            <label>단가 (원) *</label>
            <input type="number" id="um-price" value="${u.unitPrice||0}" placeholder="50000">
            <div class="hint-text">정산 자동 계산에 사용됩니다</div>
          </div>
        </div>
        <div class="modal-field"><label>메모</label><input id="um-memo" value="${u.memo||''}"></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">취소</button>
          <button class="btn-save" onclick="saveUser(${id||'null'})">${isEdit?'저장':'추가'}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  };

  window.saveUser = function(id) {
    const username = document.getElementById('um-username').value.trim();
    const password = document.getElementById('um-password').value.trim();
    if(!username) return alert('아이디를 입력하세요.');

    const data = {
      username, agency: document.getElementById('um-agency').value.trim(),
      unitPrice: Number(document.getElementById('um-price').value)||0,
      memo: document.getElementById('um-memo').value.trim(),
    };
    if(password) data.password = password;

    if(id) {
      HA.updateUser(id, data);
    } else {
      if(!password) return alert('비밀번호를 입력하세요.');
      HA.addUser({ ...data, password });
    }
    document.querySelector('.modal-overlay').remove();
    renderUsers();
  };

  renderUsers();
})();
</script>
</div>
