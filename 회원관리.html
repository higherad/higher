<div id="user-page">
<style>
  #user-page .action-bar { background:#fff; border:1px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  #user-page select, #user-page input[type=text] { padding:6px 10px; border:1px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none; }
  #user-page .tbl-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; margin-bottom:16px; }
  #user-page table { width:100%; border-collapse:collapse; font-size:12px; }
  #user-page thead th { background:#1e293b; color:#fff; padding:12px 10px; font-weight:500; border-right:1px solid #2d3f55; text-align:center; white-space:nowrap; }
  #user-page tbody td { padding:12px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
  #user-page tbody tr:last-child td { border-bottom:none; }
  #user-page tbody tr:hover { background:#f8fafc; }
  #user-page tbody tr.row-pending { background:rgba(245,158,11,.03); }
  .pw-wrap { display:flex; align-items:center; justify-content:center; gap:6px; }
  .pw-toggle { font-size:10px; color:var(--info); cursor:pointer; border-bottom:1px solid var(--info); }
  .action-btn { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-edit    { background:#eff6ff; color:#1d4ed8; }
  .btn-del     { background:#fef2f2; color:var(--danger); }
  .btn-approve { background:var(--accent); color:#fff; }
  .btn-approve:hover { background:var(--accent2); }
  .btn-add     { background:var(--info); color:#fff; padding:7px 16px; font-size:12px; }
  .btn-del2    { background:var(--danger); color:#fff; padding:7px 16px; font-size:12px; }
  .user-status-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .us-active  { background:rgba(16,185,129,.1); color:#059669; }
  .us-pending { background:rgba(245,158,11,.1); color:#b45309; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center; }
  .modal-box { background:#fff;border-radius:16px;width:460px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-title { font-size:17px;font-weight:700;margin-bottom:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:5px; }
  .modal-field input,.modal-field select { width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;color:var(--text); }
  .modal-field input:focus { border-color:var(--accent); }
  .modal-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
  .modal-footer { display:flex;justify-content:flex-end;gap:10px;margin-top:20px; }
  .btn-cancel { padding:8px 20px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:13px; }
  .btn-save   { padding:8px 20px;border:none;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600; }
  .btn-save:hover { background:var(--accent2); }
  .empty-row td { height:200px;text-align:center;color:var(--muted);font-size:13px; }
  .pagination { display:flex;justify-content:center;gap:5px;margin-top:16px; }
  .pg-btn { width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center; }
  .pg-btn.active { background:var(--info);color:#fff;border-color:var(--info); }
  .hint-text { font-size:11px; color:var(--text2); margin-top:4px; }
  .loading-wrap { display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px;gap:8px; }
  .spinner { width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .agency-link { color:var(--info); font-weight:700; cursor:pointer; text-decoration:underline; }
  .agency-link:hover { color:var(--accent); }
  .sp-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px; }
  .sp-box { background:#fff;border-radius:16px;width:500px;max-height:85vh;overflow-y:auto;padding:24px 28px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .sp-title { font-size:17px;font-weight:800;margin-bottom:2px; }
  .sp-sub { font-size:12px;color:var(--muted);margin-bottom:16px; }
  .sp-cards { display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px; }
  .sp-card { background:#f8fafc;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden; }
  .sp-card::after { content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border); }
  .sp-card.c-green::after { background:var(--accent); }
  .sp-card.c-blue::after  { background:var(--info); }
  .sp-card.c-warn::after  { background:var(--warn); }
  .sp-card-label { font-size:11px;color:var(--text2);font-weight:600;margin-bottom:8px; }
  .sp-card-value { font-size:20px;font-weight:800;line-height:1; }
  .sp-section { font-size:13px;font-weight:700;margin-bottom:8px;margin-top:16px;color:var(--text); }
  .sp-tbl { width:100%;border-collapse:collapse;font-size:12px; }
  .sp-tbl th { background:#1e293b;color:#fff;padding:8px 10px;font-weight:500;text-align:center; }
  .sp-tbl td { padding:8px 10px;border-bottom:1px solid var(--border);text-align:center;color:var(--text2); }
  .sp-tbl tr:last-child td { border-bottom:none; }
  .sp-footer { display:flex;justify-content:flex-end;margin-top:20px; }
  .btn-close-sp { padding:9px 24px;border:1px solid var(--border);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-family:inherit; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    #user-page .action-bar { flex-wrap: wrap; gap: 6px; }
    #user-page .action-bar > * { flex: 1 1 calc(50% - 6px); min-width: 120px; }
    #user-page .action-bar > div[style*="margin-left:auto"] { flex: 1 1 100%; margin-left: 0 !important; justify-content: flex-start; }
    #user-page .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #user-page table { min-width: 700px; }
    .modal-box { width: calc(100vw - 32px); padding: 20px; }
    .modal-row { grid-template-columns: 1fr; }
  }
</style>

<div class="action-bar">
  <input type="text" id="u-kw" placeholder="아이디/대행사 검색" style="width:200px;">
  <select id="u-status" onchange="renderUsers()">
    <option value="">전체</option>
    <option value="active">승인됨</option>
    <option value="pending">승인대기</option>
  </select>
  <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderUsers()">검색</button>
  <button class="action-btn" style="background:#fff;border:1px solid var(--border);padding:6px 12px;" onclick="document.getElementById('u-kw').value='';renderUsers()">초기화</button>
  <span class="pending-count" id="pending-user-count"></span>
  <div style="margin-left:auto;display:flex;gap:8px;">
    <button class="action-btn btn-add" onclick="openUserModal(null)">회원 추가</button>
    <button class="action-btn btn-del2" onclick="bulkDeleteUsers()">선택 삭제</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="u-all" onchange="toggleAll(this)"></th>
        <th>번호</th><th>가입일</th><th>대행사</th><th>단가(원)</th>
        <th>아이디</th><th>비밀번호</th><th>캠페인수</th><th>메모</th><th>상태</th><th>관리</th>
      </tr>
    </thead>
    <tbody id="user-body">
      <tr><td colspan="10"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>
    </tbody>
  </table>
</div>
<div class="pagination" id="user-pagination"></div>

<script>
(function(){
  let page = 1;
  const PER = 20;
  let allUsers = [];
  let allSlots = [];

  function getFiltered() {
    const kw     = (document.getElementById('u-kw').value||'').toLowerCase();
    const status = document.getElementById('u-status').value;
    return allUsers.filter(u => {
      if (status === 'active'  && u.approved === false) return false;
      if (status === 'pending' && u.approved !== false) return false;
      return !kw || [(u.username||''),(u.agency||''),(u.agencyId||'')].some(v=>v.toLowerCase().includes(kw));
    });
  }

  function getUserSlotCount(username) {
    return allSlots.filter(s => s.userId === username && s.status === 'active').length;
  }

  window.renderUsers = async function(resetPage = true) {
    if (resetPage) page = 1;
    document.getElementById('user-body').innerHTML =
      '<tr><td colspan="11"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>';

    page = 1;
    [allUsers, allSlots] = await Promise.all([HA.getUsers(), HA.getSlots()]);
    allUsers.reverse();

    // 승인 대기 카운트
    const pendingCount = allUsers.filter(u => u.approved === false).length;
    const countEl = document.getElementById('pending-user-count');
    if (countEl) countEl.textContent = pendingCount > 0 ? `승인 대기 ${pendingCount}명` : '';

    const all   = getFiltered();
    const start = (page-1)*PER;
    const list  = all.slice(start, start+PER);
    const body  = document.getElementById('user-body');

    if (!list.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="11">데이터가 없습니다.</td></tr>';
    } else {
      body.innerHTML = list.map((u, i) => {
        const isPending = u.approved === false;
        const statusBadge = isPending
          ? '<span class="user-status-badge us-pending">승인대기</span>'
          : '<span class="user-status-badge us-active">승인됨</span>';
        return `<tr class="${isPending ? 'row-pending' : ''}">
          <td><input type="checkbox" class="u-check" data-key="${u._key}"></td>
          <td style="color:var(--text2)">${all.length - start - i}</td>
          <td style="color:var(--text2)">${(u.createdAt||'').slice(0,10)}</td>
          <td><span class="agency-link" onclick="openUserAgencyPopup('${u._key}')">${u.agency||u.agencyId||'-'}</span></td>
          <td style="font-weight:700;color:var(--accent)">${(u.unitPrice||0).toLocaleString()}원</td>
          <td style="font-weight:700">${u.username}</td>
          <td>
            <div class="pw-wrap">
              <span class="pw-mask" data-pw="${u.password||''}">••••••</span>
              <span class="pw-toggle" onclick="togglePw(this)">보기</span>
            </div>
          </td>
          <td>${getUserSlotCount(u.username)}</td>
          <td style="color:var(--text2);font-size:11px">${u.memo||'-'}</td>
          <td>${statusBadge}</td>
          <td>
            <div style="display:flex;gap:5px;justify-content:center;">
              ${isPending ? `<button class="action-btn btn-approve" onclick="approveUser('${u._key}')">승인</button>` : `<button class="action-btn" style="background:rgba(245,158,11,.15);color:#b45309;" onclick="pendingUser('${u._key}')">대기</button>`}
              <button class="action-btn btn-edit" onclick="openUserModal('${u._key}')">수정</button>
              <button class="action-btn btn-del"  onclick="deleteUser('${u._key}')">삭제</button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    const pages = Math.ceil(all.length/PER)||1;
    const pg = document.getElementById('user-pagination');
    let ph = `<button class="pg-btn" onclick="goUP(1)">&laquo;</button><button class="pg-btn" onclick="goUP(${Math.max(1,page-1)})">&lsaquo;</button>`;
    for(let i=1;i<=pages;i++) ph+=`<button class="pg-btn ${i===page?'active':''}" onclick="goUP(${i})">${i}</button>`;
    ph+=`<button class="pg-btn" onclick="goUP(${Math.min(pages,page+1)})">&rsaquo;</button><button class="pg-btn" onclick="goUP(${pages})">&raquo;</button>`;
    pg.innerHTML = ph;
  };

  window.goUP = n => { page=n; renderUsers(false); };
  window.toggleAll = cb => document.querySelectorAll('.u-check').forEach(c=>c.checked=cb.checked);

  window.togglePw = function(el) {
    const span = el.previousElementSibling;
    if (el.textContent==='보기') { span.textContent=span.dataset.pw; el.textContent='숨기기'; }
    else { span.textContent='••••••'; el.textContent='보기'; }
  };

  // ── 승인 ─────────────────────────────────────────────────
  window.approveUser = async function(key) {
    if (!confirm('이 회원을 승인하시겠습니까?')) return;
    await HA.updateUser(key, { approved: true });
    renderUsers(false);
  };

  window.pendingUser = async function(key) {
    if (!confirm('이 회원을 승인 대기 상태로 변경하시겠습니까?')) return;
    await HA.updateUser(key, { approved: false });
    renderUsers(false);
  };

  window.deleteUser = async function(key) {
    if (!confirm('회원을 삭제하시겠습니까?')) return;
    await HA.deleteUser(key);
    renderUsers(false);
  };

  window.bulkDeleteUsers = async function() {
    const keys = [...document.querySelectorAll('.u-check:checked')].map(c => c.dataset.key);
    if (!keys.length) return alert('선택된 항목이 없습니다.');
    if (!confirm(`${keys.length}명을 삭제하시겠습니까?`)) return;
    await Promise.all(keys.map(k => HA.deleteUser(k)));
    renderUsers(false);
  };

  window.openUserModal = function(key) {
    const u = key ? (allUsers.find(x => x._key === key) || {}) : {};
    const isEdit = !!key;
    const currentAgency = u.agency || u.agencyId || '';

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-title">${isEdit?'회원 정보 수정':'회원 추가'}</div>
        <div class="modal-row">
          <div class="modal-field"><label>아이디 *</label><input id="um-username" value="${u.username||''}" ${isEdit?'readonly':''}></div>
          <div class="modal-field"><label>비밀번호 *</label><input id="um-password" type="password" value="${u.password||''}" placeholder="${isEdit?'변경 시 입력':''}"></div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>업체명 (대행사)</label>
            <input id="um-agency" value="${currentAgency}" placeholder="업체명을 입력하세요">
          </div>
          <div class="modal-field">
            <label>단가 (원) *</label>
            <input type="number" id="um-price" value="${u.unitPrice||0}">
            <div class="hint-text">정산 자동 계산에 사용됩니다</div>
          </div>
        </div>
        <div class="modal-field"><label>메모</label><input id="um-memo" value="${u.memo||''}"></div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">취소</button>
          <button class="btn-save" id="user-save-btn">${isEdit?'저장':'추가'}</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('user-save-btn').onclick = () => saveUser(key);
  };

  window.saveUser = async function(key) {
    const username = document.getElementById('um-username').value.trim();
    const password = document.getElementById('um-password').value.trim();
    if (!username) return alert('아이디를 입력하세요.');
    const agencyVal = document.getElementById('um-agency').value.trim();
    const data = {
      username,
      agency:    agencyVal,
      agencyId:  agencyVal,
      unitPrice: Number(document.getElementById('um-price').value)||0,
      memo:      document.getElementById('um-memo').value.trim(),
      approved:  true,
    };
    if (password) data.password = password;
    if (key) {
      await HA.updateUser(key, data);
      // 해당 유저의 모든 캠페인 agencyId 동기화
      const userSlots = allSlots.filter(s => s.userId === username);
      await Promise.all(userSlots.map(s => HA.updateSlot(s._key, { agencyId: agencyVal })));
    } else {
      if (!password) return alert('비밀번호를 입력하세요.');
      await HA.addUser({ ...data, password });
    }
    document.querySelector('.modal-overlay').remove();
    renderUsers(false);
  };

  // ── 대행사 클릭 팝업 ─────────────────────────────────────
  window.openUserAgencyPopup = function(userKey) {
    const u = allUsers.find(x => x._key === userKey);
    if (!u) return;
    const agencyName = u.agency || u.agencyId || '-';
    const unitPrice  = u.unitPrice || 0;

    const mySlots = allSlots.filter(s => s.userId === u.username);
    const active  = mySlots.filter(s => s.status === 'active');
    const pending = mySlots.filter(s => s.status === 'pending');

    const totalTarget = active.reduce((a,s) => a+(s.dailyTarget||0)*(s.days||0), 0);
    const totalAmt    = mySlots.filter(s => s.status==='active'||s.status==='expired'||s.status==='pending')
                               .reduce((a,s) => a+(s.dailyTarget||0)*(s.days||0)*unitPrice, 0);
    const totalVat    = Math.round(totalAmt * 1.1);

    // 월별 정산 현황
    const byMonth = {};
    mySlots.filter(s => s.status==='active'||s.status==='expired'||s.status==='pending').forEach(s => {
      const m = (s.createdAt||'').slice(0,7);
      if (!m) return;
      if (!byMonth[m]) byMonth[m] = { count:0, target:0, amt:0 };
      byMonth[m].count++;
      byMonth[m].target += (s.dailyTarget||0)*(s.days||0);
      byMonth[m].amt    += (s.dailyTarget||0)*(s.days||0)*unitPrice;
    });
    const mRows = Object.keys(byMonth).sort().reverse().map(m => {
      const mv = byMonth[m];
      return `<tr>
        <td style="font-weight:600">${m}</td>
        <td>${mv.count}</td>
        <td>${mv.target.toLocaleString()}</td>
        <td style="font-weight:700;color:var(--accent)">${mv.amt.toLocaleString()}원</td>
        <td style="font-weight:700;color:var(--info)">${Math.round(mv.amt*1.1).toLocaleString()}원</td>
      </tr>`;
    }).join('');

    const ov = document.createElement('div');
    ov.className = 'sp-overlay';
    ov.innerHTML = `
      <div class="sp-box">
        <div class="sp-title">${agencyName}</div>
        <div class="sp-sub">아이디: ${u.username} · 단가: ${unitPrice.toLocaleString()}원/개</div>
        <div class="sp-cards">
          <div class="sp-card c-green">
            <div class="sp-card-label">진행중 캠페인</div>
            <div class="sp-card-value" style="color:var(--accent)">${active.length}<small style="font-size:12px;font-weight:400;color:var(--muted)"> 건</small></div>
          </div>
          <div class="sp-card c-green">
            <div class="sp-card-label">전체 목표</div>
            <div class="sp-card-value" style="color:var(--accent)">${totalTarget.toLocaleString()}<small style="font-size:12px;font-weight:400;color:var(--muted)"> 개</small></div>
          </div>
          <div class="sp-card c-blue">
            <div class="sp-card-label">누적 정산 금액 (VAT 별도)</div>
            <div class="sp-card-value" style="color:var(--info)">${totalAmt.toLocaleString()}<small style="font-size:12px;font-weight:400;color:var(--muted)"> 원</small></div>
          </div>
          <div class="sp-card c-blue">
            <div class="sp-card-label">누적 입금액 (VAT 포함)</div>
            <div class="sp-card-value" style="color:var(--info)">${totalVat.toLocaleString()}<small style="font-size:12px;font-weight:400;color:var(--muted)"> 원</small></div>
          </div>
        </div>
        <div class="sp-section">월별 정산 현황</div>
        <table class="sp-tbl">
          <thead><tr><th>월</th><th>캠페인 수</th><th>월별 목표 합산</th><th>정산 금액 (VAT 별도)</th><th>입금액 (VAT 포함)</th></tr></thead>
          <tbody>${mRows || '<tr><td colspan="5" style="color:var(--muted);padding:16px;text-align:center">데이터 없음</td></tr>'}</tbody>
        </table>
        <div class="sp-footer">
          <button class="btn-close-sp" onclick="this.closest('.sp-overlay').remove()">닫기</button>
        </div>
      </div>`;
    document.body.appendChild(ov);
    ov.addEventListener('click', e => { if (e.target === ov) ov.remove(); });
  };

  renderUsers();
})();
</script>
</div>
