<div id="slots-page">
<style>
  #slots-page .stat-bar { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:16px; }
  #slots-page .stat-box { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px 20px; display:flex; align-items:center; gap:14px; }
  #slots-page .stat-box .sb-icon { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  #slots-page .stat-box .sb-label { font-size:11px; color:var(--text2); font-weight:600; margin-bottom:4px; }
  #slots-page .stat-box .sb-val { font-size:22px; font-weight:800; line-height:1; }
  #slots-page .filter-bar {
    background:#fff; border:1px solid var(--border); border-radius:10px;
    padding:12px 16px; display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;
  }
  #slots-page select, #slots-page input[type=text], #slots-page input[type=date] {
    padding:6px 10px; border:1px solid var(--border); border-radius:6px;
    font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none;
  }
  #slots-page .tbl-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow-x:auto; }
  #slots-page table { width:100%; min-width:1200px; border-collapse:collapse; font-size:12px; }
  #slots-page thead th { background:#1e293b; color:#fff; padding:11px 8px; font-weight:500; border-right:1px solid #2d3f55; white-space:nowrap; text-align:center; }
  #slots-page tbody td { padding:10px 8px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
  #slots-page tbody tr:last-child td { border-bottom:none; }
  #slots-page tbody tr:hover { background:#f8fafc; }
  .rank-badge { color:var(--info); border:1px solid var(--info); padding:2px 8px; border-radius:4px; font-weight:700; font-size:11px; }
  .action-btn { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; }
  .btn-edit   { background:#eff6ff; color:#1d4ed8; }
  .btn-del    { background:#ef4444; color:#fff; }
  .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9000;display:flex;align-items:center;justify-content:center; }
  .modal-box { background:#fff;border-radius:16px;width:520px;max-height:85vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-title { font-size:17px;font-weight:700;margin-bottom:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block;font-size:12px;color:var(--text2);font-weight:600;margin-bottom:5px; }
  .modal-field input,.modal-field textarea,.modal-field select { width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;font-family:inherit;outline:none;color:var(--text); }
  .modal-field input:focus,.modal-field textarea:focus,.modal-field select:focus { border-color:var(--accent); }
  .modal-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
  .modal-footer { display:flex;justify-content:flex-end;gap:10px;margin-top:20px; }
  .btn-cancel { padding:8px 20px;border:1px solid var(--border);border-radius:7px;background:#fff;cursor:pointer;font-size:13px; }
  .btn-save   { padding:8px 20px;border:none;border-radius:7px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:600; }
  .btn-save:hover { background:var(--accent2); }
  .empty-row td { height:200px;text-align:center;color:var(--muted);font-size:13px; }
  .pagination { display:flex;justify-content:center;gap:5px;margin-top:16px; }
  .pg-btn { width:30px;height:30px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:12px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center; }
  .pg-btn.active { background:var(--info);color:#fff;border-color:var(--info); }
  .loading-wrap { display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:13px;gap:8px; }
  .spinner { width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .trash-days-ok   { color:#059669; font-weight:700; }
  .trash-days-warn { color:#d97706; font-weight:700; }
  .trash-days-bad  { color:#dc2626; font-weight:700; }
  .kw-badge { font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; background:#eff6ff; color:#1d4ed8; display:inline-block; }
  .status-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .s-active   { background:rgba(16,185,129,.1); color:#059669; }
  .s-reserved { background:rgba(245,158,11,.12); color:#d97706; }
  .s-expired  { background:#f1f5f9; color:#64748b; }
  #slots-page.guest-mode .rank-col { display:none; }
</style>

<div class="stat-bar" style="grid-template-columns:repeat(4,1fr)">
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(16,185,129,.1)">▶️</div>
    <div><div class="sb-label">진행중</div><div class="sb-val" id="stat-companies" style="color:var(--accent)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(245,158,11,.1)">📌</div>
    <div><div class="sb-label">예약중</div><div class="sb-val" id="stat-reserved" style="color:var(--warn)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(59,130,246,.1)">🎯</div>
    <div><div class="sb-label">전체 목표</div><div class="sb-val" id="stat-target" style="color:var(--info)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(139,92,246,.1)">📅</div>
    <div><div class="sb-label">진행중 일 목표</div><div class="sb-val" id="stat-today-target" style="color:#7c3aed">-</div></div>
  </div>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
  <span id="slots-count" style="font-size:13px;color:var(--text2)">로드 중...</span>
  <div style="display:flex;gap:8px;">
    <button class="action-btn" style="background:#ef4444;color:#fff;padding:7px 16px;font-size:12px;" onclick="bulkDelete()">선택 삭제</button>
    <button class="action-btn" style="background:#475569;color:#fff;padding:7px 16px;font-size:12px;" onclick="openTrashView()">🗑️ 휴지통</button>
  </div>
</div>

<div class="filter-bar">
  <select id="f-status" onchange="renderSlots()">
    <option value="">전체</option>
    <option value="active">진행중</option>
    <option value="reserved">예약중</option>
    <option value="expired">종료</option>
  </select>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <input type="text" id="f-kw" placeholder="대행사/ID/플레이스명/MID 검색" style="width:240px;" onkeydown="if(event.key==='Enter') renderSlots()">
    <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderSlots()">검색</button>
    <button class="action-btn" style="background:#fff;border:1px solid var(--border);padding:6px 12px;" onclick="resetFilter()">초기화</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="s-check-all" onchange="toggleAll(this)"></th>
        <th>번호</th><th>대행사</th><th>유저ID</th>
        <th>플레이스명</th><th>MID</th><th>순위키워드</th>
        <th>일 수</th><th>시작일</th><th>종료일</th><th>일 목표</th><th>검색키워드</th><th>상태</th><th>액션</th><th class="rank-col">순위</th>
      </tr>
    </thead>
    <tbody id="slots-body">
      <tr><td colspan="14"><div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div></td></tr>
    </tbody>
  </table>
</div>
<div class="pagination" id="slots-pagination"></div>

<script>
(function(){
  let page = 1;
  const PER = 20;
  let allSlots = [];

  const stLabel = {
    active:  '<span class="status-badge s-active">진행</span>',
    expired: '<span class="status-badge s-expired">종료</span>',
  };

  // 시작일이 오늘 이후인 active 캠페인 = 예약중 (실제 status 값은 그대로 active 유지)
  function todayYMD() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function isReserved(s, todayStr) { return s.status === 'active' && s.startDate > todayStr; }
  function statusBadge(s, todayStr) {
    if (isReserved(s, todayStr)) return '<span class="status-badge s-reserved">예약</span>';
    return stLabel[s.status] || s.status;
  }

  function isGuest() { return HA.getCurrentUser()?.role === 'guest'; }
  document.getElementById('slots-page').classList.toggle('guest-mode', isGuest());

  function getFiltered() {
    const status  = document.getElementById('f-status').value;
    const kw      = (document.getElementById('f-kw').value||'').toLowerCase();
    const guest   = isGuest();
    const todayStr = todayYMD();
    return allSlots.filter(s => {
      if (status === 'reserved') { if (!isReserved(s, todayStr)) return false; }
      else if (status === 'active') { if (s.status !== 'active' || isReserved(s, todayStr)) return false; }
      else if (status) { if (s.status !== status) return false; }
      else { if (s.status !== 'active' && s.status !== 'expired') return false; }
      if (kw && ![s.agencyId,s.userId,s.storeName,s.mid].some(v=>(v||'').toLowerCase().includes(kw))) return false;
      if (guest) {
        if (!s.createdAt || new Date(s.createdAt).getMonth() + 1 !== 6) return false;
      }
      return true;
    });
  }

  function renderSummary() {
    const todayStr    = todayYMD();
    const active      = allSlots.filter(s => s.status === 'active');
    const reserved    = active.filter(s => isReserved(s, todayStr));
    const inProgress  = active.filter(s => !isReserved(s, todayStr));
    const totalTarget = active.reduce((a,s) => a+((s.dailyTarget||0)*(s.days||0)), 0);
    const todayTarget = inProgress.reduce((a,s) => a+(s.dailyTarget||0), 0);
    document.getElementById('stat-companies').textContent    = inProgress.length;
    document.getElementById('stat-reserved').textContent     = reserved.length;
    document.getElementById('stat-target').textContent      = totalTarget.toLocaleString();
    document.getElementById('stat-today-target').textContent = todayTarget.toLocaleString();
  }

  // ── Firebase에서 데이터 불러와서 렌더 ──────────────────────
  window.renderSlots = async function(resetPage = true) {
    if (resetPage) page = 1;
    document.getElementById('slots-body').innerHTML =
      '<tr><td colspan="14"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>';

    allSlots = await HA.getSlots();

    // ── 종료일 지난 active 캠페인 자동 종료 처리 ──────────────
    const todayStr = todayYMD();
    const toExpire = allSlots.filter(s =>
      s.status === 'active' && s.endDate && s.endDate < todayStr
    );
    if (toExpire.length) {
      await Promise.all(toExpire.map(s => HA.updateSlot(s._key, { status: 'expired' })));
      toExpire.forEach(s => { s.status = 'expired'; });
    }

    renderSummary();

    const all   = getFiltered();
    document.getElementById('slots-count').textContent = `전체 ${all.length}건`;
    const start = (page-1)*PER;
    const list  = all.slice(start, start+PER);
    const body  = document.getElementById('slots-body');

    if (!list.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="14">데이터가 없습니다.</td></tr>';
    } else {
      body.innerHTML = list.map((s,i) => {
        const kwCount = (s.searchKeyword||'').split(',').map(k=>k.trim()).filter(k=>k).length;
        return `
        <tr>
          <td><input type="checkbox" class="s-check" data-key="${s._key}"></td>
          <td style="color:var(--text2)">${all.length - start - i}</td>
          <td style="font-weight:600">${s.agencyId||'-'}</td>
          <td>${s.userId||'-'}</td>
          <td>${s.url ? `<a href="${s.url}" target="_blank" style="color:var(--accent);font-weight:500;text-decoration:none;">${s.storeName||'-'}</a>` : `<span style="font-weight:500">${s.storeName||'-'}</span>`}</td>
          <td style="color:var(--text2);font-size:11px">${s.mid||'-'}</td>
          <td style="color:var(--text2)">${s.rankKeyword ? `<a href="https://m.search.naver.com/search.naver?where=m&query=${encodeURIComponent(s.rankKeyword)}" target="_blank" style="color:var(--text2);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">${s.rankKeyword}</a>` : '-'}</td>
          <td style="color:var(--text2)">${s.days||'-'}</td>
          <td style="color:var(--text2)">${s.startDate||'-'}</td>
          <td style="color:var(--text2)">${s.endDate||'-'}</td>
          <td><strong>${(s.dailyTarget||0).toLocaleString()}</strong></td>
          <td><span class="kw-badge">${kwCount}개</span></td>
          <td>${statusBadge(s, todayStr)}</td>
          <td>
            <div style="display:flex;gap:4px;justify-content:center;">
              <button class="action-btn btn-edit" onclick="openEditSlot('${s._key}')">수정</button>
              <button class="action-btn btn-del"  onclick="delSlot('${s._key}')">삭제</button>
            </div>
          </td>
          <td class="rank-col">
            <button class="action-btn" style="background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;" onclick="openRankPopup('${s._key}')">순위</button>
          </td>
        </tr>`;
      }).join('');
    }

    const pages = Math.ceil(all.length/PER)||1;
    const pg = document.getElementById('slots-pagination');
    let ph = `<button class="pg-btn" onclick="goP(1)">&laquo;</button><button class="pg-btn" onclick="goP(${Math.max(1,page-1)})">&lsaquo;</button>`;
    const s=Math.max(1,page-2),e=Math.min(pages,page+2);
    if(s>1){ph+=`<button class="pg-btn" onclick="goP(1)">1</button>`;if(s>2)ph+=`<span class="pg-btn" style="pointer-events:none">…</span>`;}
    for(let i=s;i<=e;i++) ph+=`<button class="pg-btn ${i===page?'active':''}" onclick="goP(${i})">${i}</button>`;
    if(e<pages){if(e<pages-1)ph+=`<span class="pg-btn" style="pointer-events:none">…</span>`;ph+=`<button class="pg-btn" onclick="goP(${pages})">${pages}</button>`;}
    ph+=`<button class="pg-btn" onclick="goP(${Math.min(pages,page+1)})">&rsaquo;</button><button class="pg-btn" onclick="goP(${pages})">&raquo;</button>`;
    pg.innerHTML = ph;
    const chkAll = document.getElementById('s-check-all');
    if (chkAll) { chkAll.checked = false; chkAll.indeterminate = false; }
    if(window.lucide) lucide.createIcons();
  };

  window.goP = n => { page=n; renderSlots(false); };
  window.toggleAll = cb => { document.querySelectorAll('.s-check').forEach(c=>c.checked=cb.checked); updateSelCount(); };
  window.updateSelCount = () => {
    const n = document.querySelectorAll('.s-check:checked').length;
    const el = document.getElementById('s-sel-count');
    if(el) el.textContent = `선택: ${n}건`;
  };
  window.resetFilter = () => {
    document.getElementById('f-status').value='';
    document.getElementById('f-kw').value='';
    page=1; renderSlots(false);
  };

  window.bulkDelete = async () => {
    const keys = [...document.querySelectorAll('.s-check:checked')].map(c => c.dataset.key);
    if(!keys.length) return alert('선택된 항목이 없습니다.');
    if(!confirm(`${keys.length}건을 삭제하시겠습니까?`)) return;
    await Promise.all(keys.map(k => HA.deleteSlot(k)));
    renderSlots(false);
  };

  window.delSlot = async key => {
    if(!confirm('삭제하시겠습니까?')) return;
    await HA.deleteSlot(key);
    renderSlots(false);
  };

  const STATUS_KO = { active:'진행중', expired:'종료' };
  const READONLY_STYLE = 'background:#f8fafc;color:var(--text2);cursor:default;';

  function slotModal(s, title, onSave) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box">
        <div class="modal-title">${title}</div>

        <!-- 읽기전용: 대행사/유저/캠페인타입/상태 -->
        <div class="modal-row">
          <div class="modal-field">
            <label>대행사 ID</label>
            <input id="m-agencyId" value="${s.agencyId||''}" readonly style="${READONLY_STYLE}">
          </div>
          <div class="modal-field">
            <label>유저 ID</label>
            <input id="m-userId" value="${s.userId||''}" readonly style="${READONLY_STYLE}">
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>상품등급</label>
            <input id="m-grade-display" value="불러오는 중..." readonly style="${READONLY_STYLE}">
          </div>
          <div class="modal-field">
            <label>상태</label>
            <input value="${STATUS_KO[s.status]||s.status||'-'}" readonly style="${READONLY_STYLE}">
          </div>
        </div>

        <!-- 수정 가능 필드 (user-apply 양식 순서) -->
        <div class="modal-row">
          <div class="modal-field">
            <label>업체명 <small style="color:var(--muted);font-weight:400">(네이버 상호명)</small></label>
            <input id="m-storeName" value="${s.storeName||''}">
          </div>
          <div class="modal-field">
            <label>순위 키워드</label>
            <input id="m-rankKeyword" value="${s.rankKeyword||''}">
          </div>
        </div>
        <div class="modal-field">
          <label>URL</label>
          <input id="m-url" value="${s.url||''}">
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>MID</label>
            <input id="m-mid" value="${s.mid||''}">
          </div>
          <div class="modal-field">
            <label>검색 키워드</label>
            <input id="m-searchKeyword" value="${s.searchKeyword||''}">
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>일 수</label>
            <input type="number" id="m-days" value="${s.days||''}" oninput="modalCalcEnd()">
          </div>
          <div class="modal-field">
            <label>일 목표</label>
            <input type="number" id="m-dailyTarget" value="${s.dailyTarget||''}">
          </div>
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>시작일</label>
            <input type="date" id="m-startDate" value="${s.startDate||''}" oninput="modalCalcEnd()">
          </div>
          <div class="modal-field">
            <label>종료일</label>
            <input type="date" id="m-endDate" value="${s.endDate||''}">
          </div>
        </div>
        <div class="modal-field">
          <label>메모</label>
          <textarea id="m-memo">${s.memo||''}</textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">취소</button>
          <button class="btn-save" id="modal-save-btn">저장</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    document.getElementById('modal-save-btn').onclick = onSave;
    (async () => {
      const el = document.getElementById('m-grade-display');
      if (!el) return;
      if (!s.mid) { el.value = '-'; return; }
      try {
        const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
        const snap = await get(ref(getDatabase(), `ha/grades/${s.mid.replace(/[.#$[\]/]/g,'_')}`));
        if (!snap.exists()) { el.value = '-'; return; }
        const data = snap.val();
        const labels = [...new Map((Array.isArray(data)?data:Object.values(data)).map(g=>[g.gradeLabel,g])).values()].map(g=>g.gradeLabel);
        el.value = labels.length ? labels.join(', ') : '-';
      } catch { el.value = '-'; }
    })();
  }

  // 일 수 변경 시 종료일 자동 계산
  window.modalCalcEnd = function() {
    const start = document.getElementById('m-startDate')?.value;
    const days  = Number(document.getElementById('m-days')?.value);
    if (start && days > 0) {
      const d = new Date(start);
      d.setDate(d.getDate() + days - 1);
      const yyyy = d.getFullYear();
      const mo = String(d.getMonth()+1).padStart(2,'0');
      const dd = String(d.getDate()).padStart(2,'0');
      document.getElementById('m-endDate').value = `${yyyy}-${mo}-${dd}`;
    }
  };

  function getFormData() {
    return {
      agencyId:    document.getElementById('m-agencyId')?.value || '',
      userId:      document.getElementById('m-userId')?.value   || '',
      storeName:   document.getElementById('m-storeName').value,
      rankKeyword: document.getElementById('m-rankKeyword').value,
      url:         document.getElementById('m-url').value,
      mid:         document.getElementById('m-mid').value,
      searchKeyword: document.getElementById('m-searchKeyword').value,
      days:        Number(document.getElementById('m-days').value)||0,
      dailyTarget: Number(document.getElementById('m-dailyTarget').value)||0,
      startDate:   document.getElementById('m-startDate').value,
      endDate:     document.getElementById('m-endDate').value,
      memo:        document.getElementById('m-memo').value,
    };
  }

  window.openEditSlot = key => {
    const s = allSlots.find(x => x._key === key) || {};
    slotModal(s, '캠페인 정보 수정', async () => {
      await HA.updateSlot(key, getFormData());
      document.querySelector('.modal-overlay').remove();
      renderSlots(false);
    });
  };

  window.openAddModal = () => {
    slotModal({}, '캠페인 직접 등록', async () => {
      const data = getFormData();
      const slot = await HA.addSlot(data);
      await HA.updateSlot(slot._key, { status: data.status });
      document.querySelector('.modal-overlay').remove();
      renderSlots(false);
    });
  };

  // ── 순위 팝업 열기 ────────────────────────────────────────
  window.openRankPopup = async function(slotKey) {
    const s = allSlots.find(x => x._key === slotKey);
    const { openRankPopup: _openRankPopup } = await import(new URL('rank-popup.js', document.baseURI).href);
    await _openRankPopup(s);
  };


  renderSlots(false);

  // ── 휴지통 ─────────────────────────────────────────────────
  const TRASH_DAYS = 30;

  function _trashRemaining(deletedAt) {
    if (!deletedAt) return TRASH_DAYS;
    const expire = new Date(deletedAt).getTime() + TRASH_DAYS * 86400000;
    return Math.max(0, Math.ceil((expire - Date.now()) / 86400000));
  }

  function _fmtDateOnly(iso) {
    if (!iso) return '-';
    const d = new Date(iso);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  window.openTrashView = async function() {
    if (document.getElementById('trash-modal')) return;
    const overlay = document.createElement('div');
    overlay.id = 'trash-modal';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:16px;width:100%;max-width:1100px;box-shadow:0 20px 60px rgba(0,0,0,.25);overflow:hidden;">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:17px;font-weight:700;">🗑️ 휴지통</span>
            <span style="font-size:12px;color:var(--muted);">삭제 후 ${TRASH_DAYS}일간 보관 · 기간 만료 시 자동 영구삭제</span>
          </div>
          <div style="display:flex;gap:8px;">
            <button onclick="emptyTrash()" style="padding:7px 14px;border:none;border-radius:6px;background:#ef4444;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">전체 영구삭제</button>
            <button onclick="document.getElementById('trash-modal').remove()" style="padding:7px 14px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;">닫기</button>
          </div>
        </div>
        <div id="trash-table-area" style="min-height:200px;">
          <div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    await _renderTrashContent();
  };

  async function _renderTrashContent() {
    const area = document.getElementById('trash-table-area');
    if (!area) return;

    const slots = await HA.getSlots();
    const trashed = slots.filter(s => s.status === 'deleted');

    // 30일 초과 항목 자동 영구삭제
    const now = Date.now();
    const expired = trashed.filter(s => s.deletedAt && now > new Date(s.deletedAt).getTime() + TRASH_DAYS * 86400000);
    if (expired.length) {
      await Promise.all(expired.map(s => HA.permanentDeleteSlot(s._key)));
    }
    const active = trashed.filter(s => !expired.some(e => e._key === s._key));

    if (!active.length) {
      area.innerHTML = '<div style="padding:60px 0;text-align:center;color:var(--muted);font-size:13px;">휴지통이 비어 있습니다.</div>';
      return;
    }

    area.innerHTML = `
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead>
          <tr>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">접수일시</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">대행사</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">유저 ID</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">플레이스명</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">MID</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">삭제일시</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;border-right:1px solid #2d3f55;">남은 기간</th>
            <th style="background:#1e293b;color:#fff;padding:10px;font-weight:500;text-align:center;white-space:nowrap;">액션</th>
          </tr>
        </thead>
        <tbody>
          ${active.map(s => {
            const rem = _trashRemaining(s.deletedAt);
            const remCls = rem > 14 ? 'trash-days-ok' : rem > 7 ? 'trash-days-warn' : 'trash-days-bad';
            return `<tr style="border-bottom:1px solid var(--border);">
              <td style="padding:10px;text-align:center;color:var(--text2);">${_fmtDateOnly(s.createdAt)}</td>
              <td style="padding:10px;text-align:center;font-weight:600;">${s.agencyId||'-'}</td>
              <td style="padding:10px;text-align:center;">${s.userId||'-'}</td>
              <td style="padding:10px;text-align:center;">${s.storeName||'-'}</td>
              <td style="padding:10px;text-align:center;font-size:11px;color:var(--text2);">${s.mid||'-'}</td>
              <td style="padding:10px;text-align:center;color:var(--text2);">${_fmtDateOnly(s.deletedAt)}</td>
              <td style="padding:10px;text-align:center;"><span class="${remCls}">${rem}일</span></td>
              <td style="padding:10px;text-align:center;">
                <div style="display:flex;gap:5px;justify-content:center;">
                  <button onclick="restoreFromTrash('${s._key}')" style="padding:4px 10px;border-radius:5px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:rgba(16,185,129,.15);color:#059669;font-family:inherit;">복구</button>
                  <button onclick="permanentDeleteFromTrash('${s._key}')" style="padding:4px 10px;border-radius:5px;border:none;font-size:11px;font-weight:600;cursor:pointer;background:rgba(239,68,68,.1);color:#dc2626;font-family:inherit;">영구삭제</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  window.restoreFromTrash = async function(key) {
    if (!confirm('이 캠페인을 복구하시겠습니까?')) return;
    await HA.restoreSlot(key);
    await _renderTrashContent();
    renderSlots(false);
  };

  window.permanentDeleteFromTrash = async function(key) {
    if (!confirm('영구 삭제하면 복구가 불가능합니다.\n정산 데이터도 함께 삭제됩니다. 계속하시겠습니까?')) return;
    await HA.permanentDeleteSlot(key);
    await _renderTrashContent();
  };

  window.emptyTrash = async function() {
    const slots = await HA.getSlots();
    const trashed = slots.filter(s => s.status === 'deleted');
    if (!trashed.length) { alert('휴지통이 이미 비어 있습니다.'); return; }
    if (!confirm(`휴지통의 모든 항목 ${trashed.length}건을 영구 삭제합니다.\n복구할 수 없으며, 정산 데이터도 함께 삭제됩니다. 계속하시겠습니까?`)) return;
    await Promise.all(trashed.map(s => HA.permanentDeleteSlot(s._key)));
    await _renderTrashContent();
  };

})();
</script>
</div>
