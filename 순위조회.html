<div id="rank-page">
<style>
  #rank-page .rk-tab-nav { display:flex; gap:8px; margin-bottom:20px; }
  #rank-page .rk-tab { padding:8px 20px; border-radius:10px; border:1px solid var(--border); background:#fff; font-size:13px; font-weight:600; cursor:pointer; color:var(--text2); font-family:inherit; transition:.2s; }
  #rank-page .rk-tab:hover { background:var(--bg); }
  #rank-page .rk-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 4px 12px rgba(16,185,129,.25); }

  /* 전체탭 테이블 */
  #rank-page .tbl-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow-x:auto; }
  #rank-page table { width:100%; border-collapse:collapse; font-size:12px; white-space:nowrap; }
  #rank-page thead th { background:#1e293b; color:#fff; padding:9px 10px; font-weight:500; border-right:1px solid #2d3f55; text-align:center; }
  #rank-page tbody td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
  #rank-page tbody tr:last-child td { border-bottom:none; }
  #rank-page tbody tr:hover { background:#f8fafc; }

  /* sticky 컬럼 */
  #rank-page thead th.st { position:sticky; z-index:3; background:#1e293b; }
  #rank-page tbody td.st { position:sticky; z-index:2; background:#fff; }
  #rank-page tbody tr:hover td.st { background:#f8fafc; }
  #rank-page .st-0 { left:0; min-width:80px; }
  #rank-page .st-1 { left:80px; min-width:130px; }
  #rank-page .st-2 { left:210px; min-width:110px; }
  #rank-page .st-3 { left:320px; min-width:160px; border-right:2px solid #2d3f55; }
  #rank-page tbody td.st-3 { border-right:2px solid #e2e8f0; }

  /* 대행사 필터 */
  #rank-page .agency-filter { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  #rank-page .af-btn { padding:5px 14px; border-radius:20px; border:1px solid var(--border); background:#fff; font-size:12px; font-weight:600; cursor:pointer; color:var(--text2); font-family:inherit; transition:.2s; }
  #rank-page .af-btn:hover { background:var(--bg); }
  #rank-page .af-btn.active { background:#1e293b; color:#fff; border-color:#1e293b; }

  /* 날짜 헤더 */
  #rank-page th.dc { min-width:54px; }
  #rank-page td.dc { min-width:54px; }

  /* 순위 배지 */
  #rank-page .rb { display:inline-block; font-size:12px; font-weight:700; text-align:center; color:#64748b; }
  #rank-page .rb.nd  { color:#cbd5e1; font-size:11px; font-weight:400; }
  /* 전날 대비 색상 (보합=회색, 상승=빨강, 하락=파랑) */
  #rank-page .rb.up   { color:#ef4444; }
  #rank-page .rb.down { color:#3b82f6; }

  /* 로딩 */
  #rank-page .loading-wrap { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:13px; gap:8px; }
  #rank-page .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:rk-spin .6s linear infinite; }
  @keyframes rk-spin { to { transform:rotate(360deg); } }

  /* 개별탭 */
  #rank-page .rk-btn { margin-top:12px; padding:10px 24px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:.2s; width:100%; box-sizing:border-box; }
  #rank-page .rk-btn:hover:not(:disabled) { background:var(--accent2); }
  #rank-page .rk-btn:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
  #rank-page .rk-msg { padding:12px 14px; border-radius:10px; font-size:12px; background:var(--bg); color:var(--text2); text-align:center; }
  #rank-page .rk-msg.err { background:#fef2f2; color:#dc2626; }

  /* 개별탭 입력 테이블 */
  #rank-page .rk-input-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden; flex-shrink:0; width:360px; }
  #rank-page .rk-input-tbl { width:100%; border-collapse:collapse; font-size:12px; }
  #rank-page .rk-input-tbl thead th { background:#1e293b; color:#fff; padding:8px 6px; font-weight:500; text-align:center; font-size:11px; }
  #rank-page .rk-input-tbl tbody td { padding:6px 6px; border-bottom:1px solid var(--border); }
  #rank-page .rk-input-tbl tbody tr:last-child td { border-bottom:none; }
  #rank-page .rk-input-tbl .rk-num { text-align:center; font-size:11px; color:var(--muted); font-weight:600; width:28px; }
  #rank-page .rk-inp { width:100%; padding:5px 6px; border:1.5px solid var(--border); border-radius:6px; font-size:12px; font-family:inherit; background:#fafafa; color:var(--text); outline:none; transition:.2s; box-sizing:border-box; }
  #rank-page .rk-inp:focus { border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px rgba(16,185,129,.1); }
  #rank-page .rk-inp-kw { min-width:110px; }
  #rank-page .rk-inp-mid { min-width:90px; }

  /* 개별탭 결과 테이블 */
  #rank-page .rk-result-wrap { background:#fff; border:1px solid var(--border); border-radius:10px; overflow-x:auto; flex:1; min-width:0; }
  #rank-page .rk-res-tbl { width:100%; border-collapse:collapse; font-size:12px; white-space:nowrap; }
  #rank-page .rk-res-tbl thead th { background:#1e293b; color:#fff; padding:8px 10px; font-weight:500; text-align:center; font-size:11px; }
  #rank-page .rk-res-tbl tbody td { padding:8px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle; }
  #rank-page .rk-res-tbl tbody tr:last-child td { border-bottom:none; }
  #rank-page .rk-res-tbl tbody tr:hover { background:#f8fafc; }
  #rank-page .rk-res-name { font-weight:700; color:var(--text); text-align:left !important; }
  #rank-page .rk-res-cat  { font-size:11px; color:var(--muted); }
  #rank-page .rk-res-mid  { font-size:10px; color:var(--muted); }
  #rank-page .rk-res-kw   { font-weight:600; font-size:12px; }
  #rank-page .rk-cell-loading { color:var(--muted); font-size:11px; }
  #rank-page .rk-cell-err    { color:#dc2626; font-size:11px; }

  /* 순위 배지 (개별결과) */
  #rank-page .rank-num { font-weight:900; line-height:1; }
  #rank-page .rank-top3  { color:#10b981; }
  #rank-page .rank-top10 { color:#3b82f6; }
  #rank-page .rank-top20 { color:#f59e0b; }
  #rank-page .rank-low   { color:#94a3b8; }
</style>

<div class="rk-tab-nav">
  <button class="rk-tab active" onclick="rkTab('all',this)">전체</button>
  <button class="rk-tab"        onclick="rkTab('single',this)">개별</button>
</div>

<!-- 전체 탭 -->
<div id="rk-all">
  <div class="agency-filter" id="rk-agency-filter"></div>
  <div class="tbl-wrap">
    <table id="rk-tbl">
      <thead>
        <tr id="rk-thead">
          <th class="st st-0">대행사</th>
          <th class="st st-1">플레이스명</th>
          <th class="st st-2">MID</th>
          <th class="st st-3">순위키워드</th>
        </tr>
      </thead>
      <tbody id="rk-tbody">
        <tr><td colspan="4"><div class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- 개별 탭 -->
<div id="rk-single" style="display:none">
  <div style="display:flex; gap:16px; align-items:flex-start">
    <div>
      <div class="rk-input-wrap">
        <table class="rk-input-tbl">
          <thead>
            <tr>
              <th style="width:28px">#</th>
              <th>순위키워드</th>
              <th>MID</th>
            </tr>
          </thead>
          <tbody id="rk-input-tbody"></tbody>
        </table>
      </div>
      <button class="rk-btn" id="rk-btn" onclick="rkCheckAll()">순위 조회</button>
    </div>
    <div id="rk-result" style="flex:1; min-width:0"></div>
  </div>
</div>

</div><!-- #rank-page -->

<script>
(function(){
  const CLOUD_RUN = 'https://higher-auto-g4lrwwqw4q-du.a.run.app';

  /* 탭 전환 */
  window.rkTab = function(tab, el) {
    document.querySelectorAll('#rank-page .rk-tab').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('rk-all').style.display    = tab === 'all'    ? '' : 'none';
    document.getElementById('rk-single').style.display = tab === 'single' ? '' : 'none';
  };

  /* 순위 배지 */
  function rb(rank, prevRank) {
    const r = Number(rank);
    if (!r) return '<span class="rb nd">-</span>';
    const p = Number(prevRank);
    let trendCls = '';
    if (p && r < p) trendCls = ' up';        // 숫자 감소 = 순위 상승 → 빨간색
    else if (p && r > p) trendCls = ' down';  // 숫자 증가 = 순위 하락 → 파란색
    return `<span class="rb${trendCls}">${r}위</span>`;
  }

  /* 전체 탭 로드 */
  async function loadAll() {
    const tbody = document.getElementById('rk-tbody');
    try {
      const slots = await HA.getSlots();
      const active = Object.values(slots || {})
        .filter(s => s.status === 'active' && s.mid && s.rankKeyword);

      if (!active.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="height:160px;text-align:center;color:var(--muted);font-size:13px">진행중인 캠페인이 없습니다.</td></tr>';
        return;
      }

      const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
      const db = getDatabase();

      const rankDataArr = await Promise.all(active.map(async s => {
        const safeMid = s.mid.replace(/[.#$[\]/]/g, '_');
        try {
          const snap = await get(ref(db, `ha/ranks/${safeMid}`));
          return snap.exists() ? snap.val() : {};
        } catch { return {}; }
      }));

      /* 전체 날짜 수집 → 최신순 */
      const dateSet = new Set();
      rankDataArr.forEach(rd => Object.keys(rd).forEach(d => dateSet.add(d)));
      const dates = [...dateSet].sort((a, b) => b.localeCompare(a));

      /* 날짜 헤더 추가 */
      const thead = document.getElementById('rk-thead');
      dates.forEach(d => {
        const th = document.createElement('th');
        th.className = 'dc';
        th.textContent = d.slice(5).replace('-', '/');
        thead.appendChild(th);
      });

      /* 대행사 필터 버튼 생성 */
      const strip = s => s.replace(/^\[.*?\]/, '').trim() || s;
      const agencies = [...new Set(active.map(s => s.agencyId || '-'))]
        .sort((a, b) => strip(a).localeCompare(strip(b), 'ko'));
      let currentAgency = '';
      const filterWrap = document.getElementById('rk-agency-filter');

      function renderFilter() {
        filterWrap.innerHTML = ['전체', ...agencies].map(a =>
          `<button class="af-btn ${currentAgency === a || (a === '전체' && !currentAgency) ? 'active' : ''}"
            onclick="rkAgencyFilter('${a}')">${a}</button>`
        ).join('');
      }

      window.rkAgencyFilter = function(agency) {
        currentAgency = agency === '전체' ? '' : agency;
        renderFilter();
        document.querySelectorAll('#rk-tbody tr[data-agency]').forEach(tr => {
          tr.style.display = (!currentAgency || tr.dataset.agency === currentAgency) ? '' : 'none';
        });
      };

      renderFilter();

      /* 행 렌더 */
      tbody.innerHTML = '';
      active.forEach((s, i) => {
        const rd = rankDataArr[i];
        const tr = document.createElement('tr');
        tr.dataset.agency = s.agencyId || '-';
        tr.innerHTML = `
          <td class="st st-0">${s.agencyId || '-'}</td>
          <td class="st st-1" style="font-weight:600">${s.storeName || '-'}</td>
          <td class="st st-2" style="font-size:11px;color:var(--muted)">${s.mid}</td>
          <td class="st st-3">${s.rankKeyword}</td>
          ${dates.map((d, di) => {
            const prevDate = dates[di + 1];
            const prevRank = prevDate ? rd[prevDate]?.rank : null;
            return `<td class="dc">${rb(rd[d]?.rank, prevRank)}</td>`;
          }).join('')}
        `;
        tbody.appendChild(tr);
      });

    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="4" style="height:120px;text-align:center;color:#dc2626;font-size:13px">로드 실패: ${e.message}</td></tr>`;
    }
  }

  loadAll();

  /* 개별탭 입력행 생성 (10개) */
  const ROW_COUNT = 10;
  (function buildInputRows() {
    const tbody = document.getElementById('rk-input-tbody');
    for (let i = 1; i <= ROW_COUNT; i++) {
      tbody.insertAdjacentHTML('beforeend', `
        <tr>
          <td class="rk-num">${i}</td>
          <td><input class="rk-inp rk-inp-kw" id="rk-kw-${i}" placeholder="키워드" autocomplete="off"></td>
          <td><input class="rk-inp rk-inp-mid" id="rk-mid-${i}" placeholder="MID" autocomplete="off"></td>
        </tr>`);
    }
    /* 마지막 열 Enter → 조회 */
    for (let i = 1; i <= ROW_COUNT; i++) {
      document.getElementById(`rk-mid-${i}`).addEventListener('keydown', e => {
        if (e.key === 'Enter') rkCheckAll();
      });
    }
  })();

  /* 순위 셀 렌더 */
  function rankCell(rank) {
    if (!rank || rank <= 0) return '<span style="color:var(--muted);font-size:12px">100위+</span>';
    const cls = rank <= 3 ? 'top3' : rank <= 10 ? 'top10' : rank <= 20 ? 'top20' : 'low';
    return `<span class="rank-num rank-${cls}" style="font-size:18px">${rank}</span><span style="font-size:12px;color:var(--text2);font-weight:600">위</span>`;
  }

  /* 개별 대량 조회 */
  window.rkCheckAll = async function() {
    const items = [];
    for (let i = 1; i <= ROW_COUNT; i++) {
      const kw  = (document.getElementById(`rk-kw-${i}`)?.value || '').trim();
      const mid = (document.getElementById(`rk-mid-${i}`)?.value || '').trim();
      if (kw && mid) items.push({ idx: i, keyword: kw, mid });
    }
    if (!items.length) {
      document.getElementById('rk-result').innerHTML = '<div class="rk-msg">키워드와 MID를 하나 이상 입력해주세요.</div>';
      return;
    }

    const btn = document.getElementById('rk-btn');
    btn.disabled = true; btn.textContent = `조회 중... (${items.length}건)`;

    /* 결과 테이블 (로딩 상태) */
    const resultDiv = document.getElementById('rk-result');
    resultDiv.innerHTML = `
      <div class="rk-result-wrap">
        <table class="rk-res-tbl">
          <thead>
            <tr>
              <th>#</th>
              <th style="text-align:left">업체명</th>
              <th>카테고리</th>
              <th>MID</th>
              <th>순위키워드</th>
              <th>순위</th>
            </tr>
          </thead>
          <tbody id="rk-res-tbody">
            ${items.map(it => `
              <tr id="rk-res-row-${it.idx}">
                <td style="color:var(--muted);font-size:12px">${it.idx}</td>
                <td colspan="4" class="rk-cell-loading" style="text-align:left">
                  <div style="display:flex;align-items:center;gap:6px"><div class="spinner"></div> 조회 중...</div>
                </td>
                <td></td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;

    /* 병렬 조회 */
    await Promise.allSettled(items.map(async it => {
      const row = document.getElementById(`rk-res-row-${it.idx}`);
      try {
        const resp = await fetch(`${CLOUD_RUN}/rank-check`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ keyword: it.keyword, mid: it.mid }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || '오류');
        row.innerHTML = `
          <td style="color:var(--muted);font-size:12px">${it.idx}</td>
          <td class="rk-res-name">${data.name || '-'}</td>
          <td class="rk-res-cat">${data.category || '-'}</td>
          <td class="rk-res-mid">${it.mid}</td>
          <td class="rk-res-kw">${it.keyword}</td>
          <td>${rankCell(data.rank)}</td>`;
      } catch(e) {
        row.innerHTML = `
          <td style="color:var(--muted);font-size:12px">${it.idx}</td>
          <td class="rk-cell-err" colspan="4" style="text-align:left">❌ ${e.message}</td>
          <td></td>`;
      }
    }));

    btn.disabled = false; btn.textContent = '순위 조회';
  };

})();
</script>
