<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<style>
/* ── 탭 ── */
.rk-tab-nav{display:flex;gap:8px;margin-bottom:20px}
.rk-tab{padding:8px 20px;border-radius:10px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:var(--text2);font-family:inherit;transition:.2s}
.rk-tab:hover{background:var(--bg)}
.rk-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(16,185,129,.25)}

/* ── 전체 탭 테이블 ── */
.rk-tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:#fff}
.rk-tbl{width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap}
.rk-tbl thead tr{background:#f8fafc}
.rk-tbl thead th{padding:10px 14px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.4px;border-bottom:1px solid var(--border)}
.rk-tbl tbody td{padding:9px 14px;border-bottom:1px solid #f1f5f9;text-align:center;color:var(--text);background:#fff;transition:background .1s}
.rk-tbl tbody tr:last-child td{border-bottom:none}
.rk-tbl tbody tr:hover td{background:#f8fafc}

/* sticky 컬럼 */
.rk-tbl th.st,.rk-tbl td.st{position:sticky;z-index:2}
.rk-tbl thead th.st{background:#f8fafc;z-index:3}
.rk-tbl tbody tr:hover td.st{background:#f8fafc}
.rk-tbl td.st{background:#fff}
.st-0{left:0;min-width:72px}
.st-1{left:72px;min-width:130px;text-align:left!important}
.rk-tbl td.st-1{text-align:left!important}
.st-2{left:202px;min-width:106px}
.st-3{left:308px;min-width:150px;text-align:left!important;border-right:2px solid var(--border)}
.rk-tbl td.st-3{text-align:left!important;border-right:2px solid #e2e8f0}

/* 날짜 컬럼 */
.rk-tbl th.dc{min-width:52px}
.rk-tbl td.dc{min-width:52px}

/* 순위 배지 */
.rb{display:inline-block;min-width:30px;padding:2px 6px;border-radius:6px;font-size:12px;font-weight:700;line-height:1.7;text-align:center}
.rb.t3 {background:#dcfce7;color:#16a34a}
.rb.t10{background:#dbeafe;color:#2563eb}
.rb.t20{background:#ffedd5;color:#ea580c}
.rb.low{background:#f1f5f9;color:#64748b}
.rb.nd {color:#cbd5e1;font-size:11px;font-weight:400}

/* ── 개별 탭 ── */
.rk-sec{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:0 0 16px}
.rk-form{display:flex;flex-direction:column;gap:12px;max-width:420px}
.rk-field{display:flex;flex-direction:column;gap:6px}
.rk-label{font-size:12px;font-weight:600;color:var(--text2)}
.rk-input{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);outline:none;transition:.2s}
.rk-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(16,185,129,.1)}
.rk-btn{margin-top:4px;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.rk-btn:hover:not(:disabled){background:var(--accent2)}
.rk-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed}
.rk-msg{margin-top:20px;padding:14px 16px;border-radius:10px;font-size:13px;background:var(--bg);color:var(--text2)}
.rk-msg.err{background:#fef2f2;color:#dc2626}
.rk-card{margin-top:20px;max-width:480px;background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:20px 24px}
.rk-card-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.rk-card-row:last-child{border-bottom:none}
.rk-card-label{font-size:12px;font-weight:600;color:var(--text2)}
.rk-card-val{font-size:14px;font-weight:600;color:var(--text)}
.rank-top3{color:#10b981}.rank-top10{color:#3b82f6}.rank-top20{color:#f59e0b}.rank-low{color:#94a3b8}
</style>
</head>
<body>
<div id="rk-wrap">
  <p class="rk-sec">플레이스 순위 조회</p>

  <div class="rk-tab-nav">
    <button class="rk-tab active" onclick="rkSwitchTab('all',this)">전체</button>
    <button class="rk-tab"        onclick="rkSwitchTab('single',this)">개별</button>
  </div>

  <!-- 전체 탭 -->
  <div id="rk-tab-all">
    <div id="rk-all-status" class="rk-msg" style="margin-top:0;margin-bottom:16px">불러오는 중...</div>
    <div class="rk-tbl-wrap">
      <table class="rk-tbl">
        <thead><tr id="rk-thead-row">
          <th class="st st-0">대행사</th>
          <th class="st st-1">플레이스명</th>
          <th class="st st-2">MID</th>
          <th class="st st-3">순위키워드</th>
        </tr></thead>
        <tbody id="rk-all-body"></tbody>
      </table>
    </div>
  </div>

  <!-- 개별 탭 -->
  <div id="rk-tab-single" style="display:none">
    <div class="rk-form">
      <div class="rk-field">
        <label class="rk-label">키워드</label>
        <input class="rk-input" id="rk-keyword" placeholder="예) 강남역 꽃게" autocomplete="off">
      </div>
      <div class="rk-field">
        <label class="rk-label">MID</label>
        <input class="rk-input" id="rk-mid" placeholder="예) 2055089692" autocomplete="off">
      </div>
      <button class="rk-btn" id="rk-btn" onclick="rkCheck()">순위 조회</button>
    </div>
    <div id="rk-result"></div>
  </div>
</div>

<script>
(function(){

const CLOUD_RUN  = 'https://higher-auto-g4lrwwqw4q-du.a.run.app';
const RANK_BASE  = 'ha/ranks';
const DB_URL     = 'https://higherad-b9d62-default-rtdb.asia-southeast1.firebasedatabase.app';

/* ── 탭 전환 ── */
window.rkSwitchTab = function(tab, el) {
  document.querySelectorAll('.rk-tab').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('rk-tab-all').style.display    = tab === 'all'    ? '' : 'none';
  document.getElementById('rk-tab-single').style.display = tab === 'single' ? '' : 'none';
};

/* ── 순위 배지 ── */
function rb(rank) {
  if (!rank && rank !== 0) return `<span class="rb nd">-</span>`;
  const r = Number(rank);
  if (!r) return `<span class="rb nd">-</span>`;
  const cls = r <= 3 ? 't3' : r <= 10 ? 't10' : r <= 20 ? 't20' : 'low';
  return `<span class="rb ${cls}">${r}위</span>`;
}

/* ── 전체 탭 데이터 로드 ── */
async function loadAllRanks() {
  const status = document.getElementById('rk-all-status');
  try {
    // 1) 진행중 슬롯 로드
    const slots = await HA.getSlots();
    const active = Object.values(slots || {}).filter(s => s.status === 'active' && s.mid && s.rankKeyword);
    if (!active.length) {
      status.textContent = '진행중인 캠페인이 없습니다.';
      return;
    }

    // 2) Firebase에서 각 슬롯 순위 데이터 로드
    const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
    const db = getDatabase();

    const rankDataArr = await Promise.all(active.map(async s => {
      const safeMid = s.mid.replace(/[.#$[\]/]/g, '_');
      try {
        const snap = await get(ref(db, `${RANK_BASE}/${safeMid}`));
        return snap.exists() ? snap.val() : {};
      } catch { return {}; }
    }));

    // 3) 전체 날짜 수집 → 최신순 정렬
    const dateSet = new Set();
    rankDataArr.forEach(rd => Object.keys(rd).forEach(d => dateSet.add(d)));
    const dates = [...dateSet].sort((a,b) => b.localeCompare(a)); // 최신 → 과거

    // 4) 헤더 날짜 컬럼 추가
    const thead = document.getElementById('rk-thead-row');
    dates.forEach(d => {
      const th = document.createElement('th');
      th.className = 'dc';
      th.textContent = d.slice(5).replace('-', '/'); // "04/07"
      thead.appendChild(th);
    });

    // 5) 행 렌더
    const tbody = document.getElementById('rk-all-body');
    active.forEach((s, i) => {
      const rd = rankDataArr[i];
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="st st-0">${s.agencyId || '-'}</td>
        <td class="st st-1" style="font-weight:600">${s.storeName || '-'}</td>
        <td class="st st-2" style="font-size:11px;color:var(--muted)">${s.mid}</td>
        <td class="st st-3">${s.rankKeyword}</td>
        ${dates.map(d => `<td class="dc">${rb(rd[d]?.rank)}</td>`).join('')}
      `;
      tbody.appendChild(tr);
    });

    status.style.display = 'none';

  } catch(e) {
    status.className = 'rk-msg err';
    status.textContent = '데이터 로드 실패: ' + e.message;
  }
}

loadAllRanks();

/* ── 개별 탭 ── */
function showResult(html){ document.getElementById('rk-result').innerHTML = html; }

window.rkCheck = async function(){
  const keyword = document.getElementById('rk-keyword').value.trim();
  const mid     = document.getElementById('rk-mid').value.trim();
  if(!keyword || !mid){
    showResult('<div class="rk-msg">키워드와 MID를 모두 입력해주세요.</div>');
    return;
  }
  const btn = document.getElementById('rk-btn');
  btn.disabled = true; btn.textContent = '조회 중...';
  showResult('<div class="rk-msg">🔄 순위 조회 중... (최대 30초)</div>');

  try {
    const resp = await fetch(`${CLOUD_RUN}/rank-check`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({keyword, mid}),
    });
    const data = await resp.json();
    if(!resp.ok){ showResult(`<div class="rk-msg err">❌ ${data.error||'오류 발생'}</div>`); return; }

    const rank = data.rank;
    const row  = (label, val) => val ? `<div class="rk-card-row"><span class="rk-card-label">${label}</span><span class="rk-card-val">${val}</span></div>` : '';

    if(rank > 0){
      const badge = rank<=3?'top3':rank<=10?'top10':rank<=20?'top20':'low';
      showResult(`
        <div class="rk-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
            <div>
              <div style="font-size:17px;font-weight:700;margin-bottom:2px">${data.name||keyword}</div>
              <div style="font-size:12px;color:var(--muted,#94a3b8)">${data.category||''}</div>
            </div>
            <div style="text-align:right;line-height:1">
              <span style="font-size:40px;font-weight:900" class="rank-${badge}">${rank}</span>
              <span style="font-size:18px;font-weight:700;color:var(--text2)">위</span>
            </div>
          </div>
          ${row('키워드', keyword)}
          ${row('MID', mid)}
          ${data.url?`<div class="rk-card-row"><span class="rk-card-label">링크</span><span class="rk-card-val"><a href="${data.url}" target="_blank" style="color:var(--accent,#10b981)">네이버 플레이스</a></span></div>`:''}
        </div>`);
    } else {
      showResult(`
        <div class="rk-card">
          ${row('키워드', keyword)}${row('MID', mid)}
          <div style="text-align:center;padding:20px 0">
            <div style="font-size:32px;font-weight:900;color:#94a3b8">100위+</div>
            <div style="font-size:12px;color:var(--muted,#94a3b8);margin-top:6px">순위권 밖</div>
          </div>
        </div>`);
    }
  } catch(e){
    showResult(`<div class="rk-msg err">❌ 네트워크 오류: ${e.message}</div>`);
  } finally {
    btn.disabled=false; btn.textContent='순위 조회';
  }
};

['rk-keyword','rk-mid'].forEach(id=>{
  const el=document.getElementById(id);
  if(el) el.addEventListener('keydown', e=>{ if(e.key==='Enter') rkCheck(); });
});

})();
</script>
</body></html>
