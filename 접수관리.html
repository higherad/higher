<div id="receipt-page">
<style>
  #receipt-page .filter-bar {
    background:#fff; border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; display:flex; gap:10px; align-items:center; margin-bottom:14px;
  }
  #receipt-page select, #receipt-page input[type=text] {
    padding:6px 10px; border:1px solid var(--border); border-radius:6px;
    font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none;
  }
  #receipt-page .tbl-wrap {
    background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;
  }
  #receipt-page table { width:100%; border-collapse:collapse; font-size:12px; }
  #receipt-page thead th {
    background:#1e293b; color:#fff; padding:11px 10px; font-weight:500;
    border-right:1px solid #2d3f55; white-space:nowrap; text-align:center;
  }
  #receipt-page tbody td {
    padding:11px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle;
  }
  #receipt-page tbody tr:last-child td { border-bottom:none; }
  #receipt-page tbody tr:hover { background:#f8fafc; }
  .status-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .s-pending   { background:rgba(245,158,11,.1);  color:#b45309; }
  .s-accepted  { background:rgba(59,130,246,.1);  color:#1d4ed8; }
  .s-active    { background:rgba(16,185,129,.1);  color:#059669; }
  .s-expired   { background:#f1f5f9; color:#64748b; }
  #receipt-page.guest-mode #dl-submit-btn { display:none; }
  .action-btn { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; transition:.15s; }
  .btn-approve { background:var(--accent); color:#fff; }
  .btn-approve:hover { background:var(--accent2); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9000; display:flex; align-items:center; justify-content:center; }
  .modal-box { background:#fff; border-radius:16px; width:520px; max-height:80vh; overflow-y:auto; overscroll-behavior:contain; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:12px; color:var(--text2); font-weight:600; margin-bottom:5px; }
  .modal-field input, .modal-field textarea, .modal-field select { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:7px; font-size:13px; font-family:inherit; outline:none; color:var(--text); box-sizing:border-box; }
  .modal-field textarea { resize:vertical; min-height:70px; }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color:var(--accent); }
  .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  .agency-block{margin-bottom:16px;border:1.5px solid #c7d2fe;border-radius:14px;overflow:hidden}
  .agency-block:last-child{margin-bottom:0}
  .agency-hd{display:flex;justify-content:space-between;align-items:center;background:#eff4ff;padding:12px 16px;border-bottom:1.5px solid #c7d2fe}
  .agency-hd .aname{font-size:15px;font-weight:800;color:var(--info)}
  .agency-hd .ameta{font-size:12px;color:#6366f1;margin-top:1px}
  .ag-table{width:100%;border-collapse:collapse;font-size:13px}
  .ag-table thead th{background:#f8fafc;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.3px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
  .ag-table tbody tr{border-bottom:1px solid var(--border)}
  .ag-table tbody tr:last-child{border-bottom:none}
  .ag-table tbody td{padding:10px 14px}
  .agency-ft{background:#f0f4ff;border-top:1.5px solid #c7d2fe;padding:11px 16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
  .agency-ft .totals{display:flex;gap:20px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .btn-cancel { padding:8px 20px; border:1px solid var(--border); border-radius:7px; background:#fff; cursor:pointer; font-size:13px; }
  .btn-save   { padding:8px 20px; border:none; border-radius:7px; background:var(--accent); color:#fff; cursor:pointer; font-size:13px; font-weight:600; }
  .btn-save:hover { background:var(--accent2); }
  .empty-row td { height:200px; text-align:center; color:var(--muted); font-size:13px; }
  .pagination { display:flex; justify-content:center; gap:5px; margin-top:16px; }
  .pg-btn { width:30px; height:30px; border:1px solid var(--border); background:#fff; border-radius:6px; font-size:12px; cursor:pointer; color:var(--text2); display:flex; align-items:center; justify-content:center; }
  .pg-btn.active { background:var(--info); color:#fff; border-color:var(--info); }
  .slot-detail { text-align:left; }
  .slot-detail dt { font-size:11px; color:var(--text2); margin-top:10px; }
  .slot-detail dd { font-size:13px; margin:2px 0 0 0; font-weight:500; }
  .loading-wrap { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:13px; gap:8px; }
  .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .detail-kw-input { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; outline:none; color:var(--text); box-sizing:border-box; margin-top:3px; }
  .detail-kw-input:focus { border-color:var(--accent); }
  .stat-bar { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px; }
  .stat-box { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px 20px; display:flex; align-items:center; gap:14px; }
  .stat-box .sb-icon { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .stat-box .sb-label { font-size:11px; color:var(--text2); font-weight:600; margin-bottom:4px; }
  .stat-box .sb-val { font-size:22px; font-weight:800; line-height:1; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    .stat-bar { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .sb-val { font-size:16px !important; }
    .sb-icon { width:30px !important; height:30px !important; font-size:13px !important; }
    #receipt-page .filter-bar { flex-wrap: wrap; gap: 6px; }
    #receipt-page .filter-bar > * { flex: 1 1 calc(50% - 6px); min-width: 120px; }
    #receipt-page .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #receipt-page table { min-width: 900px; }
    .modal-box { width: calc(100vw - 32px); padding: 20px; }
    .modal-row { grid-template-columns: 1fr; }
  }

  /* ── 상품 패널 ── */
  .prod-panel{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;}
  .prod-ph{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:#f8fafc;cursor:pointer;user-select:none;transition:background .15s;}
  .prod-ph:hover{background:#f1f5f9;}
  .prod-ph-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
  .prod-pb{padding:14px 16px;}
  .prod-panel.collapsed .prod-ph{border-bottom:none;}
  .prod-panel.collapsed .prod-pb{display:none;}
  .prod-panel.collapsed .prod-ph-desc{display:none;}
  .prod-panel.collapsed .prod-ph-actions{display:none !important;}
  .prod-toggle-icon{margin-left:2px;font-size:11px;color:var(--text2);transition:transform .2s;display:inline-block;}
  .prod-panel.collapsed .prod-toggle-icon{transform:rotate(-90deg);}
  .prod-grp-btn{display:inline-flex;align-items:center;gap:7px;background:#f8fafc;border:1.5px solid var(--border);border-radius:8px;padding:5px 8px 5px 12px;cursor:pointer;transition:all .2s;user-select:none;}
  .prod-grp-btn:hover{border-color:rgba(0,0,0,.2);background:white;}
  .prod-grp-btn.active-g{border-color:var(--info);background:#eff6ff;box-shadow:0 0 0 2px rgba(59,130,246,.12);}
  .prod-grp-name-wrap{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
  .prod-grp-name{font-size:12px;font-weight:700;line-height:1.2;color:var(--text);}
  .prod-grp-dots{display:flex;gap:3px;align-items:center;}
  .prod-grp-del{width:18px;height:18px;border-radius:4px;border:none;background:rgba(239,68,68,.08);color:#ef4444;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0;line-height:1;}
  .prod-grp-del:hover{background:rgba(239,68,68,.25);}
  .prod-grp-section{margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .prod-grp-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .prod-grp-add-form{margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
  .prod-grp-add-form input[type=text]{border:1px solid var(--border);border-radius:7px;color:var(--text);padding:5px 10px;font-size:12px;font-family:inherit;outline:none;width:160px;transition:border-color .15s;}
  .prod-grp-add-form input[type=text]:focus{border-color:var(--info);}
  .ps-two-row{display:flex;flex-direction:column;gap:0;}
  .ps-row{display:flex;align-items:center;gap:6px;}
  .ps-row-inner{display:flex;gap:8px;flex:1;min-width:0;overflow-x:auto;scroll-behavior:smooth;}
  .ps-row-inner::-webkit-scrollbar{display:none;}
  .ps-sect-lbl{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;min-width:26px;}
  .ps-divider-h{height:1px;background:var(--border);margin:9px 0;}
  .ps-nav-btn{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:#f8fafc;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;line-height:1;padding:0;}
  .ps-nav-btn:hover:not(:disabled){border-color:var(--info);color:var(--info);}
  .ps-nav-btn:disabled{opacity:.2;cursor:not-allowed;}
  .ps-item{display:flex;align-items:center;gap:7px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:6px 12px;transition:all .2s;cursor:pointer;user-select:none;flex-shrink:0;}
  .ps-item:hover{border-color:rgba(0,0,0,.15);background:white;}
  .ps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:2px solid rgba(0,0,0,.08);}
  .ps-name{font-size:13px;font-weight:700;white-space:nowrap;}
  .ps-tog{width:30px;height:17px;border-radius:9px;border:none;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
  .ps-tog.on{background:var(--info);}
  .ps-tog.off{background:#cbd5e1;}
  .ps-tog::after{content:'';position:absolute;top:2.5px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .2s;}
  .ps-tog.on::after{left:16px;}
  .ps-tog.off::after{left:2px;}
  /* 다운로드 진행 */
  .dl-prog-wrap{margin-bottom:12px;background:white;border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
  .dl-prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .dl-prog-fill{height:100%;background:linear-gradient(90deg,var(--info),#7c3aed);border-radius:2px;width:0%;transition:width .3s;}
  .dl-prog-lbl{font-size:11px;color:var(--text2);text-align:center;margin-top:6px;}
  /* 접수 모달 탭 */
  .submit-tab{padding:9px 22px;font-size:13px;font-weight:700;border:none;border-bottom:3px solid transparent;background:none;cursor:pointer;color:var(--text2);font-family:inherit;margin-bottom:-2px;transition:color .15s,border-color .15s;}
  .submit-tab.active{color:var(--info);border-bottom-color:var(--info);}
  .submit-tab:disabled{opacity:.3;cursor:not-allowed;}
  /* 상품 설정 모달 */
  .prod-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9500;display:none;align-items:center;justify-content:center;}
  .prod-modal-bg.show{display:flex;}
  .prod-modal{background:white;border-radius:14px;width:460px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.2);}
  .prod-modal-head{padding:13px 18px;background:#f8fafc;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
  .prod-modal-head h3{font-size:13px;font-weight:700;flex:1;}
  .prod-modal-close{width:24px;height:24px;border:none;background:#e2e8f0;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;}
  .prod-modal-close:hover{background:rgba(239,68,68,.15);color:#ef4444;}
  .prod-modal-body{padding:18px;display:flex;flex-direction:column;gap:14px;}
  .pmf label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
  .pmf-note{font-size:11px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;}
  .ratio-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .ratio-item{background:#f8fafc;border:1px solid var(--border);border-radius:7px;padding:6px 10px;display:flex;align-items:center;gap:6px;}
  .ri-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .ri-name{font-size:11px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ratio-item input[type=number]{width:52px;border:1px solid var(--border);border-radius:5px;padding:3px 6px;font-size:12px;font-family:monospace;outline:none;text-align:center;background:white;}
  .ratio-item input[type=number]:focus{border-color:var(--info);}
  .ratio-note{font-size:11px;color:var(--muted);text-align:right;margin-top:4px;font-family:monospace;}
  .ratio-note.ok{color:#10b981;}
  .ratio-note.ng{color:#ef4444;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  .prod-modal-footer{padding:12px 18px;background:#f8fafc;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
  .pm-btn-cancel{padding:8px 16px;border:1px solid var(--border);border-radius:7px;background:white;cursor:pointer;font-size:13px;font-family:inherit;}
  .pm-btn-cancel:hover{border-color:var(--text2);}
  .pm-btn-save{padding:8px 16px;border:none;border-radius:7px;background:var(--info);color:white;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;}
  .pm-btn-save:hover{background:#2563eb;}
  .pm-btn-del{padding:6px 12px;border:1px solid rgba(239,68,68,.25);border-radius:7px;background:rgba(239,68,68,.08);color:#ef4444;cursor:pointer;font-size:11px;font-family:inherit;font-weight:700;display:inline-flex;align-items:center;gap:5px;margin-right:auto;}
  .pm-btn-del:hover{background:rgba(239,68,68,.18);}
</style>

<div class="stat-bar" id="receipt-stat-bar" style="grid-template-columns:repeat(3,1fr)">
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(245,158,11,.1)">⏳</div>
    <div><div class="sb-label">대기</div><div class="sb-val" id="stat-pending" style="color:var(--warn)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(59,130,246,.1)">📋</div>
    <div><div class="sb-label">접수</div><div class="sb-val" id="stat-accepted" style="color:#1d4ed8">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(16,185,129,.1)">✅</div>
    <div><div class="sb-label">승인</div><div class="sb-val" id="stat-active" style="color:var(--accent)">-</div></div>
  </div>
</div>

<!-- 상품 유형 설정 패널 -->
<div class="prod-panel collapsed" id="prod-panel">
  <div class="prod-ph" onclick="toggleProdPanel(event)">
    <span>📦</span>
    <span class="prod-ph-title">상품 유형 설정</span>
    <span class="prod-toggle-icon">&#9660;</span>
    <span class="prod-ph-desc" style="flex:1;text-align:center;font-size:11px;color:var(--muted);">상품을 클릭하면 상품명·버전·고정 비율 설정 가능</span>
    <div class="prod-ph-actions" onclick="event.stopPropagation()" style="display:flex;gap:6px;">
      <button class="action-btn" style="background:var(--info);color:#fff;font-size:11px;padding:4px 10px;" onclick="showAddProdModal()">＋ 상품 추가</button>
      <button class="action-btn" style="background:#475569;color:#fff;font-size:11px;padding:4px 10px;" onclick="showAddProdGroup()">＋ 그룹 추가</button>
    </div>
  </div>
  <div class="prod-pb">
    <div class="prod-grp-section">
      <div class="prod-grp-label">그룹 프리셋 — 클릭하면 설정이 자동 적용됩니다</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
        <div id="prodGroupWrap" style="display:contents;"></div>
      </div>
      <div id="addProdGroupForm" class="prod-grp-add-form" style="display:none;">
        <input type="text" id="prodGroupNameInput" placeholder="그룹 이름 (예: 블랙+올리브)" maxlength="24"
          onkeydown="if(event.key==='Enter')saveProdGroup();if(event.key==='Escape')hideAddProdGroup();" />
        <button class="btn-save" style="font-size:11px;padding:4px 12px;" onclick="saveProdGroup()">✔ 저장</button>
        <button class="btn-cancel" style="font-size:11px;padding:4px 10px;" onclick="hideAddProdGroup()">취소</button>
      </div>
    </div>
    <div class="ps-two-row">
      <div class="ps-row">
        <span class="ps-sect-lbl">일반</span>
        <button class="ps-nav-btn" id="psNavL" onclick="psScrollProd(-1)">&#8249;</button>
        <div class="ps-row-inner" id="psWrapNormal"></div>
        <button class="ps-nav-btn" id="psNavR" onclick="psScrollProd(1)">&#8250;</button>
      </div>
      <div class="ps-divider-h"></div>
      <div class="ps-row">
        <span class="ps-sect-lbl">고정</span>
        <div class="ps-row-inner" id="psWrapFixed" style="margin-left:28px;"></div>
        <button class="action-btn" id="dl-main-btn" style="background:#2563eb;color:#fff;padding:7px 16px;font-size:12px;flex-shrink:0;" onclick="downloadExcel()">📥 전체 시트 분류</button>
        <button class="action-btn" id="dl-submit-btn" style="background:#EA580C;color:#fff;padding:7px 16px;font-size:12px;flex-shrink:0;" onclick="submitDirect()">접수</button>
      </div>
    </div>
  </div>
</div>

<!-- 다운로드 진행 표시 -->
<div class="dl-prog-wrap" id="dl-prog-wrap" style="display:none;">
  <div class="dl-prog-bar"><div class="dl-prog-fill" id="dl-prog-fill"></div></div>
  <div class="dl-prog-lbl" id="dl-prog-lbl"></div>
</div>

<div style="display:flex;justify-content:flex-end;align-items:center;margin-bottom:16px;gap:8px;">
  <button class="action-btn" id="dl-single-btn" style="background:#16a34a;color:#fff;padding:7px 16px;font-size:12px;" onclick="downloadExcelList()">📥 엑셀 다운로드</button>
  <button class="action-btn" id="adlog-btn" style="background:#7c3aed;color:#fff;padding:7px 16px;font-size:12px;" onclick="submitAdlog()">📤 애드로그</button>
  <!-- <button class="action-btn btn-approve" style="padding:7px 16px;font-size:12px;" onclick="bulkApprove()">선택 승인</button> -->
</div>

<div class="filter-bar">
  <select id="filter-status" onchange="renderReceipts()">
    <option value="">전체 상태</option>
    <option value="pending">대기</option>
    <option value="accepted">접수</option>
    <option value="active">승인</option>
  </select>
  <select id="filter-slot-type" onchange="renderReceipts()" disabled>
    <option value="">⏳ 등급 로딩 중...</option>
  </select>
  <div id="date-filter-wrap" style="position:relative;display:flex;align-items:center;">
    <button id="date-pick-btn" onclick="document.getElementById('filter-date-from').showPicker?document.getElementById('filter-date-from').showPicker():document.getElementById('filter-date-from').focus()" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);white-space:nowrap;">
      📅 <span id="date-label">접수일 선택</span>
    </button>
    <input type="date" id="filter-date-from" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" onchange="onDateChange()">
    <button id="date-clear-btn" onclick="clearDateFilter()" style="display:none;margin-left:4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;" title="날짜 초기화">✕</button>
  </div>

    <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderReceipts()">검색</button>

</div>

<script>
// 상품 유형 설정 패널 접기/펼치기
window.toggleProdPanel = function(e) {
  const panel = document.getElementById('prod-panel');
  panel.classList.toggle('collapsed');
};

(function(){
  let currentPage  = 1;
  const PER_PAGE   = 20;
  let allSlots     = [];
  let filteredAll  = [];
  let _slotsLoaded = false;
  let _detailOpen  = false;
  const userPriceMap = new Map(); // userId -> 단가(원/개), 유입플 접수 모달 금액 표시용

  const stMap = {
    pending:  '<span class="status-badge s-pending">대기</span>',
    accepted: '<span class="status-badge s-accepted">접수</span>',
    active:   '<span class="status-badge s-active">승인</span>',
    expired:  '<span class="status-badge s-expired">종료</span>',
  };

  // ── 비즈핏 직접 접수 ─────────────────────────────────────────
  const BIZFIT_PROXY  = 'https://bizfit-direct-proxy-938928195180.asia-northeast3.run.app';
  const BIZFIT_DOMAIN = 'http://higherad.co.kr';
  const BIZFIT_TAB    = '99'; // 전체 — 대행사별 단독/랜덤/통합 구분 정보가 없어 기본값 사용
  const BIZFIT_CHARGE_FB = 'https://higherad-b9d62-default-rtdb.asia-southeast1.firebasedatabase.app/ha/bizfit_charge';

  // ── 등급 배지 ────────────────────────────────────────────────
  const GRADE_CACHE = new Map();
  const GRADE_FB    = 'https://higherad-b9d62-default-rtdb.asia-southeast1.firebasedatabase.app/ha/grades';

  // ── 상세 팝업 잠금 (동시 편집 방지) ─────────────────────────
  const LOCK_FB        = 'https://higherad-b9d62-default-rtdb.asia-southeast1.firebasedatabase.app/ha/detail_locks';
  const LOCK_TTL_MS    = 10 * 60 * 1000; // 10분 초과 잠금은 자동 무효
  const LOCK_CHECK_CACHE = new Map();    // key → { conflict, by, ts }
  const LOCK_CACHE_TTL   = 10_000;      // 10초 캐시

  // grades Firebase 데이터 파싱 (구: 배열/객체of객체, 신: 단일 객체)
  function parseGradeEntries(data) {
    if (!data) return [];
    if (typeof data.gradeLabel === 'string') return [data];
    return Array.isArray(data) ? data : Object.values(data);
  }

  // 잠금 획득 — Firebase 트랜잭션으로 충돌(check-then-write race) 없이 원자적으로 처리
  async function acquireDetailLock(key) {
    const cu        = window.HA?.getCurrentUser?.() || {};
    const staffId   = cu.username || cu.id || 'unknown';
    const staffName = cu.name || staffId;
    const lockData  = { staffId, staffName, lockedAt: new Date().toISOString() };
    const { getDatabase, ref, runTransaction, onDisconnect } = await import(
      'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js'
    );
    const lockRef = ref(getDatabase(), `ha/detail_locks/${key}`);
    let conflictBy = null;
    const result = await runTransaction(lockRef, current => {
      if (current && current.staffId !== staffId) {
        const age = Date.now() - new Date(current.lockedAt).getTime();
        if (age < LOCK_TTL_MS) {
          conflictBy = current.staffName || current.staffId;
          return;
        }
      }
      return lockData;
    }, { applyLocally: false });
    if (!result.committed) {
      const by = conflictBy || 'other staff';
      LOCK_CHECK_CACHE.set(key, { conflict: true, by, ts: Date.now() });
      return { acquired: false, by };
    }
    LOCK_CHECK_CACHE.delete(key);
    onDisconnect(lockRef).remove();
    return { acquired: true };
  }

  async function releaseDetailLock(key) {
    LOCK_CHECK_CACHE.delete(key);
    try {
      await fetch(`${LOCK_FB}/${key}.json`, { method: 'DELETE' });
      const { getDatabase, ref, onDisconnect } = await import(
        'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js'
      );
      onDisconnect(ref(getDatabase(), `ha/detail_locks/${key}`)).cancel();
    } catch (_) {}
  }

  function showLockNotice(byName) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-box" style="width:340px;text-align:center;padding:36px 28px;">
        <div style="font-size:32px;margin-bottom:14px;">🔒</div>
        <div class="modal-title" style="margin-bottom:8px;">편집 중</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:24px;">
          <strong style="color:var(--text)">${byName}</strong> 님이 현재 이 항목을<br>편집하고 있습니다.<br>
          <span style="font-size:12px;color:var(--muted)">창을 닫으면 다시 열 수 있습니다.</span>
        </div>
        <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">확인</button>
      </div>`;
    document.body.appendChild(overlay);
  }

  async function fetchGrade(mid) {
    if (GRADE_CACHE.has(mid)) return GRADE_CACHE.get(mid);
    try {
      const res  = await fetch(`${GRADE_FB}/${mid}.json`);
      const data = res.ok ? await res.json() : null;
      GRADE_CACHE.set(mid, data);
      return data;
    } catch {
      GRADE_CACHE.set(mid, null);
      return null;
    }
  }

  // 등급 배지(회색 채움)와 유입플 미션 배지(아웃라인)를 함께 렌더링 — 예: 블랙 올리브 9번
  function _renderGradeBadgesHtml(data) {
    if (!data) return '-';
    const entries = parseGradeEntries(data);
    const gradeLabels = [...new Map(entries.map(g => [g.gradeLabel, g])).values()]
      .flatMap(g => (g.gradeLabel || '').split(',').map(l => l.trim()).filter(l => l));
    const missions = [...new Set(entries.flatMap(g => (g.mission || '').split(',').map(l => l.trim()).filter(l => l)))];
    if (!gradeLabels.length && !missions.length) return '-';
    const gradeHtml   = gradeLabels.map(l => `<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;background:#f1f5f9;color:#334155;border:1px solid #e2e8f0">${l}</span>`).join('');
    const missionHtml = missions.map(l => `<span style="display:inline-block;font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;background:transparent;color:#94a3b8;border:1.5px solid #94a3b8">${l}</span>`).join('');
    return gradeHtml + missionHtml;
  }

  async function injectGradeBadges(slots) {
    await Promise.all(slots.map(async s => {
      if (!['pending','accepted','active'].includes(s.status) || !s.mid) return;
      const el = document.getElementById(`grade-${s._key}`);
      if (!el) return;
      const data = await fetchGrade(s.mid);
      const html = _renderGradeBadgesHtml(data);
      if (html === '-') { el.textContent = '-'; return; }
      el.outerHTML = `<div id="grade-${s._key}" style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center">${html}</div>`;
    }));
  }

  function buildGradeFilter(slots) {
    const sel = document.getElementById('filter-slot-type');
    if (!sel) return;
    const currentVal = sel.value;
    const labels = new Set();
    slots.forEach(s => {
      if (!s.mid) return;
      const cached = GRADE_CACHE.get(s.mid);
      if (!cached) return;
      parseGradeEntries(cached).forEach(g => {
        if (g.gradeLabel) g.gradeLabel.split(',').map(l => l.trim()).filter(l => l).forEach(l => labels.add(l));
      });
    });
    sel.innerHTML = '<option value="">전체 등급</option>';
    [...labels].sort().forEach(label => {
      const opt = document.createElement('option');
      opt.value = label;
      opt.textContent = label;
      sel.appendChild(opt);
    });
    sel.disabled = false;
    if (labels.has(currentVal)) sel.value = currentVal;
  }

  function getFiltered() {
    const status   = document.getElementById('filter-status').value;
    const gradeFilter = document.getElementById('filter-slot-type').value;
    const kw          = (document.getElementById('receipt-search').value||'').trim().toLowerCase();
    const dateFrom    = document.getElementById('filter-date-from').value;
    return allSlots.filter(s => {
      if (s.status === 'deleted') return false;
      if (status && s.status !== status) return false;
      if (gradeFilter) {
        if (!['pending','accepted','active'].includes(s.status)) return false;
        const cached = GRADE_CACHE.get(s.mid);
        if (!cached) return false;
        const allLabels = parseGradeEntries(cached).flatMap(g => g.gradeLabel ? g.gradeLabel.split(',').map(l => l.trim()).filter(l => l) : []);
        if (!allLabels.includes(gradeFilter)) return false;
      }
      if (kw && ![s.agencyId,s.userId,s.storeName,s.mid].some(v=>(v||'').toLowerCase().includes(kw))) return false;
      const slotDate = s.createdAt ? (() => { const d = new Date(s.createdAt); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })() : '';
      if (dateFrom && slotDate !== dateFrom) return false;
      if (HA.getCurrentUser()?.role === 'guest') {
        if (!s.createdAt || new Date(s.createdAt).getMonth() + 1 !== 6) return false;
      }
      return true;
    });
  }

  window.resetReceipts = function() {
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-slot-type').value = '';
    document.getElementById('filter-date-from').value = '';
    document.getElementById('date-label').textContent = '접수일 선택';
    document.getElementById('date-pick-btn').style.color = 'var(--text2)';
    document.getElementById('date-clear-btn').style.display = 'none';
    document.getElementById('receipt-search').value = '';
    renderReceipts();
  };
  window.clearDateFilter = function() {
    document.getElementById('filter-date-from').value = '';
    document.getElementById('date-label').textContent = '접수일 선택';
    document.getElementById('date-pick-btn').style.color = 'var(--text2)';
    document.getElementById('date-clear-btn').style.display = 'none';
    renderReceipts();
  };
  window.onDateChange = function() {
    const val = document.getElementById('filter-date-from').value;
    if (val) {
      document.getElementById('date-label').textContent = val;
      document.getElementById('date-pick-btn').style.color = 'var(--text)';
      document.getElementById('date-clear-btn').style.display = 'inline';
    }
    renderReceipts();
  };

  window.renderReceipts = async function(resetPage = true, forceReload = false) {
    if (resetPage) currentPage = 1;

    if (HA.getCurrentUser()?.role === 'guest') {
      const dateWrap = document.getElementById('date-filter-wrap');
      if (dateWrap) dateWrap.style.display = 'none';
      document.getElementById('receipt-page')?.classList.add('guest-mode');
    }

    if (!_slotsLoaded || forceReload) {
      document.getElementById('receipt-body').innerHTML =
        '<tr><td colspan="15"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>';
      allSlots = await HA.getSlots();
      _slotsLoaded = true;

      // ── 종료일 지난 active 캠페인 자동 종료 처리 ──────────────
      const todayStr = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
      const toExpire = allSlots.filter(s =>
        s.status === 'active' && s.endDate && s.endDate < todayStr
      );
      if (toExpire.length) {
        await Promise.all(toExpire.map(s => HA.updateSlot(s._key, { status: 'expired' })));
        toExpire.forEach(s => { s.status = 'expired'; });
      }
    }
    if (!document.getElementById('receipt-page')) return; // 대기 중 다른 메뉴로 이동한 경우 렌더 중단

    const all      = getFiltered();
    filteredAll    = all;
    const pending  = allSlots.filter(s => s.status === 'pending').length;
    const accepted = allSlots.filter(s => s.status === 'accepted').length;
    const active   = allSlots.filter(s => s.status === 'active').length;
    document.getElementById('stat-pending').textContent  = pending.toLocaleString();
    document.getElementById('stat-accepted').textContent = accepted.toLocaleString();
    document.getElementById('stat-active').textContent   = active.toLocaleString();

    const start = (currentPage-1)*PER_PAGE;
    const page  = all.slice(start, start+PER_PAGE);
    const body  = document.getElementById('receipt-body');

    if (!page.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="15">데이터가 없습니다.</td></tr>';
    } else {
      body.innerHTML = page.map((s,i) => `
        <tr>
          <td><input type="checkbox" class="row-check" data-key="${s._key}"></td>
          <td style="color:var(--text2)">${all.length - start - i}</td>
          <td style="color:var(--text2)">${
            (() => {
              if (!s.createdAt) return '-';
              const d = new Date(s.createdAt);
              const yyyy = d.getFullYear();
              const mo = String(d.getMonth()+1).padStart(2,'0');
              const dd = String(d.getDate()).padStart(2,'0');
              return `${yyyy}-${mo}-${dd}`;
            })()
          }</td>
          <td style="font-weight:600">${s.agencyId||'-'}</td>
          <td>${s.userId||'-'}</td>
          <td>${['pending','accepted','active'].includes(s.status)
            ? `<span id="grade-${s._key}" style="color:#94a3b8;font-size:11px">···</span>`
            : `<span style="color:#cbd5e1">-</span>`
          }</td>
          <td>${s.url ? `<a href="${s.url}" target="_blank" style="color:var(--accent);font-weight:500;text-decoration:none;">${s.storeName||'-'}</a>` : (s.storeName||'-')}</td>
          <td style="color:var(--text2);font-size:11px">${s.mid||'-'}</td>
          <td style="color:var(--text2)">${s.rankKeyword ? `<a href="https://m.search.naver.com/search.naver?where=m&query=${encodeURIComponent(s.rankKeyword)}" target="_blank" style="color:var(--text2);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">${s.rankKeyword}</a>` : '-'}</td>
          <td style="color:var(--text2)">${s.days||'-'}</td>
          <td style="color:var(--text2)">${s.startDate||'-'}</td>
          <td style="color:var(--text2)">${s.endDate||'-'}</td>
          <td style="color:var(--text2)">${s.dailyTarget ? s.dailyTarget.toLocaleString() : '-'}</td>
          <td>${stMap[s.status]||s.status}</td>
          <td>
            <div style="display:flex;gap:5px;justify-content:center;">
              <button class="action-btn" style="background:#f1f5f9;color:var(--text2);" onclick="viewDetail('${s._key}')">상세</button>
              ${s.status==='pending' ? `
                <button class="action-btn" style="background:rgba(59,130,246,.15);color:#1d4ed8;" onclick="acceptOne('${s._key}')">접수</button>
              ` : ''}
              ${s.status==='accepted' ? `
                <button class="action-btn" style="background:rgba(245,158,11,.15);color:#b45309;" onclick="changeStatusTo('${s._key}','pending')">대기</button>
                <button class="action-btn btn-approve" onclick="approveOne('${s._key}')">승인</button>
              ` : ''}
              ${s.status==='active' ? `
                <button class="action-btn" style="background:rgba(245,158,11,.15);color:#b45309;" onclick="changeStatusTo('${s._key}','pending')">대기</button>
                <button class="action-btn" style="background:rgba(59,130,246,.15);color:#1d4ed8;" onclick="acceptOne('${s._key}')">접수</button>
              ` : ''}
            </div>
          </td>
        </tr>`).join('');
    }
    renderPagination(all.length);
    const chkAll = document.getElementById('check-all');
    if (chkAll) { chkAll.checked = false; chkAll.indeterminate = false; }
    if (window.lucide) lucide.createIcons();
    injectGradeBadges(page);

    // 등급 백그라운드 로드 — 미캐시 MID만 로드, 완료 시 필터 갱신
    const uniqueMids    = [...new Set(allSlots.filter(s => ['pending','accepted','active'].includes(s.status) && s.mid).map(s => s.mid))];
    const uncachedMids  = uniqueMids.filter(mid => !GRADE_CACHE.has(mid));
    if (uncachedMids.length) {
      Promise.all(uncachedMids.map(mid => fetchGrade(mid))).then(() => {
        if (!document.getElementById('receipt-page')) return; // 대기 중 다른 메뉴로 이동한 경우 렌더 중단
        buildGradeFilter(allSlots);
        if (document.getElementById('filter-slot-type').value) renderReceipts(false);
      });
    } else {
      buildGradeFilter(allSlots);
    }
  };

  function renderPagination(total) {
    const pages = Math.ceil(total/PER_PAGE) || 1;
    const pg    = document.getElementById('receipt-pagination');
    let html = `<button class="pg-btn" onclick="goPage(1)">&laquo;</button>
                <button class="pg-btn" onclick="goPage(${Math.max(1,currentPage-1)})">&lsaquo;</button>`;
    const s=Math.max(1,currentPage-2),e=Math.min(pages,currentPage+2);

    if(e<pages){if(e<pages-1)html+=`<span class="pg-btn" style="pointer-events:none">…</span>`;html+=`<button class="pg-btn" onclick="goPage(${pages})">${pages}</button>`;}

  // ── Firebase에서 MID로 현재 키워드 조회 (오늘 값 단순 덮어쓰기) ──
  async function fetchSheetKeywordByMid(mid) {
    try {
      const safeMid = mid.replace(/[.#$[\]/]/g, '_');
      const { getDatabase, ref, get } = await import(
        'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js'
      );
      const snap = await get(ref(getDatabase(), `ha/grades/${safeMid}`));
      if (!snap.exists()) return [];
      const data   = snap.val();
      const findKw = parseGradeEntries(data).map(g => g.findKw).find(kw => kw && kw.trim());
      return findKw ? [findKw] : [];
    } catch (e) {
      console.error('Firebase 키워드 조회 오류:', e);
      return null; // null = 오류, [] = 결과없음
    }
  }

  // ── Firebase에서 MID로 현재 유입플 작업키워드 조회 (grade_sync.js의 yupflKw) ──
  async function fetchYoupflKeywordByMid(mid) {
    try {

        'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js'
      );
      const snap = await get(ref(getDatabase(), `ha/grades/${safeMid}`));
      if (!snap.exists()) return [];
      const data     = snap.val();
      const yupflKw  = parseGradeEntries(data).map(g => g.yupflKw).find(kw => kw && kw.trim());
      return yupflKw ? [yupflKw] : [];
    } catch (e) {
      console.error('Firebase 유입플 키워드 조회 오류:', e);
      return null; // null = 오류, [] = 결과없음
    }
  }

  window.saveEdit = async function(key) {
    const updates = {

      startDate:     document.getElementById('e-startDate').value,
      endDate:       document.getElementById('e-endDate').value,

  // ── 상품 유형 설정 ────────────────────────────────────────────

  const escProd = v => String(v??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const DEFAULT_PRODS = [
    {id:'p1',     name:'블랙',  color:'#3b82f6', active:true,  ver:'ver.5.0/3.2', ratio:5, kwPct:5},
    {id:'p2',     name:'올리브', color:'#8b5cf6', active:true,  ver:'ver.5.0/3.2', ratio:5, kwPct:5},
    {id:'p3',     name:'X3',    color:'#10b981', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
    {id:'p4',     name:'X4',    color:'#f97316', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
    {id:'p5',     name:'X5',    color:'#64748b', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
    {id:'p6',     name:'X6',    color:'#84cc16', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
    {id:'p7',     name:'X7',    color:'#ec4899', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
    {id:'p8',     name:'X8',    color:'#eab308', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0},
    {id:'charlie',name:'찰리',  color:'#f43f5e', active:false, ver:'ver.4.1/3.2', ratio:0, kwPct:0, daysMultiplied:true, autoBalance:false},
    {id:'yupfl',  name:'유입플', color:'#f59e0b', active:false, ver:'ver.5.0/3.2', ratio:0, kwPct:0, fixedAlloc:true, kwLimit:5, fixedPct:30, autoBalance:false},
  ];
  let prods = DEFAULT_PRODS.map(p => ({...p}));
  const FIXED_PROD_IDS = new Set(['charlie', 'yupfl']);
  const ap = () => prods.filter(p => p.active);

  let prodGroups = [];
  let activeProdGroupId = null;
  let defaultProdsState = null;
  let _prodModalId = null;

  // 기본 상품(p1~yupfl)이 사용하는 색상은 제외하고, 신규 추가 상품 전용 풀만 사용
  const PROD_COLORS = ['#06b6d4','#a78bfa','#34d399','#fb923c','#60a5fa','#f472b6',
    '#facc15','#ef4444','#14b8a6','#d946ef','#78716c'];
  let _apColor = '#06b6d4';

  function getProdSettingsPath() {
    const cu = window.HA?.getCurrentUser?.();
    return cu?.id ? `ha/prodSettings/${cu.id}` : null;
  }
  async function loadProdSettings() {
    const path = getProdSettingsPath();
    if (!path) return;
    const staticFlags = new Map(prods.map(p => [p.id, {daysMultiplied:p.daysMultiplied,fixedAlloc:p.fixedAlloc,autoBalance:p.autoBalance}]));
    const fixedDefaults = new Map(prods.map(p => [p.id, {kwLimit:p.kwLimit,fixedPct:p.fixedPct}]));
    const colorMap = new Map(prods.map(p => [p.id, p.color]));
    try {
      const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
      const db = getDatabase();
      const [prodsSnap, groupsSnap] = await Promise.all([
        get(ref(db, path + '/prods')),
        get(ref(db, path + '/groups'))
      ]);
      if (prodsSnap.exists()) {
        const loaded = prodsSnap.val();
        const arr = Array.isArray(loaded) ? loaded : Object.values(loaded);
        prods = arr;
        prods.forEach(p => {
          const f = staticFlags.get(p.id); if(f) Object.assign(p, f);
          const fd = fixedDefaults.get(p.id);
          if (fd) {
            if (p.kwLimit === undefined)  p.kwLimit  = fd.kwLimit;
            if (p.fixedPct === undefined) p.fixedPct = fd.fixedPct;
          }
          if (colorMap.has(p.id)) p.color = colorMap.get(p.id);
        });
      }
      if (groupsSnap.exists()) {
        const loaded = groupsSnap.val();
        prodGroups = Array.isArray(loaded) ? loaded : Object.values(loaded);
      }
    } catch(e) { console.error('loadProdSettings 오류:', e); }
  }
  function saveProdSettings() {
    const path = getProdSettingsPath();
    if (!path) return;
    const snapGroups = JSON.parse(JSON.stringify(prodGroups));
    const snapProds  = JSON.parse(JSON.stringify(prods));
    import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js').then(({ getDatabase, ref, set, remove }) => {
      const db = getDatabase();
      set(ref(db, path + '/prods'), snapProds).catch(()=>{});
      if (snapGroups.length > 0) set(ref(db, path + '/groups'), snapGroups).catch(()=>{});
      else remove(ref(db, path + '/groups')).catch(()=>{});
    }).catch(()=>{});
  }
  const prodSnapshot = () => prods.map(p => ({id:p.id,active:p.active,ratio:p.ratio,name:p.name,ver:p.ver,kwPct:p.kwPct}));
  function saveProdDefault() { defaultProdsState = prodSnapshot(); }
  function deactivateProdGroup() {
    activeProdGroupId = null;
    if (defaultProdsState) {
      defaultProdsState.forEach(s => {
        const p = prods.find(x => x.id === s.id); if(!p) return;
        Object.assign(p, s);
      });
    }
    renderPS();
  }

  function renderProdGroups() {
    const wrap = document.getElementById('prodGroupWrap');
    if (!wrap) return;
    if (!prodGroups.length) {
      wrap.innerHTML = `<span style="font-size:11px;color:var(--muted);">저장된 그룹 없음</span>`;
      return;
    }
    wrap.innerHTML = prodGroups.map(g => {
      const isActive = g.id === activeProdGroupId;
      const dots = g.state.map(s => {
        const p = prods.find(x => x.id === s.id);
        const col = p ? p.color : '#999';
        return `<span style="width:7px;height:7px;border-radius:50%;background:${col};opacity:${s.active?1:.2};display:inline-block;flex-shrink:0;"></span>`;
      }).join('');
      return `<div class="prod-grp-btn${isActive?' active-g':''}" data-gid="${g.id}"
        onclick="applyProdGroup('${g.id}')"
        ondblclick="event.stopPropagation();startRenameProdGroup('${g.id}')"
        title="${g.state.filter(s=>s.active).map(s=>prods.find(x=>x.id===s.id)?.name||s.id).join(', ')}">
        <div class="prod-grp-name-wrap">
          <span class="prod-grp-name">${escProd(g.name)}</span>
          <span class="prod-grp-dots">${dots}</span>
        </div>
        <button class="prod-grp-del" onclick="event.stopPropagation();deleteProdGroup('${g.id}')">✕</button>
      </div>`;
    }).join('');
  }

  window.showAddProdGroup = function() {
    document.getElementById('addProdGroupForm').style.display = 'flex';
    document.getElementById('prodGroupNameInput').focus();
  };
  window.hideAddProdGroup = function() {
    document.getElementById('addProdGroupForm').style.display = 'none';
    document.getElementById('prodGroupNameInput').value = '';
  };
  window.saveProdGroup = function() {
    const name = document.getElementById('prodGroupNameInput').value.trim();
    if (!name) { document.getElementById('prodGroupNameInput').focus(); return; }
    prodGroups.push({ id:'g'+Date.now(), name, state: prodSnapshot() });
    saveProdSettings(); window.hideAddProdGroup(); renderProdGroups();
  };
  window.deleteProdGroup = function(id) {
    if (activeProdGroupId === id) activeProdGroupId = null;
    prodGroups = prodGroups.filter(g => g.id !== id);
    saveProdSettings(); renderProdGroups();
  };
  window.applyProdGroup = function(id) {
    if (id === activeProdGroupId) { deactivateProdGroup(); return; }
    const g = prodGroups.find(x => x.id === id); if(!g) return;
    if (!activeProdGroupId) saveProdDefault();
    g.state.forEach(s => {
      const p = prods.find(x => x.id === s.id); if(!p) return;
      p.active = s.active;
      if(s.ratio  !== undefined) p.ratio  = s.ratio;
      if(s.name)                 p.name   = s.name;
      if(s.ver    !== undefined) p.ver    = s.ver;
      if(s.kwPct  !== undefined) p.kwPct  = s.kwPct;
    });
    activeProdGroupId = id; renderPS();
  };
  window.startRenameProdGroup = function(id) {
    const g = prodGroups.find(x => x.id === id); if(!g) return;
    const el = document.querySelector(`.prod-grp-btn[data-gid="${id}"] .prod-grp-name`);
    if(!el) return;
    const inp = document.createElement('input');
    inp.type = 'text'; inp.value = g.name; inp.maxLength = 24;
    inp.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--info);color:var(--text);font-size:12px;font-weight:700;font-family:inherit;outline:none;width:80px;padding:0;';
    let committed = false;
    const commit = () => { if(committed) return; committed = true; const v = inp.value.trim(); if(v) g.name = v; saveProdSettings(); renderProdGroups(); };
    inp.onblur = commit;
    inp.onkeydown = e => { if(e.key==='Enter'){inp.blur();} if(e.key==='Escape'){committed=true;renderProdGroups();} e.stopPropagation(); };
    el.replaceWith(inp); inp.focus(); inp.select();
  };
  function updateActiveProdGroup() {
    if (!activeProdGroupId) return;
    const g = prodGroups.find(x => x.id === activeProdGroupId); if(!g) return;
    g.state = prodSnapshot();
    saveProdSettings(); renderProdGroups();
  }
  function nextProdColor() {
    const usedCustom = new Set(prods.filter(p => p.id.startsWith('u')).map(p => p.color));
    return PROD_COLORS.find(c => !usedCustom.has(c)) || PROD_COLORS[prods.filter(p => p.id.startsWith('u')).length % PROD_COLORS.length];
  }

  window.showAddProdModal = function() {
    _apColor = nextProdColor();
    document.getElementById('ap-dot').style.background = _apColor;
    document.getElementById('ap-name').value = '';
    document.getElementById('ap-ver').value  = '';
    document.getElementById('add-prod-modal-bg').style.display = 'flex';
    setTimeout(() => document.getElementById('ap-name').focus(), 50);
  };
  window.closeAddProdModal = function() {
    document.getElementById('add-prod-modal-bg').style.display = 'none';
  };
  window.saveNewProd = function() {
    const name = document.getElementById('ap-name').value.trim();
    if(!name){ document.getElementById('ap-name').focus(); return; }
    const ver = document.getElementById('ap-ver').value.trim();
    prods.push({id:'u'+Date.now(),name,color:_apColor,active:false,ver:ver||'ver.5.0/3.2',ratio:0,kwPct:0});
    window.closeAddProdModal();
    if(activeProdGroupId) updateActiveProdGroup(); else { saveProdDefault(); saveProdSettings(); }
    renderPS();
  };

  function prodDisplayName(p) {
    return (p.id === 'yupfl' && HA.getCurrentUser()?.role === 'guest') ? '테스트' : p.name;
  }

  function renderPS() {
    renderProdGroups();
    const prodHtml = p => `
      <div class="ps-item${p.active?' active':''}" id="psi-${p.id}" onclick="openProdModal('${p.id}')">
        <div class="ps-dot" style="background:${p.color};border-color:rgba(0,0,0,.1);"></div>
        <span class="ps-name" style="color:${p.color}">${escProd(prodDisplayName(p))}</span>
        <button class="ps-tog ${p.active?'on':'off'}" onclick="event.stopPropagation();toggleProd('${p.id}')"></button>
      </div>`;
    const normalProds = [], fixedProds = [];
    for (const p of prods) (FIXED_PROD_IDS.has(p.id) ? fixedProds : normalProds).push(p);
    document.getElementById('psWrapNormal').innerHTML = normalProds.map(prodHtml).join('');
    document.getElementById('psWrapFixed').innerHTML  = fixedProds.map(prodHtml).join('');
    updatePSNavArrows();
  }

  window.psScrollProd      = function(dir) { const el = document.getElementById('psWrapNormal'); if(el){el.scrollLeft+=dir*220;setTimeout(updatePSNavArrows,180);} };
  function updatePSNavArrows() {
    const el = document.getElementById('psWrapNormal');
    if(el){ const l=document.getElementById('psNavL'),r=document.getElementById('psNavR'); if(l) l.disabled=el.scrollLeft<=0; if(r) r.disabled=Math.ceil(el.scrollLeft+el.clientWidth)>=el.scrollWidth; }
  }

  window.toggleProd = function(id) {
    const p = prods.find(x => x.id === id); if (!p) return;
    p.active = !p.active;
    rebalanceProdActive('ratio'); rebalanceProdActive('kwPct');
    if(activeProdGroupId) updateActiveProdGroup(); else { saveProdDefault(); saveProdSettings(); }
    renderPS();
  };
  function rebalanceProdActive(field) {
    const active = ap().filter(p => p.autoBalance !== false);
    const n = active.length;
    if(!n){ prods.forEach(p => { p[field]=0; }); return; }
    const each = Math.round(10/n*10)/10;
    const last  = Math.round((10-each*(n-1))*10)/10;
    active.forEach((p,i) => { p[field] = i===n-1?last:each; });
    prods.forEach(p => { if(!p.active || p.autoBalance === false) p[field]=0; });
  }

  window.openProdModal = function(id) {
    const p = prods.find(x => x.id === id); if (!p) return;
    _prodModalId = id;
    document.getElementById('prod-modal-dot').style.background  = p.color;
    document.getElementById('prod-modal-title').textContent     = `${prodDisplayName(p)} 설정`;
    document.getElementById('pm-name').value = p.name;
    document.getElementById('pm-ver').value  = p.ver || '';
    const delBtn = document.getElementById('pm-del-btn');
    if (delBtn) delBtn.style.display = FIXED_PROD_IDS.has(id) ? 'none' : '';
    const verWrap = document.getElementById('pm-ver-wrap');
    if (verWrap) verWrap.style.display = p.fixedAlloc ? 'none' : '';

    const isFixed = !!p.fixedAlloc;
    const actives = isFixed ? [] : ap().filter(q => !q.fixedAlloc);
    const makeGrid = (items, field, prefix) => items.map(q => `
          <div class="ratio-item">
            <div class="ri-dot" style="background:${q.color}"></div>
            <span class="ri-name" style="color:${q.color}">${q.name}</span>
            <input type="number" step="any" min="0" max="10" value="${q[field] ?? 0}" id="${prefix}${q.id}" oninput="updateProdModalNotes()" />
          </div>`).join('');

    document.getElementById('pm-kw-grid').innerHTML = isFixed
      ? `<div class="ratio-item" style="grid-column:1/-1;">
          <span class="ri-name" style="color:${p.color}">검색키워드</span>
          <span style="font-size:12px;color:var(--text2);white-space:nowrap;">고정 배분</span>
          <input type="number" step="1" min="1" value="${p.kwLimit ?? 5}" id="pm-kwlimit" />
          <span style="font-size:12px;color:var(--text2);">개</span>
        </div>`
      : makeGrid(actives, 'kwPct', 'pm-kwpct-');

    document.getElementById('pm-ratio-grid').innerHTML = isFixed
      ? `<div class="ratio-item" style="grid-column:1/-1;">
          <span class="ri-name" style="color:${p.color}">일 목표</span>
          <span style="font-size:12px;color:var(--text2);white-space:nowrap;">고정 배분</span>
          <input type="number" step="1" min="0" max="100" value="${p.fixedPct ?? 30}" id="pm-fixedpct" oninput="updateProdModalNotes()" />
          <span style="font-size:12px;color:var(--text2);">%</span>
        </div>`
      : makeGrid(actives, 'ratio', 'pm-ratio-');

    updateProdModalNotes();
    document.getElementById('prod-modal-bg').classList.add('show');
  };
  window.updateProdModalNotes = function() {
    const cur = _prodModalId ? prods.find(x => x.id === _prodModalId) : null;
    if (!cur) return;
    if (cur.fixedAlloc) {
      const kwNote = document.getElementById('pm-kw-note');
      const ratNote = document.getElementById('pm-ratio-note');
      if (kwNote) kwNote.textContent = '';
      if (ratNote) {
        const pctEl = document.getElementById('pm-fixedpct');
        const pctVal = pctEl ? parseFloat(pctEl.value) : NaN;
        if (pctVal === 100) {
          ratNote.textContent = '⚠️ 100%로 설정하면 일반 상품은 배분되지 않습니다';
          ratNote.className = 'ratio-note ng';
        } else {
          ratNote.textContent = '';
          ratNote.className = 'ratio-note';
        }
      }
      return;
    }
    const actives = ap().filter(q => !q.fixedAlloc);
    const sumInputs = prefix => Math.round(actives.reduce((s,q)=>{ const el=document.getElementById(`${prefix}${q.id}`); return s+(el?parseFloat(el.value)||0:0); },0)*10)/10;
    const kwR = sumInputs('pm-kwpct-'), ratR = sumInputs('pm-ratio-');
    const kwNote = document.getElementById('pm-kw-note');
    const ratNote = document.getElementById('pm-ratio-note');
    if(kwNote)  { kwNote.textContent=`합계: ${kwR}`;   kwNote.className='ratio-note '+(kwR===10||kwR===0?'ok':'ng'); }
    if(ratNote) { ratNote.textContent=`합계: ${ratR}`; ratNote.className='ratio-note '+(ratR===10?'ok':'ng'); }
  };
  window.closeProdModal = function() {
    document.getElementById('prod-modal-bg').classList.remove('show');
    _prodModalId = null;
  };
  window.saveProdModal = function() {
    const p = prods.find(x => x.id === _prodModalId); if(!p) return;
    p.name = document.getElementById('pm-name').value.trim() || p.name;
    p.ver  = document.getElementById('pm-ver').value.trim();
    if (!p.fixedAlloc) {
      const actives = ap().filter(q => !q.fixedAlloc);
      if(actives.length) {
        const sumInputs = prefix => Math.round(actives.reduce((s,q)=>{ const el=document.getElementById(`${prefix}${q.id}`); return s+(el?parseFloat(el.value)||0:0); },0)*10)/10;
        const kwR = sumInputs('pm-kwpct-'), ratR = sumInputs('pm-ratio-');
        if(kwR!==10 && kwR!==0){ alert(`키워드 배분 합계는 10 또는 모두 0이어야 합니다. (현재: ${kwR})`); return; }
        if(ratR!==10){ alert(`일 목표 배분 합계는 10이어야 합니다. (현재: ${ratR})`); return; }
        actives.forEach(q => {

          if(ratEl) q.ratio = Math.round((parseFloat(ratEl.value)||0)*10)/10;
        });
      }
    } else {
      const kwLimitEl  = document.getElementById('pm-kwlimit');
      const fixedPctEl = document.getElementById('pm-fixedpct');

  // ── 분배 로직 ─────────────────────────────────────────────────

  function yupflAlloc(target, pct) { return Math.round(target * ((pct ?? 30) / 100)); }

  function lrm(items, total) {
    if (!items.length) return {};
    const totalW = items.reduce((s, p) => s + p.ratio, 0) || 1;
    const exact  = items.map(p => total * p.ratio / totalW);
    const floors = exact.map(v => Math.floor(v));
    const rems   = exact.map((v, i) => v - floors[i]);
    let leftover = total - floors.reduce((s, v) => s + v, 0);
    const order  = rems.map((_, i) => i).sort((a, b) => rems[b] - rems[a]);
    for (let i = 0; i < leftover; i++) floors[order[i]]++;
    return items.reduce((m, p, i) => (m[p.id] = floors[i], m), {});
  }

  function allocate(asgn, target) {
    if (!asgn.length) return {};
    const yupfl = asgn.find(p => p.fixedAlloc);
    if (yupfl) {
      const yAmt = Math.min(yupflAlloc(target, yupfl.fixedPct), target);
      return { [yupfl.id]: yAmt, ...lrm(asgn.filter(p => !p.fixedAlloc), Math.max(0, target - yAmt)) };
    }
    return lrm(asgn, target);
  }

  function kwForProd(keywords, prod) {
    if (!keywords) return '';
    const parts = keywords.split(',').map(k => k.trim()).filter(k => k);
    if (!parts.length) return '';
    if (prod.kwLimit) return parts.slice(0, prod.kwLimit).join(',');
    const activeOthers = ap().filter(p => !p.fixedAlloc);
    const totalPct = activeOthers.reduce((s, p) => s + (p.kwPct || 0), 0);
    if (totalPct === 0) return parts.join(',');
    const counts = lrm(activeOthers.map(p => ({id: p.id, ratio: p.kwPct || 0})), parts.length);
    let offset = 0;
    for (const p of activeOthers) {
      if (p.id === prod.id) return parts.slice(offset, offset + (counts[p.id] || 0)).join(',');
      offset += counts[p.id] || 0;
    }
    return '';
  }

  function sc(ws, r, c, v, s) {
    if (v === undefined || v === null) return;
    s = s || {};
    const addr = window.XLSX.utils.encode_cell({r, c});
    ws[addr] = {
      t: typeof v === 'number' ? 'n' : 's', v,
      s: {
        font:      { name: '맑은 고딕', sz: 10, ...s.font },
        alignment: { horizontal: s.align || 'center', vertical: 'center', wrapText: false },
        ...(s.fill ? {fill:{fgColor:{rgb:s.fill},patternType:'solid'}} : {}),
        border: { top:{style:'thin',color:{rgb:'D0D0D0'}}, bottom:{style:'thin',color:{rgb:'D0D0D0'}}, left:{style:'thin',color:{rgb:'D0D0D0'}}, right:{style:'thin',color:{rgb:'D0D0D0'}} },
      },
    };
  }
  function scDate(ws, r, c, dateStr) {
    if (!dateStr) return;
    const [y, m, d] = String(dateStr).split('-').map(Number);
    const serial = Math.round((new Date(y, m-1, d) - new Date(1899, 11, 30)) / (86400 * 1000));
    const addr = window.XLSX.utils.encode_cell({r, c});
    ws[addr] = {
      t: 'n', v: serial, z: 'YYYY-MM-DD',
      s: {
        font: { name:'맑은 고딕', sz:10 }, alignment: { horizontal:'center', vertical:'center' }, numFmt:'YYYY-MM-DD',
        border: { top:{style:'thin',color:{rgb:'D0D0D0'}}, bottom:{style:'thin',color:{rgb:'D0D0D0'}}, left:{style:'thin',color:{rgb:'D0D0D0'}}, right:{style:'thin',color:{rgb:'D0D0D0'}} },
      },
    };
  }

  function buildAdlogXlsxBase64(rows) {
    const XLSX = window.XLSX;
    const header = ['그룹(띄어쓰기까지 일치해야됨)', '키워드(필수)', 'URL(필수)', '메모(미작성시 공란)'];
    const aoa = [header, ...rows.map(r => [r.group, r.keyword, r.mid, r.memo])];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols'] = [{wch:22},{wch:20},{wch:20},{wch:16}];
    XLSX.utils.book_append_sheet(wb, ws, '대량등록');
    const arr = XLSX.write(wb, {bookType:'xlsx', type:'array'});
    const bytes = new Uint8Array(arr);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
  }

  const ADLOG_BATCH_SIZE = 100; // adlog.kr 대량등록 1회 최대 100건 제한

  async function executeAdlogSubmit(rows, overlay) {
    const applyBtn = overlay.querySelector('#adlog-apply-btn');
    const closeBtn = overlay.querySelector('#adlog-close-btn');
    const subEl    = overlay.querySelector('#adlog-sub');
    applyBtn.disabled = true; applyBtn.textContent = '⏳ 등록 중...'; applyBtn.style.background = '#6b7280'; applyBtn.style.cursor = 'default';
    closeBtn.disabled = true;
    window.adlogSubmitting = true;

    async function run() {
      const chunks = [];
      for (let i = 0; i < rows.length; i += ADLOG_BATCH_SIZE) chunks.push(rows.slice(i, i + ADLOG_BATCH_SIZE));

      let totalCount = 0, totalRegistered = 0, hadFailure = false;
      const failMessages = [];

      for (let i = 0; i < chunks.length; i++) {
        const chunk = chunks[i];
        if (chunks.length > 1) {
          applyBtn.textContent = `⏳ 등록 중... (${i+1}/${chunks.length}배치)`;
          subEl.innerHTML = `<span style="color:var(--muted)">배치 ${i+1}/${chunks.length} 전송 중 (${chunk.length}건)...</span>`;
        }

        let result;
        try {
          const fileBase64 = buildAdlogXlsxBase64(chunk);
          result = await callBizfitProxy('/adlog-register', { fileBase64 });
        } catch(e) {
          result = { success: false, message: '서버 호출 실패: ' + e.message };
        }

        if (result.success) {
          chunk.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--accent);">✅ 완료</span>'; });
          totalCount      += (result.total ?? chunk.length);
          totalRegistered += (result.registered ?? chunk.length);
        } else {
          hadFailure = true;
          failMessages.push(result.message || '알 수 없는 오류');
          chunk.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = `<span style="color:var(--danger);" title="${escProd(result.message||'')}">❌ 실패</span>`; });
        }
      }

      if (!hadFailure) {
        const batchNote = chunks.length > 1 ? ` (${chunks.length}개 배치로 전송)` : '';
        subEl.innerHTML = `<span style="color:var(--accent);font-weight:600;">✅ 총${totalCount}개 중 ${totalRegistered}개 등록 되었습니다.${batchNote}</span>`;

      }

      window.adlogSubmitting = false;
    }

    if (window.XLSX) { await run(); } else {
      await new Promise(resolve => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
        s.onload = resolve;
        document.head.appendChild(s);
      });

    }
  }

  window.downloadExcel = function() {
    const checkedKeys = [...document.querySelectorAll('.row-check:checked')].map(c => c.dataset.key);
    const target = checkedKeys.length ? allSlots.filter(s => checkedKeys.includes(s._key)) : filteredAll;
    if (!target.length) { alert('다운로드할 데이터가 없습니다.'); return; }
    if (!ap().length)   { alert('활성화된 상품이 없습니다.\n상품 유형 설정에서 최소 1개를 켜주세요.'); return; }

    function doDownload() {
      const agencies = getAgencies(target);
      const btn = document.getElementById('dl-main-btn');
      if (btn) btn.disabled = true;
      const sleep = ms => new Promise(r => setTimeout(r, ms));
      const shortD = () => { const d=new Date(); return String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); };
      (async () => {
        try {
          for (let i = 0; i < agencies.length; i++) {
            const ag = agencies[i], f = slotsByAgency(target, ag), realAg = ag === '(대행사 미지정)' ? '' : ag;
            setProg(true, Math.round(100*i/agencies.length), `[${ag}] 시트 생성 중... (${i+1}/${agencies.length}개 대행사)`);
            await sleep(60);
            const wb = window.XLSX.utils.book_new();
            buildJusuSheet(wb, f);
            buildJumuSheet_(wb, f, '일반', p => !FIXED_PROD_IDS.has(p.id));
            ap().filter(p => FIXED_PROD_IDS.has(p.id)).forEach(prod => {
              if (prod.fixedAlloc) buildYoupflSheet(wb, f, prod.name);
              else buildJumuSheet_(wb, f, prod.name, p => p.id === prod.id);
            });
            window.XLSX.writeFile(wb, realAg ? `${realAg}-주문서.xlsx` : `주문서-${shortD()}.xlsx`);
            await sleep(300);
          }
          setProg(true, 100, `완료 ✅  ${agencies.length}개 대행사 · ${target.length}건`);
          await sleep(2000);
        } catch(e) {
          alert('오류: ' + e.message);
        } finally {
          if (btn) btn.disabled = false;
          setProg(false);
        }
      })();
    }

    if (window.XLSX) { doDownload(); } else {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = doDownload;
      document.head.appendChild(s);
    }
  };

  async function fetchBizfitAccount(agencyId) {
    const safe = s => s.replace(/[.#$[\]/]/g,'_');
    try {
      const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
      const snap = await get(ref(getDatabase(), `ha/bizfit_charge/${safe(agencyId)}`));
      return snap.exists() ? snap.val() : null;
    } catch { return null; }
  }

  async function callBizfitProxy(path, body) {
    const res = await fetch(`${BIZFIT_PROXY}${path}`, {
      method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body),
    });
    return res.json();
  }

  // buildJumuSheet_('일반', ...)와 동일한 배분 로직 — 엑셀 셀 쓰기 대신 등록 페이로드 행을 만듦
  function buildNormalRows(slots) {
    const AP = ap();
    const normalProds = AP.filter(p => !FIXED_PROD_IDS.has(p.id));
    const rows = [];
    slots.forEach(r => {
      const alloc = allocate(AP.slice(), r.dailyTarget||0);
      normalProds.forEach(prod => {
        const pp = alloc[prod.id] ?? 0;
        if (pp <= 0) return;
        const daysVal = prod.daysMultiplied ? pp*(r.days||0) : (r.days||0);
        const kw = kwForProd(r.searchKeyword||'', prod);
        rows.push({
          _slotKey:   r._key,
          _normalSubmitted: !!(r.normalDoneProducts && r.normalDoneProducts.includes(prod.name)),
          상품등급명: prod.name,
          업체명:     r.storeName||'',
          업체URL:    r.url||'',
          PID번호:    r.mid||'',
          순위키워드: r.rankKeyword||'',
          일목표:     pp,
          일수:       daysVal,
          예약일:     r.startDate||'',
          검색키워드: kw,
        });
      });
    });
    return rows;
  }

  function buildYoupflRows(slots) {
    const yupfl = ap().find(p => p.fixedAlloc);
    if (!yupfl) return [];
    return slots.map(s => {
      const yAmt = Math.min(yupflAlloc(s.dailyTarget||0, yupfl.fixedPct), s.dailyTarget||0);
      if (yAmt <= 0) return null;
      return {
        _slotKey:  s._key,
        _fixedSubmitted: !!s.fixedSubmitted,
        agencyId:  s.agencyId||'(대행사 미지정)',
        userId:    s.userId||'',
        // 슬롯 저장 단가 우선, 없으면 현재 회원 단가로 폴백 (정산관리와 동일한 규칙)
        unitPrice: (s.unitPrice!=null && s.unitPrice>0) ? s.unitPrice : null,
        storeName: s.storeName||'',
        rankKw:    s.rankKeyword||'',
        workKw:    (s.yupflKeyword||'').trim(),
        placeId:   s.mid||'',
        target:    yAmt,
        days:      s.days||0,
        startDate: s.startDate||'',
      };
    }).filter(Boolean);
  }

      `;

      if (!p.gradeRowEls.has(r.상품등급명)) p.gradeRowEls.set(r.상품등급명, []);
      p.gradeRowEls.get(r.상품등급명).push(statusTd);
    });
    tbl.appendChild(tbody); wrap.appendChild(tbl); block.appendChild(wrap);

    const ft = document.createElement('div');
    ft.className = 'agency-ft';
    ft.innerHTML = '<div class="totals"></div>';
    block.appendChild(ft);
    p.msgEl = ft.querySelector('.totals');

    return block;
  }
