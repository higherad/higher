  async function executeYoupflSubmit(rows, overlay, gate=null) {
    const applyBtn = overlay.querySelector('#youpfl-apply-btn');
    const closeBtn = overlay.querySelector('#youpfl-close-btn');
    const subEl    = overlay.querySelector('#youpfl-sub');

    // 이전에 이미 접수 완료된 행(일반만 남아 모달을 닫았다가 재오픈한 경우)은 재제출하지 않음
    const alreadyRows = rows.filter(r => r._fixedSubmitted);
    const pendingRows = rows.filter(r => !r._fixedSubmitted);
    alreadyRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--accent);">✅ 완료</span>'; });

    if (!pendingRows.length) {
      // 전부 이미 완료된 경우 — 업로드 없이 게이트만 마무리
      subEl.innerHTML = '<span style="color:var(--accent);font-weight:600;">✅ 이미 모두 접수 완료된 항목입니다.</span>';
      applyBtn.disabled = true; applyBtn.textContent = `✅ 완료 (${rows.length}건)`; applyBtn.style.background = '#475569'; applyBtn.style.cursor = 'default';
      if (gate) {
        gate.fixedKeys = new Set(rows.map(r => r._slotKey).filter(Boolean));
        await gate.tryApprove();
      }
      closeBtn.disabled = false; closeBtn.onclick = () => { overlay.remove(); if (!gate) renderReceipts(false); };
      return;
    }

    // 유효성 검사 — 유입플 키워드 미입력
    pendingRows.forEach(r => {
      if (!r.workKw) {
        r._kwFail = true;
        if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--danger);" title="유입플 키워드 미입력">❌ 키워드 미입력</span>';
      }
    });
    const validRows = pendingRows.filter(r => !r._kwFail);

    if (!validRows.length) {
      subEl.innerHTML = '<span style="color:var(--danger);font-weight:600;">전체 유효성 검사 실패 (키워드 미입력)</span>';
      applyBtn.disabled = true; applyBtn.textContent = '❌ 실패'; applyBtn.style.background = '#b91c1c'; applyBtn.style.cursor = 'default';
      if (gate) {
        gate.fixedKeys = new Set(alreadyRows.map(r => r._slotKey).filter(Boolean));
        await gate.tryApprove();
      }
      closeBtn.disabled = false; closeBtn.onclick = () => overlay.remove();
      return;
    }

    const missionByKey = new Map();
    for (const r of validRows) {
      const el = overlay.querySelector(`.ag-mission-input[data-key="${CSS.escape(r._slotKey||'')}"]`);
      const val = el?.value;
      if (val === '' || val === null || val === undefined) {
        alert(`"${r.storeName||r._slotKey}" 항목의 미션 번호를 지정해주세요.`);
        return;
      }
      missionByKey.set(r._slotKey, Math.max(0, parseInt(val, 10) || 0));
    }

    applyBtn.disabled = true; applyBtn.textContent = '⏳ 업로드 중...'; applyBtn.style.background = '#6b7280';
    closeBtn.disabled = true;
    window.bizfitSubmitting = true;
    const normalBtn = overlay.querySelector('#submit-apply-btn');
    if (normalBtn) normalBtn.disabled = true;

    function calcIkil(startDate) {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const start = startDate ? new Date(startDate) : today; start.setHours(0, 0, 0, 0);
      return Math.max(0, Math.round((start - today) / 86400000));
    }

    let result;
    try {
      result = await callBizfitProxy('/youpfl-upload', {
        rows: validRows.map(r => ({ rankKw: r.rankKw, workKw: r.workKw, placeId: r.placeId, target: r.target, days: r.days, mission: missionByKey.get(r._slotKey), ikil: calcIkil(r.startDate) })),
      });
    } catch(e) {
      result = { success: false, message: '서버 호출 실패: ' + e.message };
    }

    if (result.success) {
      validRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--accent);">✅ 완료</span>'; });
      subEl.innerHTML = `<span style="color:var(--accent);font-weight:600;">✅ ${escProd(result.message||'업로드 완료')}</span>`;
      const slotMap = new Map(allSlots.map(s => [s._key, s]));
      const pendingSlotKeys = validRows.map(r => r._slotKey).filter(Boolean);
      const allDoneSlotKeys = rows.filter(r => !r._kwFail).map(r => r._slotKey).filter(Boolean); // already + 이번에 성공한 것 전부
      if (gate) {
        gate.fixedKeys = new Set(allDoneSlotKeys);
        if (pendingSlotKeys.length) {
          // 일반이 아직 안 끝났으면 여기서 바로 승인 전환 안 됨 — 재접수 시 이번에 새로 성공한 것만 스킵되도록 임시 플래그 저장
          await Promise.all(pendingSlotKeys.map(k => HA.updateSlot(k, { fixedSubmitted: true })));
          pendingSlotKeys.forEach(k => { const s = slotMap.get(k); if (s) s.fixedSubmitted = true; });
        }
        await gate.tryApprove();
      } else {
        await Promise.all(pendingSlotKeys.map(k => HA.approveSlot(k)));
        pendingSlotKeys.forEach(k => { const s = slotMap.get(k); if (s) s.status = 'active'; });
      }
      applyBtn.textContent = `✅ 완료 (${rows.length}건)`; applyBtn.style.background = '#475569'; applyBtn.style.cursor = 'default';
      window.bizfitSubmitting = false;
      closeBtn.disabled = false; closeBtn.onclick = () => { overlay.remove(); if (!gate) renderReceipts(false); };
      // 일반 탭 잠금 해제 — 이 탭을 먼저 끝낸 뒤 계속 열어둔 채로 일반도 마저 접수할 수 있어야 함
      if (normalBtn) normalBtn.disabled = false;
    } else {
      validRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = `<span style="color:var(--danger);" title="${escProd(result.message||'')}">❌ 실패</span>`; });
      subEl.innerHTML = `<span style="color:var(--danger);font-weight:600;">❌ ${escProd(result.message||'업로드 실패')}</span>`;
      applyBtn.textContent = '❌ 실패'; applyBtn.style.background = '#b91c1c'; applyBtn.style.cursor = 'default';
      window.bizfitSubmitting = false;
      if (normalBtn) normalBtn.disabled = false;
      // 이미 완료된 것만이라도 게이트에 반영 (새로 실패한 것은 제외)
      if (gate) {
        gate.fixedKeys = new Set(alreadyRows.map(r => r._slotKey).filter(Boolean));
        await gate.tryApprove();
      }
      closeBtn.disabled = false; closeBtn.onclick = () => overlay.remove();
    }
  }

  function setGradeStatus(p, gradeName, html) {
    (p.gradeRowEls.get(gradeName) || []).forEach(td => td.innerHTML = html);
  }
  function setAllStatus(p, html) {
    p.gradeRowEls.forEach((_, name) => setGradeStatus(p, name, html));
  }

  async function executeSubmit(plan, overlay, gate=null) {
    const applyBtn = overlay.querySelector('#submit-apply-btn');
    const closeBtn = overlay.querySelector('#submit-close-btn');
    window.bizfitSubmitting = true;
    applyBtn.disabled = true; applyBtn.textContent = '⏳ 처리 중...'; applyBtn.style.background = '#6b7280';
    closeBtn.disabled = true;
    const youpflBtn = overlay.querySelector('#youpfl-apply-btn');
    if (youpflBtn) youpflBtn.disabled = true;
    let okTotal = 0, failTotal = 0;
    const slotMap = new Map(allSlots.map(s => [s._key, s]));
    const approvedKeys = gate ? new Set() : null;

    // 대행사 1곳 처리 — 같은 BizFit 계정은 동시 요청 시 세션 충돌 위험이 있으므로 grade 단위는 순차
    async function processAgency(p) {
      if (!p.rows.length) return;

      // 한 캠페인(슬롯)에 활성 상품이 여러 개면 상품별로 행이 나뉘어 각각 성공/실패가 갈릴 수 있음.
      // 슬롯의 모든 상품행이 성공(또는 기존에 이미 완료)한 경우에만 그 슬롯을 승인 처리한다 — 일부라도 실패하면 승인 보류.
      async function finalizeSlotApprovals() {
        const bySlot = new Map();
        p.rows.forEach(r => {
          if (!r._slotKey) return;
          if (!bySlot.has(r._slotKey)) bySlot.set(r._slotKey, []);
          bySlot.get(r._slotKey).push(r);
        });
        const okSlots = [...bySlot.entries()]
          .filter(([, rs]) => rs.every(r => r._normalSubmitted || r._rowOk === true))
          .map(([k]) => k);
        if (!okSlots.length) return;
        if (gate) {
          okSlots.forEach(k => approvedKeys.add(k));
        } else {
          await Promise.all(okSlots.map(k => HA.approveSlot(k)));
          okSlots.forEach(k => { const s = slotMap.get(k); if (s) s.status = 'active'; });
        }
      }

      // 이전에 이미 접수 완료된 행(유입플만 남아 모달을 닫았다가 재오픈한 경우)은 재제출하지 않고 완료 표시만 유지
      const alreadyRows = p.rows.filter(r => r._normalSubmitted);
      const pendingRows = p.rows.filter(r => !r._normalSubmitted);
      alreadyRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--accent);">✅ 완료</span>'; });
      okTotal += alreadyRows.length;

      if (!pendingRows.length) {
        if (p.msgEl) p.msgEl.innerHTML = '<span style="color:var(--accent);font-size:11px;">✅ 전체 접수 완료</span>';
        await finalizeSlotApprovals();
        return;
      }

      pendingRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--info);">⏳</span>'; });

      // 유효성 검사 — 키워드 50개 초과 / 일목표 10 미만
      pendingRows.forEach(r => {
        const kwCount = (r.검색키워드||'').split(',').map(k=>k.trim()).filter(k=>k).length;
        if (kwCount > 50) {
          r._kwFail = true;
          if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--danger);" title="검색키워드 50개 초과">❌ 키워드 초과</span>';
          failTotal++;
        } else if (kwCount === 0) {
          r._kwFail = true;
          if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--danger);" title="검색키워드 미입력">❌ 키워드 미입력</span>';
          failTotal++;
        } else if ((r.일목표||0) < 10) {
          r._kwFail = true;
          if (r._statusTd) r._statusTd.innerHTML = `<span style="color:var(--danger);" title="일목표 ${r.일목표||0}개 — 10 미만">❌ 일목표 미달</span>`;
          failTotal++;
        }
      });

      const validRows = pendingRows.filter(r => !r._kwFail);

      if (!validRows.length) {
        if (p.msgEl) p.msgEl.innerHTML = '<span style="color:var(--danger);font-size:11px;">전체 유효성 검사 실패 (키워드 초과 또는 일목표 미달)</span>';
        await finalizeSlotApprovals();
        return;
      }

      const account = p.realAg ? await fetchBizfitAccount(p.realAg) : null;
      if (!account) {
        validRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--danger);">❌ 계정 미등록</span>'; });
        if (p.msgEl) p.msgEl.innerHTML = '<span style="color:var(--danger);font-size:11px;">비즈핏 계정 정보 미등록 (회원 관리에서 BizFit ID/PW 등록 필요)</span>';
        failTotal += validRows.length;
        await finalizeSlotApprovals();
        return;
      }

      let gi;
      try {
        gi = await callBizfitProxy('/grade-info', { domain: BIZFIT_DOMAIN, loginId: account.id, pwd: account.pw, tab: BIZFIT_TAB, rawData: validRows.map(({_slotKey, _statusTd, _kwFail, _normalSubmitted, ...rest}) => rest) });
      } catch(e) { gi = { success:false, message: '서버 호출 실패: '+e.message }; }

      if (!gi.success || !gi.gradeGroups || !gi.gradeGroups.length) {
        const msg = gi.message || '전송 가능한 등급이 없습니다.';
        validRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = `<span style="color:var(--danger);" title="${escProd(msg)}">❌ 등급조회 실패</span>`; });
        if (p.msgEl) p.msgEl.innerHTML = `<span style="color:var(--danger);font-size:11px;">${escProd(msg)}</span>`;
        failTotal += validRows.length;
        await finalizeSlotApprovals();
        return;
      }

      const matchedGrades = new Set();
      let agencyFail = 0;
      for (const g of gi.gradeGroups) {
        const grpRows = validRows.filter(r => r.상품등급명 === g.gradeName);
        if (!grpRows.length) continue;
        matchedGrades.add(g.gradeName);
        const payloadRows = grpRows.map(({_slotKey, _statusTd, _kwFail, _normalSubmitted, ...rest}) => rest);
        let result;
        try {
          result = await callBizfitProxy('/register', {
            domain: BIZFIT_DOMAIN, loginId: account.id, pwd: account.pw,
            tab: g.actualTab || BIZFIT_TAB, gradeName: g.gradeName, classType: g.classType, gradeType: g.gradeType,
            rowData: payloadRows,
          });
        } catch(e) { result = { success:false, message: e.message }; }
        if (result.success) {
          // 배치 내 일부 행만 결제에서 제외(비즈핏 측 검증 실패)될 수 있음 — payloadRows는 grpRows를
          // 그대로 map한 것이라 순서가 1:1 대응하므로, 서버가 반환한 행 인덱스로 매칭한다.
          // PID(업체)로 매칭하지 않는 이유: 같은 업체가 슬롯 2개(예: 기간이 다른 캠페인)에 걸쳐
          // 같은 배치에 들어오면 PID만으로는 어느 행이 실패했는지 구분할 수 없다.
          const failByIdx = new Map((result.fail_rows || []).map(f => [f.index, f.reason]));
          let okCount = 0;
          grpRows.forEach((r, i) => {
            const reason = failByIdx.get(i);
            if (reason === undefined) {
              r._rowOk = true; okCount++;
              if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--accent);">✅ 완료</span>';
            } else if (r._statusTd) {
              r._statusTd.innerHTML = `<span style="color:var(--danger);" title="비즈핏 결제 제외 (${escProd(reason||'데이터 검증 실패')})">❌ 실패</span>`;
            }
          });
          okTotal += okCount;
          const failCount = grpRows.length - okCount;
          if (failCount) { failTotal += failCount; agencyFail += failCount; }
        } else {
          failTotal += grpRows.length;
          agencyFail += grpRows.length;
          grpRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = `<span style="color:var(--danger);" title="${escProd(result.message||'')}">❌ 실패</span>`; });
        }
      }
      // 비즈핏 등급맵과 매칭 안 된 등급명 (유효 행 기준)
      const validGradeNames = new Set(validRows.map(r => r.상품등급명));
      validGradeNames.forEach(name => {
        if (!matchedGrades.has(name)) {
          const unmatchedRows = validRows.filter(r => r.상품등급명 === name);
          unmatchedRows.forEach(r => { if (r._statusTd) r._statusTd.innerHTML = '<span style="color:var(--danger);">❌ 등급 불일치</span>'; });
          failTotal += unmatchedRows.length;
          agencyFail += unmatchedRows.length;
        }
      });
      // 이번 회차에 성공한 상품만 슬롯별로 개별 기록 — 실패한 상품만 다음 재접수 때 다시 시도되도록
      const newlyOkBySlot = new Map();
      p.rows.forEach(r => {
        if (r._rowOk !== true || !r._slotKey) return;
        if (!newlyOkBySlot.has(r._slotKey)) newlyOkBySlot.set(r._slotKey, []);
        newlyOkBySlot.get(r._slotKey).push(r.상품등급명);
      });
      await Promise.all([...newlyOkBySlot.entries()].map(async ([slotKey, names]) => {
        const s = slotMap.get(slotKey);
        const merged = [...new Set([...(s?.normalDoneProducts || []), ...names])];
        await HA.updateSlot(slotKey, { normalDoneProducts: merged });
        if (s) s.normalDoneProducts = merged;
      }));
      // 슬롯 단위 승인 판정 — 이 슬롯에 걸린 모든 상품행이 성공해야 승인 (일부 실패 시 보류)
      await finalizeSlotApprovals();
      if (p.msgEl) {
        const kwFailCount = p.rows.filter(r => r._kwFail).length;
        const parts = [kwFailCount ? `유효성 실패 ${kwFailCount}건` : '', agencyFail ? '일부 등급 실패 — 상태 칸에서 사유 확인(마우스오버)' : ''].filter(Boolean);
        p.msgEl.innerHTML = parts.length
          ? `<span style="color:var(--danger);font-size:11px;">${parts.join(' / ')}</span>`
          : `<span style="color:var(--accent);font-size:11px;">✅ 전체 접수 완료</span>`;
      }
    }

    // 대행사(계정)별로 병렬 처리
    await Promise.all(plan.map(p => processAgency(p)));

    if (gate) {
      // 상품별 완료 기록(normalDoneProducts)은 processAgency에서 이미 개별 저장됨 —
      // 여기서는 슬롯 전체(모든 활성 상품)가 완료된 키만 게이트에 반영
      gate.normalKeys = approvedKeys;
      await gate.tryApprove();
    }

    window.bizfitSubmitting = false;
    applyBtn.textContent = failTotal ? `완료 — 성공 ${okTotal} / 실패 ${failTotal}` : `✅ 전체 완료 (${okTotal}건)`;
    applyBtn.style.background = failTotal ? '#b91c1c' : '#475569';
    applyBtn.style.cursor = 'default';
    closeBtn.disabled = false;
    closeBtn.onclick = () => { overlay.remove(); if (!gate) renderReceipts(false); };
    // 유입플 탭 잠금 해제 — 이 탭을 먼저 끝낸 뒤 계속 열어둔 채로 유입플도 마저 접수할 수 있어야 함
    if (youpflBtn) youpflBtn.disabled = false;
  }

  function byGradeCount(rows, name) { return rows.filter(r => r.상품등급명 === name).length; }

  // 최초 로드
  renderReceipts(false);
  (async () => {
    await loadProdSettings();
    if (!document.getElementById('receipt-page')) return; // 대기 중 다른 메뉴로 이동한 경우 렌더 중단
    saveProdDefault();
    renderPS();
  })();

  // 유입플 접수 모달 금액 표시용 — 회원 단가 미리 로드
  HA.getUsers().then(users => {
    users.forEach(u => userPriceMap.set(u.username, u.unitPrice || 0));
  }).catch(() => {});

  // Firebase SDK 미리 로드 — 첫 상세 클릭 딜레이 제거
  import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js').catch(() => {});

  // lock 전체 상태 프리페치 — TCP 예열 + 캐시 초기화로 첫 상세 클릭 시 네트워크 없이 즉시 확인
  fetch(`${LOCK_FB}.json`).then(r => r.ok ? r.json() : null).then(data => {
    if (!data || typeof data !== 'object') return;
    const cu   = window.HA?.getCurrentUser?.() || {};
    const myId = cu.username || cu.id || 'unknown';
    Object.entries(data).forEach(([key, lock]) => {
      if (!lock) return;
      const age = Date.now() - new Date(lock.lockedAt).getTime();
      if (lock.staffId !== myId && age < LOCK_TTL_MS) {
        LOCK_CHECK_CACHE.set(key, { conflict: true, by: lock.staffName || lock.staffId, ts: Date.now() });
      }
    });
  }).catch(() => {});

})();
</script>
</div>
