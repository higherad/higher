<div id="receipt-page">
<style>
  #receipt-page .filter-bar {
    background:#fff; border:1px solid var(--border); border-radius:10px;
    padding:14px 16px; display:flex; gap:10px; align-items:center; margin-bottom:14px;
  }
  #receipt-page select, #receipt-page input[type=text] {
    padding:6px 10px; border:1px solid var(--border); border-radius:6px;
    font-size:12px; font-family:inherit; color:var(--text); background:#fff; outline:none;
  }
  #receipt-page .tbl-wrap {
    background:#fff; border:1px solid var(--border); border-radius:10px; overflow:hidden;
  }
  #receipt-page table { width:100%; border-collapse:collapse; font-size:12px; }
  #receipt-page thead th {
    background:#1e293b; color:#fff; padding:11px 10px; font-weight:500;
    border-right:1px solid #2d3f55; white-space:nowrap; text-align:center;
  }
  #receipt-page tbody td {
    padding:11px 10px; border-bottom:1px solid var(--border); text-align:center; vertical-align:middle;
  }
  #receipt-page tbody tr:last-child td { border-bottom:none; }
  #receipt-page tbody tr:hover { background:#f8fafc; }
  .status-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:10px; }
  .s-pending  { background:rgba(245,158,11,.1); color:#b45309; }
  .s-active   { background:rgba(16,185,129,.1);  color:#059669; }
  .s-rejected { background:rgba(239,68,68,.1);   color:#dc2626; }
  .s-expired     { background:#f1f5f9; color:#64748b; }
  .s-terminated  { background:rgba(100,116,139,.12); color:#334155; }
  .action-btn { padding:4px 10px; border-radius:5px; border:none; font-size:11px; font-weight:600; cursor:pointer; transition:.15s; }
  .btn-approve { background:var(--accent); color:#fff; }
  .btn-approve:hover { background:var(--accent2); }
  .btn-reject  { background:rgba(239,68,68,.1); color:var(--danger); }
  .btn-reject:hover { background:var(--danger); color:#fff; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:9000; display:flex; align-items:center; justify-content:center; }
  .modal-box { background:#fff; border-radius:16px; width:520px; max-height:80vh; overflow-y:auto; padding:28px; box-shadow:0 20px 60px rgba(0,0,0,.2); }
  .modal-title { font-size:17px; font-weight:700; margin-bottom:20px; }
  .modal-field { margin-bottom:14px; }
  .modal-field label { display:block; font-size:12px; color:var(--text2); font-weight:600; margin-bottom:5px; }
  .modal-field input, .modal-field textarea, .modal-field select { width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:7px; font-size:13px; font-family:inherit; outline:none; color:var(--text); box-sizing:border-box; }
  .modal-field textarea { resize:vertical; min-height:70px; }
  .modal-field input:focus, .modal-field textarea:focus, .modal-field select:focus { border-color:var(--accent); }
  .modal-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .modal-footer { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
  .btn-cancel { padding:8px 20px; border:1px solid var(--border); border-radius:7px; background:#fff; cursor:pointer; font-size:13px; }
  .btn-save   { padding:8px 20px; border:none; border-radius:7px; background:var(--accent); color:#fff; cursor:pointer; font-size:13px; font-weight:600; }
  .btn-save:hover { background:var(--accent2); }
  .btn-danger-save { background:var(--danger); }
  .btn-danger-save:hover { background:#b91c1c; }
  .btn-warning-save { background:#d97706; }
  .btn-warning-save:hover { background:#b45309; }
  .empty-row td { height:200px; text-align:center; color:var(--muted); font-size:13px; }
  .pagination { display:flex; justify-content:center; gap:5px; margin-top:16px; }
  .pg-btn { width:30px; height:30px; border:1px solid var(--border); background:#fff; border-radius:6px; font-size:12px; cursor:pointer; color:var(--text2); display:flex; align-items:center; justify-content:center; }
  .pg-btn.active { background:var(--info); color:#fff; border-color:var(--info); }
  .slot-detail { text-align:left; }
  .slot-detail dt { font-size:11px; color:var(--text2); margin-top:10px; }
  .slot-detail dd { font-size:13px; margin:2px 0 0 0; font-weight:500; }
  .loading-wrap { display:flex; align-items:center; justify-content:center; height:200px; color:var(--muted); font-size:13px; gap:8px; }
  .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .detail-kw-input { width:100%; padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; font-family:inherit; outline:none; color:var(--text); box-sizing:border-box; margin-top:3px; }
  .detail-kw-input:focus { border-color:var(--accent); }
  .stat-bar { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:16px; }
  .stat-box { background:#fff; border:1px solid var(--border); border-radius:10px; padding:16px 20px; display:flex; align-items:center; gap:14px; }
  .stat-box .sb-icon { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .stat-box .sb-label { font-size:11px; color:var(--text2); font-weight:600; margin-bottom:4px; }
  .stat-box .sb-val { font-size:22px; font-weight:800; line-height:1; }

  /* ── 반응형 ── */
  @media (max-width: 768px) {
    .stat-bar { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .sb-val { font-size:16px !important; }
    .sb-icon { width:30px !important; height:30px !important; font-size:13px !important; }
    #receipt-page .filter-bar { flex-wrap: wrap; gap: 6px; }
    #receipt-page .filter-bar > * { flex: 1 1 calc(50% - 6px); min-width: 120px; }
    #receipt-page .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    #receipt-page table { min-width: 900px; }
    .modal-box { width: calc(100vw - 32px); padding: 20px; }
    .modal-row { grid-template-columns: 1fr; }
  }
</style>

<div class="stat-bar" id="receipt-stat-bar">
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(245,158,11,.1)">⏳</div>
    <div><div class="sb-label">대기</div><div class="sb-val" id="stat-pending" style="color:var(--warn)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(16,185,129,.1)">✅</div>
    <div><div class="sb-label">승인</div><div class="sb-val" id="stat-active" style="color:var(--accent)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(239,68,68,.1)">❌</div>
    <div><div class="sb-label">반려</div><div class="sb-val" id="stat-rejected" style="color:var(--danger)">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:rgba(100,116,139,.12)">🔚</div>
    <div><div class="sb-label">종료</div><div class="sb-val" id="stat-terminated" style="color:#334155">-</div></div>
  </div>
  <div class="stat-box">
    <div class="sb-icon" style="background:#f1f5f9">🕓</div>
    <div><div class="sb-label">만료</div><div class="sb-val" id="stat-expired" style="color:#64748b">-</div></div>
  </div>
</div>

<div style="display:flex;justify-content:flex-end;align-items:center;margin-bottom:16px;">
  <div style="display:flex;gap:8px;">
    <button class="action-btn" style="background:#16a34a;color:#fff;padding:7px 16px;font-size:12px;" onclick="downloadExcel()">📥 엑셀 다운로드</button>
    <button class="action-btn btn-approve" style="padding:7px 16px;font-size:12px;" onclick="bulkApprove()">선택 승인</button>
    <button class="action-btn btn-reject"  style="padding:7px 16px;font-size:12px;" onclick="bulkReject()">선택 반려/종료</button>
  </div>
</div>

<div class="filter-bar">
  <select id="filter-status" onchange="renderReceipts()">
    <option value="">전체 상태</option>
    <option value="pending">대기</option>
    <option value="active">승인</option>
    <option value="rejected">반려</option>
    <option value="terminated">종료</option>
  </select>
  <div style="position:relative;display:flex;align-items:center;">
    <button id="date-pick-btn" onclick="document.getElementById('filter-date-from').showPicker?document.getElementById('filter-date-from').showPicker():document.getElementById('filter-date-from').focus()" style="display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-family:inherit;color:var(--text2);white-space:nowrap;">
      📅 <span id="date-label">접수일 선택</span>
    </button>
    <input type="date" id="filter-date-from" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" onchange="onDateChange()">
    <button id="date-clear-btn" onclick="clearDateFilter()" style="display:none;margin-left:4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 4px;" title="날짜 초기화">✕</button>
  </div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <input type="text" id="receipt-search" placeholder="대행사/플레이스명/MID 검색" style="width:220px;">
    <button class="action-btn" style="background:#475569;color:#fff;padding:6px 14px;" onclick="renderReceipts()">검색</button>
  </div>
</div>

<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" id="check-all" onchange="toggleAll(this)"></th>
        <th>번호</th><th>접수일시</th><th>대행사</th><th>유저 ID</th>
        <th>캠페인타입</th><th>플레이스명</th><th>MID</th><th>순위키워드</th>
        <th>일 수</th><th>시작일</th><th>종료일</th><th>일 목표</th><th>상태</th><th>액션</th><th>순위</th>
      </tr>
    </thead>
    <tbody id="receipt-body">
      <tr><td colspan="16" class="loading-wrap"><div class="spinner"></div> 데이터 불러오는 중...</td></tr>
    </tbody>
  </table>
</div>
<div class="pagination" id="receipt-pagination"></div>

<script>
(function(){
  let currentPage = 1;
  const PER_PAGE  = 20;
  let allSlots    = [];

  const stMap = {
    pending:    '<span class="status-badge s-pending">대기</span>',
    active:     '<span class="status-badge s-active">승인</span>',
    rejected:   '<span class="status-badge s-rejected">반려</span>',
    expired:    '<span class="status-badge s-expired">만료</span>',
    terminated: '<span class="status-badge s-terminated">종료</span>',
  };

  function getFiltered() {
    const status   = document.getElementById('filter-status').value;
    const kw       = (document.getElementById('receipt-search').value||'').trim().toLowerCase();
    const dateFrom = document.getElementById('filter-date-from').value;
    return allSlots.filter(s => {
      if (s.status === 'deleted') return false;
      if (status && s.status !== status) return false;
      if (kw && ![s.agencyId,s.storeName,s.mid].some(v=>(v||'').toLowerCase().includes(kw))) return false;
      const slotDate = s.createdAt ? (() => { const d = new Date(s.createdAt); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })() : '';
      if (dateFrom && slotDate !== dateFrom) return false;
      return true;
    });
  }

  window.clearDateFilter = function() {
    document.getElementById('filter-date-from').value = '';
    document.getElementById('date-label').textContent = '접수일 선택';
    document.getElementById('date-pick-btn').style.color = 'var(--text2)';
    document.getElementById('date-clear-btn').style.display = 'none';
    renderReceipts();
  };
  window.onDateChange = function() {
    const val = document.getElementById('filter-date-from').value;
    if (val) {
      document.getElementById('date-label').textContent = val;
      document.getElementById('date-pick-btn').style.color = 'var(--text)';
      document.getElementById('date-clear-btn').style.display = 'inline';
    }
    renderReceipts();
  };

  window.renderReceipts = async function(resetPage = true) {
    if (resetPage) currentPage = 1;
    document.getElementById('receipt-body').innerHTML =
      '<tr><td colspan="15"><div class="loading-wrap"><div class="spinner"></div> 불러오는 중...</div></td></tr>';

    allSlots = await HA.getSlots();

    // ── 종료일 지난 active 캠페인 자동 만료 처리 ──────────────
    const todayStr = (() => { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
    const toExpire = allSlots.filter(s =>
      s.status === 'active' && s.endDate && s.endDate < todayStr
    );
    if (toExpire.length) {
      await Promise.all(toExpire.map(s => HA.updateSlot(s._key, { status: 'expired' })));
      toExpire.forEach(s => { s.status = 'expired'; });
    }

    const all      = getFiltered();
    const pending    = allSlots.filter(s => s.status === 'pending').length;
    const active     = allSlots.filter(s => s.status === 'active').length;
    const rejected   = allSlots.filter(s => s.status === 'rejected').length;
    const terminated = allSlots.filter(s => s.status === 'terminated').length;
    const expired    = allSlots.filter(s => s.status === 'expired').length;
    document.getElementById('stat-pending').textContent    = pending;
    document.getElementById('stat-active').textContent     = active;
    document.getElementById('stat-rejected').textContent   = rejected;
    document.getElementById('stat-terminated').textContent = terminated;
    document.getElementById('stat-expired').textContent    = expired;

    const start = (currentPage-1)*PER_PAGE;
    const page  = all.slice(start, start+PER_PAGE);
    const body  = document.getElementById('receipt-body');

    if (!page.length) {
      body.innerHTML = '<tr class="empty-row"><td colspan="15">데이터가 없습니다.</td></tr>';
    } else {
      body.innerHTML = page.map((s,i) => `
        <tr>
          <td><input type="checkbox" class="row-check" data-key="${s._key}"></td>
          <td style="color:var(--text2)">${all.length - start - i}</td>
          <td style="color:var(--text2)">${
            (() => {
              if (!s.createdAt) return '-';
              const d = new Date(s.createdAt);
              const yyyy = d.getFullYear();
              const mo = String(d.getMonth()+1).padStart(2,'0');
              const dd = String(d.getDate()).padStart(2,'0');
              return `${yyyy}-${mo}-${dd}`;
            })()
          }</td>
          <td style="font-weight:600">${s.agencyId||'-'}</td>
          <td>${s.userId||'-'}</td>
          <td><span style="background:#f1f5f9;padding:2px 7px;border-radius:4px;font-size:11px">${s.slotType}</span></td>
          <td>${s.url ? `<a href="${s.url}" target="_blank" style="color:var(--accent);font-weight:500;text-decoration:none;">${s.storeName||'-'}</a>` : (s.storeName||'-')}</td>
          <td style="color:var(--text2);font-size:11px">${s.mid||'-'}</td>
          <td style="color:var(--text2)">${s.rankKeyword ? `<a href="https://m.search.naver.com/search.naver?where=m&query=${encodeURIComponent(s.rankKeyword)}" target="_blank" style="color:var(--text2);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">${s.rankKeyword}</a>` : '-'}</td>
          <td style="color:var(--text2)">${s.days||'-'}</td>
          <td style="color:var(--text2)">${s.startDate||'-'}</td>
          <td style="color:var(--text2)">${s.endDate||'-'}</td>
          <td style="color:var(--text2)">${s.dailyTarget ? s.dailyTarget.toLocaleString() : '-'}</td>
          <td>
            ${stMap[s.status]||s.status}
            ${s.status==='rejected' && s.rejectReason ? `<br><small style="color:var(--danger);font-size:10px;display:inline-block;margin-top:3px;max-width:120px;word-break:keep-all;line-height:1.3">${s.rejectReason}</small>` : ''}
          </td>
          <td>
            <div style="display:flex;gap:5px;justify-content:center;">
              <button class="action-btn" style="background:#f1f5f9;color:var(--text2);" onclick="viewDetail('${s._key}')">상세</button>
              ${s.status==='pending' ? `
                <button class="action-btn btn-approve" onclick="approveOne('${s._key}')">승인</button>
                <button class="action-btn btn-reject"  onclick="openRejectModal('${s._key}')">반려</button>
              ` : ''}
              ${s.status==='active' ? `
                <button class="action-btn" style="background:rgba(245,158,11,.15);color:#b45309;" onclick="changeStatusTo('${s._key}','pending')">대기</button>
                <button class="action-btn" style="background:rgba(100,116,139,.15);color:#334155;" onclick="terminateOne('${s._key}')">종료</button>
              ` : ''}
              ${s.status==='rejected' ? `
                <button class="action-btn btn-approve" onclick="approveOne('${s._key}')">승인</button>
                <button class="action-btn" style="background:rgba(245,158,11,.15);color:#b45309;" onclick="changeStatusTo('${s._key}','pending')">대기</button>
              ` : ''}
              ${s.status==='expired' ? `
                <button class="action-btn btn-reject"  onclick="openRejectModal('${s._key}')">반려</button>
              ` : ''}
              ${s.status==='terminated' ? `
                <button class="action-btn btn-approve" onclick="approveOne('${s._key}')">승인</button>
                <button class="action-btn" style="background:rgba(245,158,11,.15);color:#b45309;" onclick="changeStatusTo('${s._key}','pending')">대기</button>
              ` : ''}
              <button class="action-btn" style="background:#1e293b;color:#fff;" onclick="deleteOne('${s._key}')">삭제</button>
            </div>
          </td>
          <td>
            <button class="action-btn" style="background:#f0f9ff;color:#0369a1;border:1px solid #bae6fd;" onclick="openRankPopup('${s._key}')">순위</button>
          </td>
        </tr>`).join('');
    }
    renderPagination(all.length);
    if (window.lucide) lucide.createIcons();
  };

  function renderPagination(total) {
    const pages = Math.ceil(total/PER_PAGE) || 1;
    const pg    = document.getElementById('receipt-pagination');
    let html = `<button class="pg-btn" onclick="goPage(1)">&laquo;</button>
                <button class="pg-btn" onclick="goPage(${Math.max(1,currentPage-1)})">&lsaquo;</button>`;
    const s=Math.max(1,currentPage-2),e=Math.min(pages,currentPage+2);
    if(s>1){html+=`<button class="pg-btn" onclick="goPage(1)">1</button>`;if(s>2)html+=`<span class="pg-btn" style="pointer-events:none">…</span>`;}
    for (let i=s; i<=e; i++) {
      html += `<button class="pg-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    if(e<pages){if(e<pages-1)html+=`<span class="pg-btn" style="pointer-events:none">…</span>`;html+=`<button class="pg-btn" onclick="goPage(${pages})">${pages}</button>`;}
    html += `<button class="pg-btn" onclick="goPage(${Math.min(pages,currentPage+1)})">&rsaquo;</button>
             <button class="pg-btn" onclick="goPage(${pages})">&raquo;</button>`;
    pg.innerHTML = html;
  }

  window.goPage = function(n) { currentPage=n; renderReceipts(false); };

  window.toggleAll = function(cb) {
    document.querySelectorAll('.row-check').forEach(c => c.checked = cb.checked);
  };

  function getCheckedKeys() {
    return [...document.querySelectorAll('.row-check:checked')].map(c => c.dataset.key);
  }

  // ── 승인 ─────────────────────────────────────────────────
  window.approveOne = async function(key) {
    await HA.approveSlot(key);
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
    renderReceipts(false);
  };

  window.bulkApprove = async function() {
    const keys = getCheckedKeys();
    if (!keys.length) return alert('선택된 항목이 없습니다.');
    await Promise.all(keys.map(k => HA.approveSlot(k)));
    renderReceipts(false);
  };

  // ── 상태 변경 (승인→대기, 반려→대기 등) ─────────────────
  window.changeStatusTo = async function(key, newStatus) {
    const labelMap = { pending: '대기', active: '승인', rejected: '반려', terminated: '종료' };
    if (!confirm(`상태를 "${labelMap[newStatus]}"(으)로 변경하시겠습니까?`)) return;
    await HA.updateSlot(key, { status: newStatus, rejectReason: newStatus !== 'rejected' ? '' : undefined });
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
    renderReceipts(false);
  };

  // ── 종료 처리 (승인 → 종료) ──────────────────────────────
  window.terminateOne = async function(key) {
    if (!confirm('해당 캠페인을 종료 처리하시겠습니까?')) return;
    await HA.updateSlot(key, { status: 'terminated' });
    const overlay = document.querySelector('.modal-overlay');
    if (overlay) overlay.remove();
    renderReceipts(false);
  };

  // ── 반려 ─────────────────────────────────────────────────
  window.bulkReject = async function() {
    const keys = getCheckedKeys();
    if (!keys.length) return alert('선택된 항목이 없습니다.');

    // 선택된 캠페인들의 상태 확인
    const selectedSlots = allSlots.filter(s => keys.includes(s._key));
    const hasActive  = selectedSlots.some(s => s.status === 'active');
    const hasPending = selectedSlots.some(s => s.status === 'pending');

    let reason = '';
    if (hasPending) {
      reason = prompt('반려 사유를 입력해주세요:') || '';
    }

    await Promise.all(selectedSlots.map(s => {
      if (s.status === 'active') {
        // 승인 상태 → 종료 처리
        return HA.updateSlot(s._key, { status: 'terminated' });
      } else if (s.status === 'pending') {
        // 대기 상태 → 반려 처리
        return HA.rejectSlot(s._key, reason);
      }
      // 그 외 상태는 건너뜀
      return Promise.resolve();
    }));
    renderReceipts(false);
  };

  // ── Firebase에서 MID로 현재 키워드 조회 (오늘 값 단순 덮어쓰기) ──
  async function fetchSheetKeywordByMid(mid) {
    try {
      const safeMid = mid.replace(/[.#$[\]/]/g, '_');
      const { getDatabase, ref, get } = await import(
        'https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js'
      );
      const snap = await get(ref(getDatabase(), `ha/keywords/${safeMid}`));
      if (!snap.exists()) return [];
      return [snap.val()]; // 문자열 하나를 배열로 감싸서 반환
    } catch (e) {
      console.error('Firebase 키워드 조회 오류:', e);
      return null; // null = 오류, [] = 결과없음
    }
  }

      </div>`;
    } else {
      html += `<div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:7px;padding:10px 12px;margin-bottom:10px;">
        ${sheetKeywords.map(kw => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid #dbeafe;gap:8px;">
            <span style="font-size:13px;font-weight:600;color:#1d4ed8;flex:1;">${kw}</span>

              style="font-size:10px;padding:2px 8px;border:1px solid #3b82f6;border-radius:4px;background:#fff;color:#3b82f6;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">
              적용
            </button>
          </div>`).join('')}

    }

    // ── 섹션 ②: 자체 DB 이전 히스토리 ──
    html += `<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:5px;">
      <span style="background:#94a3b8;color:#fff;padding:1px 6px;border-radius:4px;font-size:10px;">히스토리</span>

  // ── 엑셀 다운로드 (접수 시트 형식 - 이미지 기준) ────────────
  window.downloadExcel = function() {
    const checkedKeys = [...document.querySelectorAll('.row-check:checked')].map(c => c.dataset.key);
    const filtered = checkedKeys.length
      ? allSlots.filter(s => checkedKeys.includes(s._key))
      : getFiltered();
    if (!filtered.length) return alert('다운로드할 데이터가 없습니다.');

    function buildAndDownload() {
      const XLSX = window.XLSX;
      const wb = XLSX.utils.book_new();

      // ── 접수 시트: 업체명/URL/MID번호/순위키워드/일 수/시작일/일 목표/검색키워드
      const header = ['접수일시','대행사','업체명','URL','MID','순위키워드','일 수','시작일','일 목표','검색키워드'];
      const rows = filtered.map(s => [
        s.createdAt ? (() => { const d = new Date(s.createdAt); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })() : '',
        s.agencyId||'',
        s.storeName||'',
        s.url||'',
        s.mid||'',
        s.rankKeyword||'',
        s.days||'',
        s.startDate||'',
        s.dailyTarget||'',
        s.searchKeyword||'',
      ]);

      const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);

      ws['!cols'] = [
        {wch:12},{wch:16},{wch:22},{wch:48},{wch:14},{wch:14},{wch:6},{wch:12},{wch:10},{wch:20}
      ];

      XLSX.utils.book_append_sheet(wb, ws, '접수');

      const today = new Date();
      const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
      XLSX.writeFile(wb, `접수_${dateStr}.xlsx`);
    }

    if (window.XLSX) {
      buildAndDownload();
    } else {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      script.onload = buildAndDownload;
      document.head.appendChild(script);
    }
  };

  // 최초 로드
  renderReceipts(false);

    const SHEET_ID  = '14j9wwFedE-kwAebFSnBWjgCYcoCUW2L0hDdBmtGqAf8';
    const RANK_PATH = `ha/ranks/${s.mid.replace(/[.#$[\]/]/g, '_')}`;

    if (!document.getElementById('rank-popup-style')) {
      const st = document.createElement('style');
      st.id = 'rank-popup-style';
      st.textContent = `.rank-modal-box{background:#fff;border-radius:16px;width:480px;max-height:80vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.rank-modal-title{font-size:16px;font-weight:700;margin-bottom:6px}.rank-modal-sub{font-size:12px;color:var(--text2);margin-bottom:16px}.rank-tbl{width:100%;border-collapse:collapse;font-size:12px}.rank-tbl thead th{background:#1e293b;color:#fff;padding:9px 10px;text-align:center;font-weight:500}.rank-tbl tbody td{padding:9px 10px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}.rank-tbl tbody tr:last-child td{border-bottom:none}.rank-tbl tbody tr:hover{background:#f8fafc}.rank-num{display:inline-block;font-weight:700;font-size:13px;padding:2px 10px;border-radius:5px}.rank-1{background:#fef9c3;color:#92400e}.rank-top3{background:#eff6ff;color:#1d4ed8}.rank-top10{background:#f0fdf4;color:#15803d}.rank-other{background:#f1f5f9;color:#475569}.rank-empty{text-align:center;padding:40px 0;color:var(--muted);font-size:13px}`;
      document.head.appendChild(st);
    }

    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.onclick = function(e) {
      if (e.target === overlay) {
        overlay.remove();
      }
    };
    overlay.innerHTML = `
      <div class="rank-modal-box">
        <div style="margin-bottom:4px;">
          <div class="rank-modal-title">📊 일자별 순위</div>
          <div class="rank-modal-sub">${s.storeName} &nbsp;·&nbsp; MID: ${s.mid} &nbsp;·&nbsp; 순위키워드: <strong>${s.rankKeyword||'-'}</strong></div>
        </div>
        <div id="rank-table-area">
          <div class="loading-wrap"><div class="spinner"></div> 순위 데이터 불러오는 중...</div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:16px;">
          <button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">닫기</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    await _renderRankTable_r(s.mid, RANK_PATH);
  };

  async function _renderRankTable_r(mid, rankPath) {
    const area = document.getElementById('rank-table-area');
    if (!area) return;
    try {
      const { getDatabase, ref, get } = await import('https://www.gstatic.com/firebasejs/10.10.0/firebase-database.js');
      const snap = await get(ref(getDatabase(), rankPath));
      if (!snap.exists()) { area.innerHTML = `<div class="rank-empty">저장된 순위 데이터가 없습니다.<br><small>매일 오후 자동으로 업데이트됩니다.</small></div>`; return; }
      const data = snap.val();
      const seen = new Set();
      const rows = Object.entries(data).map(([date,v])=>({date,keyword:v.keyword||'-',rank:v.rank}))
        .sort((a,b)=>b.date.localeCompare(a.date))
        .filter(r=>{ const k=`${r.date}_${r.keyword}`; if(seen.has(k))return false; seen.add(k);return true; });
      area.innerHTML = `<table class="rank-tbl"><thead><tr><th>날짜</th><th>순위 키워드</th><th>순위</th></tr></thead><tbody>${rows.map(r=>{
        const rn=Number(r.rank); const cls=rn===1?'rank-1':rn<=3?'rank-top3':rn<=10?'rank-top10':'rank-other';
        const disp=(!r.rank||r.rank==='-')?'<span style="color:var(--muted)">-</span>':`<span class="rank-num ${cls}">${rn}위</span>`;
        return `<tr><td style="color:var(--text2)">${r.date}</td><td style="font-weight:500">${r.keyword}</td><td>${disp}</td></tr>`;
      }).join('')}</tbody></table>`;
    } catch(e){ area.innerHTML=`<div class="rank-empty" style="color:var(--danger)">로드 실패: ${e.message}</div>`; }
  }


})();
