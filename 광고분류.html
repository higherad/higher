<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"></head>
<body>
<div id="ac-wrap">

  <!-- 탭 -->
  <div class="ac-tabs" id="ac-tabs">
    <button class="ac-tab active" onclick="acSwitchTab('daily',this)">📅 일별</button>
    <button class="ac-tab" onclick="acSwitchTab('monthly',this)">📆 월별</button>
    <button class="ac-tab" onclick="acSwitchTab('dates',this)">🗓 날짜별</button>
  </div>

  <!-- 검색 -->
  <div class="ac-search-bar">
    <input class="ac-search-input" id="ac-search" placeholder="🔍  업체명 검색..." oninput="acSearch(this.value)">
    <button class="ac-search-clear" onclick="acClearSearch()">✕ 검색 초기화</button>
  </div>

  <!-- 결과 -->
  <div id="ac-result-area">
    <div class="ac-no-result">📂 하단에서 파일을 업로드하고 분류 실행 버튼을 눌러주세요.</div>
  </div>
  <div class="ac-save-status" id="ac-save-status"></div>

  <hr class="ac-divider">

  <!-- 구분 설정 -->
  <p class="ac-sec">🏷️ 구분 설정</p>
  <div class="ac-editor" id="ac-editor">
    <div style="padding:20px;text-align:center;color:var(--muted,#94a3b8);font-size:13px">불러오는 중...</div>
  </div>

  <!-- 업로드 -->
  <p class="ac-sec">📂 엑셀 파일 업로드</p>
  <div class="ac-upload-zone" id="ac-zone">
    <input type="file" id="ac-file-input" accept=".xls,.xlsx">
    <div style="font-size:28px;margin-bottom:8px">📊</div>
    <div style="font-size:14px;font-weight:600;color:var(--text,#1e293b);margin-bottom:4px">파일을 클릭하거나 드래그하여 업로드</div>
    <div style="font-size:12px;color:var(--muted,#94a3b8)">.xls / .xlsx 형식 지원</div>
    <div class="ac-upload-fname" id="ac-fname"></div>
  </div>

  <!-- 실행 -->
  <button class="ac-run-btn" id="ac-run-btn" disabled onclick="acRun()">▶&nbsp; 분류 실행</button>
</div>
<div id="ac-toast"></div>

<script>
(function(){

  /* ── XLSX 보장 로드 ── */
  function ensureXLSX(cb){
    if(window.XLSX){cb();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=cb; s.onerror=()=>toast('XLSX 로드 실패','err');
    document.head.appendChild(s);
  }

  /* ── 유틸 ── */
  const DEFAULTS=[{name:'대행사',stores:[]},{name:'직광고주',stores:[]},{name:'단독',stores:[]}];
  const norm =s=>String(s||'').toLowerCase().replace(/\s+/g,'').replace(/[^\w가-힣]/g,'').trim();
  const normT=s=>String(s||'').toLowerCase().replace(/\s+/g,'').trim();
  const fmt  =n=>n?Number(n).toLocaleString():'';
  const gcls =n=>n==='대행사'?'agency':n==='직광고주'?'direct':'solo';
  const esc  =s=>s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  function toast(msg,type='ok'){
    const el=document.getElementById('ac-toast');
    el.textContent=msg; el.className='show '+type;
    clearTimeout(el._t); el._t=setTimeout(()=>el.className='',2800);
  }
  function setStatus(msg){document.getElementById('ac-save-status').textContent=msg;}

  /* ── 탭 상태 ── */
  let _activeTab='daily';
  window.acSwitchTab=function(tab,btn){
    _activeTab=tab;
    document.querySelectorAll('.ac-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    // 업로드/실행 버튼 토글
    const isDaily=tab==='daily';
    document.getElementById('ac-zone').style.display=isDaily?'':'none';
    document.getElementById('ac-run-btn').style.display=isDaily?'':'none';
    document.querySelectorAll('.ac-sec')[1].style.display=isDaily?'':'none'; // 업로드 타이틀
    if(tab==='daily'){
      const r=window._acDailyResult;
      r?renderResult(r,''):showEmpty('📂 하단에서 파일을 업로드하고 분류 실행 버튼을 눌러주세요.');
    } else if(tab==='monthly'){
      loadMonthly();
    } else {
      loadDates();
    }
  };

  /* ── Firebase ── */
  async function fbSaveGroups(g){
    if(window.HA&&window.HA.saveAdClassifyGroups) await window.HA.saveAdClassifyGroups(g);
  }
  async function fbSaveResult(result){
    setStatus('저장 중...');
    try{
      if(window.HA&&window.HA.saveAdClassifyResult){
        await window.HA.saveAdClassifyResult(result);
        setStatus('✅ 서버에 저장됨 · '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}));
      } else { setStatus('⚠️ ha-store 미연결'); }
    }catch(e){ setStatus('❌ 저장 실패: '+e.message); }
  }
  async function fbLoad(){
    if(window.HA&&window.HA.getAdClassify) return await window.HA.getAdClassify()||{};
    return {};
  }
  async function fbLoadDaily(){
    if(window.HA&&window.HA.getAdClassifyDaily) return await window.HA.getAdClassifyDaily()||{};
    return {};
  }

  /* ── 구분 편집기 ── */
  let _groups=DEFAULTS;
  function renderEditor(){
    document.getElementById('ac-editor').innerHTML=_groups.map((g,gi)=>{
      const cls=gcls(g.name);
      const tags=(g.stores||[]).length
        ?g.stores.map((s,si)=>`<span class="ac-tag">${s}<span class="ac-x" onclick="acRemove(${gi},${si})">×</span></span>`).join('')
        :'<span style="font-size:11px;color:var(--muted,#94a3b8)">업체 없음</span>';
      return `<div class="ac-editor-row">
        <div class="ac-editor-label ${cls}">${g.name}</div>
        <div class="ac-editor-body">
          <div class="ac-tags">${tags}</div>
          <div class="ac-hint">쉼표(,)로 여러 업체를 한 번에 추가할 수 있습니다</div>
          <div class="ac-add-row">
            <input class="ac-inp" id="ac-inp-${gi}" placeholder="예) 업체A, 업체B, 업체C"
              onkeydown="if(event.key==='Enter'){event.preventDefault();acAdd(${gi})}">
            <button class="ac-add-btn" onclick="acAdd(${gi})">추가</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }
  window.acRemove=function(gi,si){_groups[gi].stores.splice(si,1);renderEditor();fbSaveGroups(_groups);};
  window.acAdd=function(gi){
    const inp=document.getElementById('ac-inp-'+gi);
    const vals=inp.value.split(',').map(v=>v.trim()).filter(Boolean);
    if(!vals.length)return;
    vals.forEach(v=>{if(!_groups[gi].stores.includes(v))_groups[gi].stores.push(v);});
    inp.value=''; renderEditor(); fbSaveGroups(_groups);
    toast(`✅ ${vals.length}개 업체 추가됨`);
  };

  /* ── 파일 업로드 ── */
  window._acData=null;
  function setupUpload(){
    const zone=document.getElementById('ac-zone');
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);});
    document.getElementById('ac-file-input').addEventListener('change',e=>{if(e.target.files[0])handleFile(e.target.files[0]);});
  }
  function handleFile(file){
    document.getElementById('ac-fname').textContent='📎 '+file.name;
    document.getElementById('ac-fname').style.display='block';
    ensureXLSX(()=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          window._acData=rows.slice(1).map(r=>({
            storeN:norm(String(r[2]||'').split(',').pop()),
            typeN:normT(r[9]),goal:Number(r[15])||0
          })).filter(r=>r.storeN);
          document.getElementById('ac-run-btn').disabled=false;
          toast('✅ '+file.name+' 로드 완료 ('+window._acData.length+'행)');
        }catch(err){toast('파일 파싱 실패: '+err.message,'err');}
      };
      reader.readAsArrayBuffer(file);
    });
  }

  /* ── 분류 실행 ── */
  window.acRun=async function(){
    if(!window._acData){toast('먼저 파일을 업로드해주세요','err');return;}
    const groupSums=_groups.map(g=>({
      name:g.name,
      stores:(g.stores||[]).map(sName=>{
        const key=norm(sName);
        let ns=0,np=0,nps=0,na=0,vm=0;
        window._acData.forEach(r=>{
          if(r.storeN!==key)return;
          const t=r.typeN;
          if(t.startsWith('ns트래픽'))ns+=r.goal;
          else if(t.startsWith('np트래픽'))np+=r.goal;
          else if(t.startsWith('np저장'))nps+=r.goal;
          else if(t.startsWith('n자동완성'))na+=r.goal;
          else if(t.startsWith('방문미션'))vm+=r.goal;
        });
        return{name:sName.replace(/주식회사|\(주\)/g,'').trim(),raw:sName,ns,np,nps,na,vm,sum:ns+np+nps+na+vm};
      }),
    })).map(g=>({...g,stores:g.stores.filter(r=>r.sum>0),gSum:g.stores.filter(r=>r.sum>0).reduce((a,r)=>a+r.sum,0)}));
    const total={ns:0,np:0,nps:0,na:0,vm:0,sum:0};
    groupSums.forEach(g=>g.stores.forEach(r=>{total.ns+=r.ns;total.np+=r.np;total.nps+=r.nps;total.na+=r.na;total.vm+=r.vm;total.sum+=r.sum;}));
    const result={groupSums,total,ts:new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})};
    window._acDailyResult=result;
    await fbSaveResult(result);
    // 저장 후 월별 데이터 갱신
    const daily=await fbLoadDaily();
    window._acDailyAll=daily;
    window._acMonthData=buildMonthData(daily);
    renderResult(result,'');
    toast('✅ 분류 완료');
  };

  /* ── 날짜별 ── */
  async function loadDates(){
    showEmpty('🗓 날짜별 데이터를 불러오는 중...');
    setStatus('');
    try{
      const daily=await fbLoadDaily();
      const keys=Object.keys(daily).sort().reverse(); // 최신순
      if(!keys.length){showEmpty('🗓 저장된 날짜별 데이터가 없습니다.');return;}
      window._acDailyAll=daily;

      // 날짜 버튼 렌더 (MMDD 형식)
      const btnHtml=keys.map(k=>{
        const mmdd=k.slice(2); // yyMMdd → MMdd
        return `<button class="ac-date-btn" data-key="${k}" onclick="acSelectDate('${k}')">${mmdd}</button>`;
      }).join('');

      document.getElementById('ac-result-area').innerHTML=`
        <div class="ac-date-bar">${btnHtml}</div>
        <div id="ac-date-result"></div>`;

      // 가장 최근 날짜 자동 선택
      acSelectDate(keys[0]);
    }catch(e){
      showEmpty('❌ 날짜별 데이터 로드 실패: '+e.message);
    }
  }

  window.acSelectDate=function(yymmdd){
    document.querySelectorAll('.ac-date-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.key===yymmdd);
    });
    const daily=window._acDailyAll||{};
    const day=daily[yymmdd];
    if(!day||!day.groupSums){
      document.getElementById('ac-date-result').innerHTML='<div class="ac-no-result">해당 날짜의 데이터가 없습니다.</div>';
      return;
    }
    const yy='20'+yymmdd.slice(0,2);
    const mm=Number(yymmdd.slice(2,4));
    const dd=Number(yymmdd.slice(4,6));
    day.ts=day.ts||`${yy}년 ${mm}월 ${dd}일`;
    window._acDateResult=day;
    window._acLastResult=day;
    const kw=(document.getElementById('ac-search').value||'').trim().toLowerCase();
    document.getElementById('ac-date-result').innerHTML=buildTable(day, kw, false, null);
  };

  /* ── 월별 합산 ── */
  async function loadMonthly(){
    showEmpty('📆 월별 데이터를 불러오는 중...');
    setStatus('');
    try{
      const daily=await fbLoadDaily();
      const keys=Object.keys(daily).sort(); // ["260301","260302",...]
      if(!keys.length){showEmpty('📆 저장된 일별 데이터가 없습니다.');return;}

      // 현재 달 (yyMM) 기준으로 필터
      const now=new Date();
      const curYYMM=(String(now.getFullYear()).slice(2)+String(now.getMonth()+1).padStart(2,'0'));
      const thisMonthKeys=keys.filter(k=>k.startsWith(curYYMM));
      const allKeys=keys; // 드롭다운용

      // 월 목록 추출
      const months=[...new Set(keys.map(k=>k.slice(0,4)))].sort().reverse();

      renderMonthSelector(months, curYYMM, daily);
    }catch(e){
      showEmpty('❌ 월별 데이터 로드 실패: '+e.message);
    }
  }

  function renderMonthSelector(months, selectedYYMM, daily){
    // 월 선택 버튼 + 합산 결과
    const btnHtml=months.map(ym=>{
      const y='20'+ym.slice(0,2), m=Number(ym.slice(2));
      const label=`${y}년 ${m}월`;
      const cnt=Object.keys(daily).filter(k=>k.startsWith(ym)).length;
      return `<button class="ac-month-btn${ym===selectedYYMM?' active':''}" onclick="acSelectMonth('${ym}')">${label} <span class="ac-month-cnt">${cnt}일</span></button>`;
    }).join('');

    document.getElementById('ac-result-area').innerHTML=`
      <div class="ac-month-bar">${btnHtml}</div>
      <div id="ac-monthly-result"></div>`;

    window._acDailyAll=daily;
    acSelectMonth(selectedYYMM);
  }

  window.acSelectMonth=function(yyMM){
    document.querySelectorAll('.ac-month-btn').forEach(b=>{
      b.classList.toggle('active', b.textContent.includes('년')&&b.onclick.toString().includes(yyMM));
    });
    // 더 정확하게: data attribute로
    document.querySelectorAll('.ac-month-btn').forEach(b=>{
      const match=b.getAttribute('onclick')||'';
      b.classList.toggle('active', match.includes(`'${yyMM}'`));
    });

    const daily=window._acDailyAll||{};
    const monthKeys=Object.keys(daily).filter(k=>k.startsWith(yyMM)).sort();
    if(!monthKeys.length){
      document.getElementById('ac-monthly-result').innerHTML='<div class="ac-no-result">해당 월의 데이터가 없습니다.</div>';
      return;
    }

    // ★ 수정: 현재 _groups 설정 기준으로 base 구조를 직접 생성
    //    (저장된 첫 번째 날 데이터를 기준으로 쓰면 구분 설정 변경이 반영되지 않음)
    const base = {
      groupSums: _groups.map(g => ({
        name: g.name,
        stores: (g.stores || []).map(sName => ({
          name: sName.replace(/주식회사|\(주\)/g,'').trim(),
          raw: sName,
          ns:0, np:0, nps:0, na:0, vm:0, sum:0
        })),
        gSum: 0
      })),
      total: {ns:0, np:0, nps:0, na:0, vm:0, sum:0}
    };

    // 저장된 일별 데이터를 순회하며 raw 또는 name으로 매칭해 누적
    monthKeys.forEach(k=>{
      const day=daily[k];
      if(!day||!day.groupSums) return;
      day.groupSums.forEach(dg=>{
        const bg=base.groupSums.find(g=>g.name===dg.name);
        if(!bg) return;
        dg.stores.forEach(dr=>{
          const bs=bg.stores.find(s=>s.raw===dr.raw||s.name===dr.name);
          if(!bs) return;
          bs.ns+=dr.ns||0; bs.np+=dr.np||0; bs.nps+=dr.nps||0;
          bs.na+=dr.na||0; bs.vm+=dr.vm||0; bs.sum+=dr.sum||0;
        });
      });
    });
    // 월별: 합계 0인 업체도 모두 표시 (필터 없이 gSum, total 재계산)
    base.groupSums.forEach(g=>{
      g.gSum=g.stores.reduce((a,r)=>a+r.sum,0);
    });
    base.groupSums.forEach(g=>g.stores.forEach(r=>{
      base.total.ns+=r.ns;base.total.np+=r.np;base.total.nps+=r.nps;
      base.total.na+=r.na;base.total.vm+=r.vm;base.total.sum+=r.sum;
    }));

    const y='20'+yyMM.slice(0,2), m=Number(yyMM.slice(2));
    base.ts=`${y}년 ${m}월 합산 (${monthKeys.length}일 / ${monthKeys[0]}~${monthKeys[monthKeys.length-1]})`;
    window._acMonthResult=base;

    const kw=(document.getElementById('ac-search').value||'').trim().toLowerCase();
    renderMonthlyTable(base, kw);
  };

  function renderMonthlyTable(result, keyword){
    document.getElementById('ac-monthly-result').innerHTML=buildTable(result, keyword, true);
    window._acLastResult=result;
  }

  /* ── 결과 렌더 (일별) ── */
  function showEmpty(msg){
    document.getElementById('ac-result-area').innerHTML=`<div class="ac-no-result">${msg}</div>`;
  }
  function renderResult(result, keyword){
    if(!result){showEmpty('📂 하단에서 파일을 업로드하고 분류 실행 버튼을 눌러주세요.');return;}
    window._acLastResult=result;
    document.getElementById('ac-result-area').innerHTML=buildTable(result, keyword, false, window._acMonthData||null);
  }

  /* ── 이번 달 합산 데이터 빌드 (일별 raw → {storeName: {sum,gSum by group}} 형태) ── */
  function buildMonthData(daily){
    if(!daily||!Object.keys(daily).length) return null;
    const now=new Date();
    const yy=String(now.getFullYear()).slice(2);
    const mm=String(now.getMonth()+1).padStart(2,'0');
    const curYYMM=yy+mm;
    const monthKeys=Object.keys(daily).filter(k=>k.startsWith(curYYMM)).sort();
    if(!monthKeys.length) return null;

    // 업체별 합산 맵 { storeName → monthSum }
    // 그룹별 합산 맵 { groupName → monthGSum }
    const storeMap={}, groupMap={};
    monthKeys.forEach(k=>{
      const day=daily[k];
      if(!day||!day.groupSums) return;
      day.groupSums.forEach(g=>{
        (g.stores||[]).forEach(s=>{
          const key=s.raw||s.name;
          storeMap[key]=(storeMap[key]||0)+(s.sum||0);
        });
        groupMap[g.name]=(groupMap[g.name]||0)+(g.gSum||0);
      });
    });

    const monthLabel=(()=>{
      const y='20'+curYYMM.slice(0,2), m=Number(curYYMM.slice(2));
      return `${y}년 ${m}월`;
    })();

    return {storeMap, groupMap, monthLabel, days:monthKeys.length};
  }

  /* ── 공통 테이블 빌더 ── */
  function buildTable(result, keyword, isMonthly, monthData){
    const{groupSums,total,ts}=result;
    const kw=(keyword||'').trim().toLowerCase();
    const md=(!isMonthly&&monthData)?monthData:null; // 일별 탭에서만 월별 컬럼 표시

    // 월별 전체 합산
    let mTotal=0;
    if(md) Object.values(md.storeMap).forEach(v=>mTotal+=v);

    let tbody='', visible=0;
    groupSums.forEach(g=>{
      if(!(g.stores||[]).length)return;
      const cls=gcls(g.name);
      const stores=kw?g.stores.filter(r=>r.name.toLowerCase().includes(kw)||(r.raw||'').toLowerCase().includes(kw)):g.stores;
      if(!stores.length)return;
      visible+=stores.length;

      const bgDeep = cls==='agency'?'rgba(34,197,94,.13)':cls==='direct'?'rgba(245,158,11,.13)':'rgba(59,130,246,.13)';
      const bgLight= cls==='agency'?'rgba(34,197,94,.05)':cls==='direct'?'rgba(245,158,11,.05)':'rgba(59,130,246,.05)';
      const border = cls==='agency'?'rgba(34,197,94,.3)' :cls==='direct'?'rgba(245,158,11,.3)' :'rgba(59,130,246,.3)';
      const mBgD  = cls==='agency'?'rgba(34,197,94,.18)':cls==='direct'?'rgba(245,158,11,.18)':'rgba(59,130,246,.18)';
      const mBgL  = cls==='agency'?'rgba(34,197,94,.08)':cls==='direct'?'rgba(245,158,11,.08)':'rgba(59,130,246,.08)';

      stores.forEach((r,i)=>{
        const hl=txt=>kw&&txt.toLowerCase().includes(kw)
          ?txt.replace(new RegExp(esc(kw),'gi'),m=>`<mark class="ac-highlight">${m}</mark>`)
          :txt;
        const isFirst=i===0, isLast=i===stores.length-1;
        const topB=isFirst?`border-top:2px solid ${border};`:'';
        const botB=isLast ?`border-bottom:2px solid ${border};`:'';

        // 구분 셀
        const groupCell=isFirst
          ?`<td rowspan="${stores.length}" style="background:${bgDeep};${topB}border-bottom:2px solid ${border};font-weight:800;text-align:center;vertical-align:middle;color:#1e293b">${g.name}</td>`
          :'';
        // 총합계 셀
        const totalCell=isFirst
          ?`<td rowspan="${stores.length}" style="background:${bgDeep};${topB}border-bottom:2px solid ${border};font-weight:800;text-align:center;vertical-align:middle;white-space:nowrap;color:#1e293b">${fmt(g.gSum)}<span class="ac-badge ac-badge-${cls}">${g.name}</span></td>`
          :'';

        // 월별 합계 셀 (업체별)
        const mSum=md?(md.storeMap[r.raw]||md.storeMap[r.name]||0):null;
        const mStoreCell=md
          ?`<td style="background:#f1f5f9;border-left:3px solid #334155;${topB}${botB}font-weight:600;color:#1e293b">${mSum?fmt(mSum):''}</td>`
          :'';
        // 월별 총합계 셀 (그룹별 rowspan)
        const mGSum=md?(md.groupMap[g.name]||0):null;
        const mGroupCell=md&&isFirst
          ?`<td rowspan="${stores.length}" style="background:#e2e8f0;${topB}border-bottom:2px solid ${border};font-weight:800;text-align:center;vertical-align:middle;color:#0f172a">${fmt(mGSum)}</td>`
          :'';

        tbody+=`<tr style="background:${bgLight}">
          ${groupCell}
          <td style="${topB}${botB}font-weight:500">${hl(r.name)}</td>
          <td style="${topB}${botB}">${fmt(r.ns)}</td>
          <td style="${topB}${botB}">${fmt(r.np)}</td>
          <td style="${topB}${botB}">${fmt(r.nps)}</td>
          <td style="${topB}${botB}">${fmt(r.na)}</td>
          <td style="${topB}${botB}">${fmt(r.vm)}</td>
          <td style="${topB}${botB}font-weight:700">${fmt(r.sum)}</td>
          ${totalCell}
          ${mStoreCell}
          ${mGroupCell}
        </tr>`;
      });
    });

    if(kw&&!visible) return `<div class="ac-no-result">🔍 "<b>${keyword}</b>" 검색 결과가 없습니다.</div>`;

    const td0=`background:#1e293b;color:#fff;font-weight:800;text-align:center;padding:11px 13px;border-top:2px solid #0f172a`;
    const td1=`background:#1e293b;color:#fff;font-weight:700;text-align:center;padding:11px 13px;border-top:2px solid #0f172a`;
    if(!kw){
      tbody+=`<tr>
        <td colspan="2" style="${td0}">총합</td>
        <td style="${td1}">${fmt(total.ns)}</td>
        <td style="${td1}">${fmt(total.np)}</td>
        <td style="${td1}">${fmt(total.nps)}</td>
        <td style="${td1}">${fmt(total.na)}</td>
        <td style="${td1}">${fmt(total.vm)}</td>
        <td style="${td0}">${fmt(total.sum)}</td>
        <td style="${td1}"></td>
        ${md?`<td style="background:#0f172a;color:#fff;font-weight:800;text-align:center;padding:11px 13px;border-top:2px solid #0f172a;border-left:3px solid #475569">${fmt(mTotal)}</td><td style="background:#0f172a;color:#fff;padding:11px 13px;border-top:2px solid #0f172a"></td>`:''}
      </tr>`;
    }

    // 월별 컬럼 헤더
    const mLabel=md?md.monthLabel:'';
    const mColHeaders=md
      ?`<th style="background:#334155;color:#e2e8f0;border-left:3px solid #1e293b">${mLabel} 합계</th><th style="background:#334155;color:#e2e8f0">${mLabel} 총합계</th>`
      :'';

    const exportBtn=isMonthly
      ?`<button class="ac-export-btn" onclick="acExportMonthly()">⬇ CSV</button>`
      :`<button class="ac-export-btn" onclick="acExport()">⬇ CSV</button>`;

    return `
      <div class="ac-result-hdr">
        <div>
          <div class="ac-result-title">${isMonthly?'월별 합산':'분류 결과'}${kw?` &nbsp;<span style="font-size:13px;font-weight:500;color:var(--text2,#64748b)">"${keyword}" 검색 중</span>`:''}</div>
          <div class="ac-result-meta">${ts}${md?` &nbsp;·&nbsp; ${mLabel} 합산 포함 (${md.days}일)`:''}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          ${exportBtn}
          <button class="ac-capture-btn" id="ac-cap-btn" onclick="acCapture()">📷 이미지 저장</button>
        </div>
      </div>
      <div class="ac-tbl-scroll" id="ac-tbl-target">
        <div class="ac-tbl-wrap">
        <table class="ac-tbl">
          <thead><tr>
            <th>구분</th><th>업체명</th>
            <th>NS트래픽</th><th>NP트래픽</th><th>NP저장</th>
            <th>N자동완성</th><th>방문미션</th><th>합계</th><th>총합계</th>
            ${mColHeaders}
          </tr></thead>
          <tbody>${tbody}</tbody>
        </table>
        </div>
      </div>`;
  }

  /* ── 검색 ── */
  window.acSearch=function(val){
    if(_activeTab==='daily'){ if(window._acDailyResult)renderResult(window._acDailyResult,val); }
    else if(_activeTab==='monthly'){ if(window._acMonthResult)renderMonthlyTable(window._acMonthResult,val); }
    else { if(window._acDateResult){ window._acLastResult=window._acDateResult; document.getElementById('ac-date-result').innerHTML=buildTable(window._acDateResult,val,false,null); } }
  };
  window.acClearSearch=function(){
    document.getElementById('ac-search').value='';
    acSearch('');
  };

  /* ── CSV 내보내기 ── */
  function makeCSV(r){
    const{groupSums,total}=r;
    let csv='\uFEFF구분,업체명,NS트래픽,NP트래픽,NP저장,N자동완성,방문미션,합계,총합계\n';
    groupSums.forEach(g=>(g.stores||[]).forEach((s,i)=>{
      csv+=`${i===0?g.name:''},${s.name},${s.ns||''},${s.np||''},${s.nps||''},${s.na||''},${s.vm||''},${s.sum||''},${i===0?g.gSum:''}\n`;
    }));
    csv+=`,총합,${total.ns||''},${total.np||''},${total.nps||''},${total.na||''},${total.vm||''},${total.sum||''}\n`;
    return csv;
  }
  window.acExport=function(){ dlCSV(makeCSV(window._acDailyResult),'광고분류_일별_'); };
  window.acExportMonthly=function(){ dlCSV(makeCSV(window._acMonthResult),'광고분류_월별_'); };
  function dlCSV(csv,prefix){
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
    a.download=prefix+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  }

  /* ── 이미지 캡처 ── */
  window.acCapture = async function(){
    const scroll = document.getElementById('ac-tbl-target');
    const btn    = document.getElementById('ac-cap-btn');
    if(!scroll) return;

    // 실제 테이블 콘텐츠 영역 (스크롤 컨테이너 안의 wrap) 사용
    const target = scroll.querySelector('.ac-tbl-wrap') || scroll;

    // html2canvas 보장 로드
    async function ensureH2C(){
      if(window.html2canvas) return;
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.onload=res; s.onerror=rej;
        document.head.appendChild(s);
      });
    }

    try{
      btn.disabled=true; btn.textContent='📷 캡처 중...';
      await ensureH2C();

      // sticky thead 임시 해제 (캡처 시 잘림 방지)
      const ths=target.querySelectorAll('thead th');
      ths.forEach(th=>{th.style.position='';th.style.top='';});

      // 테이블 실제 크기 측정
      const tbl = target.querySelector('table');
      const captureW = tbl ? tbl.offsetWidth  : target.scrollWidth;
      const captureH = tbl ? tbl.offsetHeight : target.scrollHeight;

      // 캡처 전: wrap 너비를 테이블에 딱 맞게 임시 고정
      const prevWidth   = target.style.width;
      const prevMinW    = target.style.minWidth;
      const prevDisplay = target.style.display;
      target.style.width    = captureW + 'px';
      target.style.minWidth = captureW + 'px';
      target.style.display  = 'inline-block';

      const canvas = await html2canvas(target, {
        scale: 2,                    // 레티나 대응 — 2배 해상도
        useCORS: true,
        backgroundColor: '#ffffff',
        scrollY: 0,
        scrollX: 0,
        windowWidth: captureW,
        width: captureW,
        height: captureH,
      });

      // 스타일 복원
      target.style.width    = prevWidth;
      target.style.minWidth = prevMinW;
      target.style.display  = prevDisplay;

      // sticky 복원
      ths.forEach(th=>{th.style.position='sticky';th.style.top='0';});

      // 타이틀 + 날짜 워터마크 추가
      const result = window._acLastResult;
      const label  = result ? result.ts : new Date().toLocaleString('ko-KR');
      const title  = document.querySelector('.ac-result-title');
      const titleTxt = title ? title.innerText.replace(/\s+/g,' ').trim() : '광고 분류 결과';

      const pad=24, headerH=56;
      const out = document.createElement('canvas');
      out.width  = canvas.width;
      out.height = canvas.height + headerH;
      const ctx  = out.getContext('2d');

      // 헤더 배경
      ctx.fillStyle='#0f172a';
      ctx.fillRect(0,0,out.width,headerH);

      // 타이틀 텍스트
      ctx.fillStyle='#ffffff';
      ctx.font=`bold ${28}px Pretendard, sans-serif`;
      ctx.textBaseline='middle';
      ctx.fillText(titleTxt, pad, headerH*0.45);

      // 날짜 텍스트
      ctx.fillStyle='#94a3b8';
      ctx.font=`${22}px Pretendard, sans-serif`;
      ctx.fillText(label, pad, headerH*0.78);

      // 테이블 이미지 붙이기
      ctx.drawImage(canvas, 0, headerH);

      // 다운로드
      const a=document.createElement('a');
      a.href=out.toDataURL('image/png');
      a.download='광고분류_'+new Date().toISOString().slice(0,10)+'.png';
      a.click();

      btn.textContent='✅ 저장 완료';
      setTimeout(()=>{btn.disabled=false;btn.textContent='📷 이미지 저장';},2000);
    }catch(e){
      btn.disabled=false; btn.textContent='📷 이미지 저장';
      toast('캡처 실패: '+e.message,'err');
    }
  };

  /* ── 초기화 ── */
  async function init(){
    setupUpload();
    try{
      const data=await fbLoad();
      if(data.groups&&Array.isArray(data.groups)&&data.groups.length) _groups=data.groups;
      renderEditor();
      if(data.result){
        window._acDailyResult=data.result;
        // 월별 데이터도 함께 로드해서 일별 탭에 표시
        const daily=await fbLoadDaily();
        window._acDailyAll=daily;
        window._acMonthData=buildMonthData(daily);
        renderResult(data.result,'');
        setStatus('✅ 서버에서 불러옴 · '+data.result.ts);
        document.getElementById('ac-run-btn').disabled=false;
      }
    }catch(e){
      renderEditor();
      setStatus('⚠️ 불러오기 실패: '+e.message);
    }
  }
  init();
})();
</script>
</body></html>
